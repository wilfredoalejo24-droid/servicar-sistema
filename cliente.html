<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;min-height:100vh}
input,select,textarea{outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#f59e0b!important}
.input{width:100%;padding:11px 14px;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#fff;font-size:14px}
.card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:18px;margin-bottom:12px}
.badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* Stars */
.star{font-size:36px;cursor:pointer;transition:transform .15s;color:#334155;line-height:1}
.star.on,.star.prev{color:#fbbf24}

/* NPS buttons */
.nps-btn{width:100%;padding:8px 4px;border:1px solid #334155;border-radius:8px;color:#64748b;font-size:13px;font-weight:700;cursor:pointer;background:#0f172a;transition:all .15s}
.nps-btn.sel-r{background:#ef4444;border-color:#ef4444;color:#fff}
.nps-btn.sel-y{background:#f59e0b;border-color:#f59e0b;color:#1e293b}
.nps-btn.sel-g{background:#16a34a;border-color:#16a34a;color:#fff}

/* Progress bar */
.prog-track{background:#0f172a;border-radius:99px;height:10px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;border-radius:99px;transition:width .5s ease}

/* Tab buttons */
.tab-btn{flex:1;padding:9px 5px;border:1px solid #334155;border-radius:10px;color:#64748b;font-size:11px;font-weight:700;cursor:pointer;background:#1e293b;transition:all .15s;text-align:center}
.tab-btn.on{background:#f59e0b;border-color:#f59e0b;color:#1e293b}

<script>
const SB=window.supabase.createClient(
  "https://epirsbudngwbxgcsryvv.supabase.co",
  "sb_publishable_zsqvMzJMc80Ypf3UQqs-SA_IrV-XIGc"
);
const EMPRESA={nombre:"SERVI CAR PLATINIUM",ciudad:"Viacha - La Paz",tel:"68167264",wa:"59168167264"};
const EQUIPO="Equipo Servi Car Platinium";
const KM_INTERVALO=5000; // km entre cambios de aceite

/* ── Estado ─────────────────────────────────────────── */
let placa="", datos=null, tab="historial", estado="landing";
let estrellas=0, nps=-1, encOtNum="", encEnviada=false;
let kmInput=0;

/* ── Utils ──────────────────────────────────────────── */
const fmt=n=>`Bs. ${parseFloat(n||0).toFixed(2)}`;
function $$(id){return document.getElementById(id);}
function v(id){return ($$(id)?.value||"").trim();}
function vn(id){return parseInt($$(id)?.value)||0;}

function diasDesde(fechaStr){
  if(!fechaStr)return null;
  // Attempt parsing dd/m/yyyy (es-BO) or ISO
  let d;
  if(fechaStr.includes("-"))d=new Date(fechaStr);
  else{const[dd,mm,yyyy]=fechaStr.split("/");d=new Date(+yyyy,+mm-1,+dd);}
  if(isNaN(d))return null;
  return Math.floor((Date.now()-d)/86400000);
}

function setProg(id,pct,color){
  const el=$$(id);if(el)el.style.width=Math.min(100,pct)+"%;background:"+color;
}

function normalizarPlaca(v){
  return (v||"").toUpperCase().replace(/[\s\-\.\_]+/g,"");
}

async function buscarFlexible(tabla,campos,orden="created_at"){
  const norm=normalizarPlaca(placa);
  const nums=(norm.match(/\d+/)||[""])[0];
  const termino=nums.length>=3?`%${nums}%`:`%${norm.slice(0,4)||norm}%`;
  let q=SB.from(tabla).select(campos).ilike("placa",termino);
  if(orden)q=q.order(orden,{ascending:false});
  const{data,error}=await q;
  if(error)return{data:null,error};
  return{data:(data||[]).filter(r=>normalizarPlaca(r.placa)===norm),error:null};
}

/* ── Init ───────────────────────────────────────────── */
async function init(){
  const p=new URLSearchParams(location.search);
  const urlPlaca=p.get("placa");
  const urlOT=p.get("ot");
  if(urlPlaca){
    placa=urlPlaca.toUpperCase().trim();
    if(urlOT){encOtNum=urlOT;tab="encuesta";}
    await buscar();
  } else {
    estado="landing";renderApp();
  }
}

/* ── Buscar vehículo ────────────────────────────────── */
async function buscar(){
  placa=normalizarPlaca($$("inp_placa")?.value||placa);
  if(!placa){alert("Ingresa la placa de tu vehículo");return;}
  estado="cargando";renderApp();

  let r2=await buscarFlexible("ots","id,num,placa,cliente,taller,paso,estado,fecha","fecha");
  if(r2.error){
    console.warn("OTS sin campo estado, reintentando:",r2.error);
    r2=await buscarFlexible("ots","id,num,placa,cliente,taller,paso,fecha","fecha");
  }
  const[r1,r3,r4]=await Promise.all([
    buscarFlexible("crm","id,num,placa,cliente,taller,fecha","fecha"),
    Promise.resolve({data:[],error:null}), // aceite_km: tabla pendiente de crear
    Promise.resolve({data:[],error:null}), // encuestas: tabla pendiente de crear
  ]);

  if(r1.error) console.warn("CRM falló",r1.error);
  if(r2.error) console.warn("OTS falló",r2.error);
  if(r1.error&&r2.error){estado="error";renderApp();return;}
  const ref=r1.data?.[0]||r2.data?.[0];
  datos={
    placa,
    cliente:ref?.cliente||"—",
    vehiculo:ref?.vehiculo||"—",
    crm:r1.error?[]:(r1.data||[]),
    ots:r2.error?[]:(r2.data||[]),
    aceite:r3.data||[],
    encuestas:r4.data||[],
  };

  // Auto-select latest unrated completed OT for survey
  if(!encOtNum){
    const completadas=datos.crm.map(c=>c.num).filter(Boolean);
    const yaCalificados=new Set(datos.encuestas.map(e=>e.ot_num));
    const sinCalificar=completadas.find(n=>!yaCalificados.has(n));
    encOtNum=sinCalificar||completadas[0]||"";
  }

  encEnviada=false;estrellas=0;nps=-1;
  estado="ok";renderApp();
}

/* ══════════════════════════════════════════════════════
   RENDER
══════════════════════════════════════════════════════ */
function renderApp(){
  const app=document.getElementById("app");
  if(estado==="landing")    {app.innerHTML=renderLanding();return;}
  if(estado==="cargando")   {app.innerHTML=renderCargando();return;}
  if(estado==="error")      {app.innerHTML=renderError();return;}
  if(estado==="ok"&&datos)  {app.innerHTML=renderPortal();}
}

/* ── Portal ─────────────────────────────────────────── */
function renderPortal(){
  const noEncontrado=!datos.crm.length&&!datos.ots.length;
  return `
  <!-- Header -->
  <div style="background:#1e293b;border-bottom:1px solid #334155;padding:12px 16px;position:sticky;top:0;z-index:100">
    <div style="max-width:480px;margin:0 auto;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="color:#fbbf24;font-weight:900;font-size:14px">🚗 ${EMPRESA.nombre}</div>
        <div style="color:#475569;font-size:10px">Portal del cliente</div>
      </div>
      <button onclick="estado='landing';placa='';datos=null;renderApp()"
        style="padding:6px 12px;background:#334155;color:#94a3b8;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">

  <div class="fi" style="padding:14px 16px;max-width:480px;margin:0 auto">

    </div>
  </div>

  <!-- Tabs -->
  <div style="display:flex;gap:5px;margin-bottom:14px">
    ${[["historial","📋 Historial"],["aceite","🛢️ Aceite"],["encuesta","⭐ Encuesta"]].map(([k,l])=>`

}

  return `

    <div style="font-size:48px;margin-bottom:12px">🔎</div>

/* ── HISTORIAL ──────────────────────────────────────── */
function renderHistorial(){
  const PASOS=["","Recepción","Diagnóstico","Cotización","Aprobación","Ejecución","Entrega"];
  const enProceso=datos.ots.filter(o=>!isNaN(Number(o.paso))&&Number(o.paso)<6);
  const sinPaso=datos.ots.filter(o=>o.paso===null||o.paso===undefined||isNaN(Number(o.paso)));
  const otsDone=datos.ots.filter(o=>!isNaN(Number(o.paso))&&Number(o.paso)>=6);
  const crmNums=new Set(datos.crm.map(c=>String(c.num)).filter(Boolean));
  const completados=[
    ...datos.crm.map(c=>({...c,_src:"crm"})),
    ...otsDone.filter(o=>!crmNums.has(String(o.num))).map(o=>({...o,_src:"ot"})),
  ];
  const todoEnProceso=[...enProceso,...sinPaso];

  return `
  ${todoEnProceso.length?`
  <div style="background:#f59e0b15;border:1px solid #f59e0b30;border-radius:14px;padding:14px;margin-bottom:12px">
    <div style="color:#fbbf24;font-size:11px;font-weight:700;margin-bottom:10px">🔧 EN PROCESO AHORA (${todoEnProceso.length})</div>
    ${todoEnProceso.map(o=>{
      const sin=o.paso===null||o.paso===undefined||isNaN(Number(o.paso));
      const pct=sin?0:Math.round((Number(o.paso)/6)*100);
      return `<div style="background:#0f172a;border-radius:10px;padding:12px;margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-weight:700;font-size:13px">OT ${o.num||o.id}</div>
          ${sin
            ?`<span class="badge" style="background:#47556920;color:#64748b">Por confirmar</span>`
            :`<span class="badge" style="background:#f59e0b20;color:#f59e0b">Paso ${o.paso}/6</span>`}
        </div>
        <div style="color:#64748b;font-size:11px;margin-bottom:6px">${sin?"Estado por confirmar":(PASOS[Number(o.paso)]||"En proceso")} · ${o.taller||"—"}</div>
        ${sin?"":`<div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:#f59e0b"></div></div>`}
        <div style="color:#475569;font-size:10px;margin-top:3px">Atendido por: ${EQUIPO}</div>
        ${o.fecha?`<div style="color:#475569;font-size:10px;margin-top:2px">📅 ${o.fecha}</div>`:""}
        ${o.estado?`<div style="color:#94a3b8;font-size:11px;margin-top:4px">📌 ${o.estado}</div>`:""}
        <button onclick="verDetalleOT(${o.id},'ot')" style="margin-top:10px;width:100%;padding:8px;background:#334155;color:#94a3b8;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">🔍 Ver detalle</button>
      </div>`;
    }).join("")}
  </div>`:""}

  ${completados.length===0&&!todoEnProceso.length?`
  <div class="card" style="text-align:center;padding:28px;color:#334155">
    <div style="font-size:36px;margin-bottom:8px">📋</div>Sin servicios completados aún
  </div>`:
  completados.length?`
  <div style="color:#64748b;font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:8px;padding:0 2px">
    ✅ Servicios completados (${completados.length})
  </div>
  ${completados.map(c=>{
    const yaCalif=c._src==="crm"&&datos.encuestas.some(e=>e.ot_num===String(c.num));
    return `<div class="card" style="padding:14px">
      <div style="margin-bottom:8px">
        <div style="font-weight:700;font-size:13px">OT ${c.num||"—"}</div>
        <div style="color:#64748b;font-size:11px;margin-top:2px">📅 ${c.fecha||"—"} · 🏢 ${c.taller||"—"}</div>
      </div>
      <div style="color:#64748b;font-size:11px;margin-bottom:10px">👨‍🔧 Atendido por: ${EQUIPO}</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        ${c._src==="crm"
          ?(yaCalif
            ?`<span class="badge" style="background:#16a34a20;color:#16a34a">⭐ Ya calificado</span>`
            :`<button onclick="abrirEncuesta('${c.num||""}')"
                style="padding:6px 12px;background:#f59e0b;color:#1e293b;border:none;border-radius:8px;font-weight:700;font-size:11px;cursor:pointer">
                ⭐ Calificar
              </button>`)
          :`<span class="badge" style="background:#16a34a20;color:#16a34a">✅ Entregado</span>`}
        <a href="https://wa.me/${EMPRESA.wa}?text=${encodeURIComponent(`Hola, consulto sobre mi OT ${c.num||""}, placa ${datos.placa}`)}" target="_blank"
          style="padding:6px 12px;background:#25d36620;color:#25d366;border:1px solid #25d36640;border-radius:8px;font-weight:700;font-size:11px;text-decoration:none">
          💬 Consultar
        </a>
        <button onclick="verDetalleOT(${c.id},'${c._src}')" style="padding:6px 12px;background:#334155;color:#94a3b8;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">🔍 Ver detalle</button>
      </div>
    </div>`;
  }).join("")}`:""}`;
}

function abrirEncuesta(otNum){
  encOtNum=otNum;estrellas=0;nps=-1;encEnviada=false;
  tab="encuesta";renderApp();
  setTimeout(()=>$$("enc_top")?.scrollIntoView({behavior:"smooth"}),50);
}

async function verDetalleOT(id,src){
  const lista=src==="crm"?datos.crm:datos.ots;
  const o=lista.find(x=>x.id==id);
  if(!o)return;
  const PASOS=["","Recepción","Diagnóstico","Cotización","Aprobación","Ejecución","Entrega"];
  const paso=Number(o.paso);
  const pasoLabel=!isNaN(paso)&&paso>0?`Paso ${paso}/6 — ${PASOS[paso]||""}`:"";
  const waText=encodeURIComponent(`Hola, consulto sobre mi OT ${o.num||id}, placa ${o.placa||datos.placa}`);
  const fd=(lbl,val)=>val?`<div style="background:#0f172a;border-radius:10px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px"><div style="color:#64748b;font-size:11px;font-weight:700;white-space:nowrap">${lbl}</div><div style="color:#e2e8f0;font-size:13px;text-align:right">${val}</div></div>`:"";
  const sec=(titulo)=>`<div style="color:#64748b;font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:8px">${titulo}</div>`;
  const placeholderDiag=`<div style="color:#475569;font-size:13px;font-style:italic">Diagnóstico pendiente de registrar</div>`;
  const placeholderTrab=`<div style="color:#475569;font-size:13px;font-style:italic">Trabajos pendiente de publicar</div>`;
  const placeholderRep=`<div style="color:#475569;font-size:13px;font-style:italic">Detalle de repuestos pendiente de publicar</div>`;
  const placeholderFotos=`<div style="color:#475569;font-size:13px;font-style:italic">Fotos del proceso pendientes de publicar</div>`;
  const el=document.createElement("div");
  el.id="mdl-det-ot";
  el.style.cssText="position:fixed;inset:0;background:#0f172acc;z-index:9999;display:flex;align-items:flex-end;justify-content:center";
  el.innerHTML=`
  <div style="background:#1e293b;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:20px 18px 32px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="color:#fbbf24;font-weight:900;font-size:16px">📋 OT ${o.num||("#"+id)}</div>
      <button onclick="cerrarDetalleOT()" style="padding:6px 12px;background:#334155;color:#94a3b8;border:none;border-radius:8px;font-weight:700;cursor:pointer">✕</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${fd("🚗 Placa",o.placa||datos.placa)}
      ${fd("👤 Cliente",o.cliente)}
      ${fd("🏢 Taller",o.taller)}
      ${fd("👨‍🔧 Técnico",EQUIPO)}
      ${fd("📅 Fecha",o.fecha)}
      ${pasoLabel?fd("📊 Progreso",pasoLabel):""}
      ${o.estado?fd("📌 Estado",o.estado):""}
    </div>
    <div id="det-diag-sec" style="margin-top:16px;padding-top:14px;border-top:1px solid #334155">
      ${sec("Diagnóstico")}<div style="color:#475569;font-size:13px;font-style:italic">Cargando...</div>
    </div>
    <div id="det-trab-sec" style="margin-top:14px;padding-top:12px;border-top:1px solid #334155">
      ${sec("Trabajos")}<div style="color:#475569;font-size:13px;font-style:italic">Cargando...</div>
    </div>
    <div id="det-rep-sec" style="margin-top:14px;padding-top:12px;border-top:1px solid #334155">
      ${sec("Repuestos")}<div style="color:#475569;font-size:13px;font-style:italic">Cargando...</div>
    </div>
    <div id="det-fotos-sec" style="margin-top:14px;padding-top:12px;border-top:1px solid #334155">
      ${sec("Fotos del proceso")}<div style="color:#475569;font-size:13px;font-style:italic">Cargando...</div>
    </div>
    <a href="https://wa.me/${EMPRESA.wa}?text=${waText}" target="_blank"
      style="display:block;margin-top:16px;padding:11px;background:#25d36620;color:#25d366;border:1px solid #25d36640;border-radius:10px;font-weight:700;font-size:13px;text-align:center;text-decoration:none">
      💬 Consultar por WhatsApp
    </a>
  </div>`;
  el.addEventListener("click",e=>{if(e.target===el)cerrarDetalleOT();});
  document.body.appendChild(el);

  // Fetch desde vista segura ots_cliente (sin precios, sin datos internos)
  // OTs: consulta por id. CRM: consulta por num + placa (ids de crm != ids de ots)
  let det=null;
  if(src==="ot"){
    let r=await SB.from("ots_cliente")
      .select("diagnostico,problema,problemas,procedimientos_publicos,repuestos_publicos,fotos_recepcion_publicas,fotos_trabajo_publicas")
      .eq("id",id).single();
    if(r.error){
      r=await SB.from("ots_cliente").select("diagnostico,problema").eq("id",id).single();
    }
    if(!r.error&&r.data) det=r.data;
  } else if(o.num){
    const r=await SB.from("ots_cliente")
      .select("diagnostico,problema,problemas,procedimientos_publicos,repuestos_publicos,fotos_recepcion_publicas,fotos_trabajo_publicas")
      .eq("num",o.num)
      .ilike("placa",o.placa||datos.placa||"")
      .limit(1);
    if(!r.error&&r.data&&r.data[0]) det=r.data[0];
  }
  // det=null si CRM sin num o sin OT en ots_cliente → placeholders se muestran abajo

  const ds=document.getElementById("det-diag-sec");
  const ts=document.getElementById("det-trab-sec");
  const rs=document.getElementById("det-rep-sec");
  const fs=document.getElementById("det-fotos-sec");
  if(!ds||!ts||!rs||!fs)return; // modal cerrado antes de terminar

  if(!det){
    ds.innerHTML=sec("Diagnóstico")+placeholderDiag;
    ts.innerHTML=sec("Trabajos")+placeholderTrab;
    rs.innerHTML=sec("Repuestos")+placeholderRep;
    fs.innerHTML=sec("Fotos del proceso")+placeholderFotos;
    return;
  }

  // Parsear JSONB si llegan como string (la vista puede devolverlos ya como objetos)
  ["problemas","procedimientos_publicos","repuestos_publicos","fotos_recepcion_publicas","fotos_trabajo_publicas"].forEach(k=>{
    if(det[k]&&!Array.isArray(det[k])){try{det[k]=JSON.parse(det[k]);}catch{det[k]=[];}}
  });

  // Renderizar Diagnóstico
  const probs=det.problemas||[];
  const diagTxt=det.diagnostico||det.problema||"";
  let diagHtml="";
  if(probs.length){
    diagHtml+=`<div style="display:flex;flex-wrap:wrap;gap:5px${diagTxt?";margin-bottom:8px":""}">`
      +probs.map(p=>`<span style="padding:3px 10px;border-radius:20px;background:#3b82f620;color:#60a5fa;border:1px solid #3b82f640;font-size:11px;font-weight:700">${p}</span>`).join("")
      +`</div>`;
  }
  if(diagTxt) diagHtml+=`<div style="color:#cbd5e1;font-size:13px;line-height:1.5">${diagTxt}</div>`;
  if(!diagHtml) diagHtml=placeholderDiag;
  ds.innerHTML=sec("Diagnóstico")+diagHtml;

  // Renderizar Trabajos desde procedimientos_publicos (sin precio, sin técnico)
  const procs=det.procedimientos_publicos||[];
  let trabHtml="";
  if(procs.length){
    trabHtml=procs.map(p=>`<div style="background:#0f172a;border-radius:10px;padding:10px 12px;margin-bottom:6px">
      <div style="color:#e2e8f0;font-size:13px;font-weight:700">${p.nombre||"—"}</div>
      ${p.desc?`<div style="color:#94a3b8;font-size:12px;margin-top:3px">${p.desc}</div>`:""}
      ${p.tiempo?`<div style="color:#64748b;font-size:11px">Tiempo: ${p.tiempo}</div>`:""}
    </div>`).join("");
  } else {
    trabHtml=placeholderTrab;
  }
  ts.innerHTML=sec("Trabajos")+trabHtml;

  // Renderizar Repuestos desde repuestos_publicos (sin precio, sin precio_estimado, sin costo)
  const reps=det.repuestos_publicos||[];
  let repHtml="";
  if(reps.length){
    repHtml=reps.map(r=>{
      const cant=r.cantidad||1;
      const unidad=r.unidad?` ${r.unidad}`:"";
      const estadoTag=r.conseguido===true
        ?`<span style="padding:2px 8px;border-radius:20px;background:#16a34a20;color:#4ade80;border:1px solid #16a34a40;font-size:10px;font-weight:700">✓ Conseguido</span>`
        :r.conseguido===false
          ?`<span style="padding:2px 8px;border-radius:20px;background:#f9731620;color:#f97316;border:1px solid #f9731640;font-size:10px;font-weight:700">⏳ Pendiente</span>`
          :"";
      return `<div style="background:#0f172a;border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px">
        <div style="min-width:0">
          <div style="color:#e2e8f0;font-size:13px;font-weight:700">${r.nombre||"—"}</div>
          ${r.nota?`<div style="color:#94a3b8;font-size:11px;margin-top:2px">${r.nota}</div>`:""}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
          <div style="color:#64748b;font-size:11px;white-space:nowrap">×${cant}${unidad}</div>
          ${estadoTag}
        </div>
      </div>`;
    }).join("");
  } else {
    repHtml=placeholderRep;
  }
  rs.innerHTML=sec("Repuestos")+repHtml;

  // Fotos del proceso: recepcion + trabajo, filtradas a http en la vista, doble check en JS
  // No consulta fotos_salida ni ots directo
  const fotosRec=det.fotos_recepcion_publicas||[];
  const fotosTrab=det.fotos_trabajo_publicas||[];
  const todasFotos=[...fotosRec,...fotosTrab].filter(f=>typeof f==="string"&&f.startsWith("http"));
  let fotosHtml="";
  if(todasFotos.length){
    fotosHtml=`<div style="display:flex;flex-wrap:wrap;gap:6px">`
      +todasFotos.map(f=>`<img src="${f}" onclick="window.open(this.src,'_blank')" style="width:80px;height:65px;object-fit:cover;border-radius:8px;cursor:pointer;border:1px solid #334155"/>`).join("")
      +`</div>`;
  } else {
    fotosHtml=placeholderFotos;
  }
  fs.innerHTML=sec("Fotos del proceso")+fotosHtml;
}

function cerrarDetalleOT(){
  const el=document.getElementById("mdl-det-ot");
  if(el)el.remove();
}

/* ── ACEITE ─────────────────────────────────────────── */
function renderAceite(){
  const ultimo=datos.aceite[0];
  const diasU=ultimo?diasDesde(ultimo.fecha):null;
  const kmProx=ultimo?(ultimo.km_proximo||(ultimo.km_cambio+KM_INTERVALO)):null;

  return `
  <div class="card">
    <div style="color:#f97316;font-size:12px;font-weight:700;text-transform:uppercase;margin-bottom:14px">🛢️ Cambio de aceite</div>

    ${!ultimo?`
    <div style="text-align:center;padding:20px 0;color:#334155">
      <div style="font-size:36px;margin-bottom:8px">🛢️</div>
      <div style="font-size:13px">Sin registro de cambio de aceite</div>
      <div style="color:#475569;font-size:11px;margin-top:6px">Tu taller registrará la información en cada servicio.</div>
    </div>`:`

    <!-- Último cambio -->
    <div style="background:#f9741612;border:1px solid #f9741620;border-radius:12px;padding:14px;margin-bottom:14px">
      <div style="font-size:10px;color:#64748b;font-weight:700;margin-bottom:6px">ÚLTIMO CAMBIO</div>
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
        <div>
          <div style="font-weight:700;font-size:15px">📅 ${ultimo.fecha||"—"}</div>
          <div style="color:#64748b;font-size:11px;margin-top:2px">
            Km al cambio: <strong style="color:#94a3b8">${(ultimo.km_cambio||0).toLocaleString("es")} km</strong>
          </div>
          ${ultimo.taller?`<div style="color:#475569;font-size:10px;margin-top:1px">🏢 ${ultimo.taller}</div>`:""}
          ${ultimo.observaciones?`<div style="color:#475569;font-size:10px;margin-top:1px">📝 ${ultimo.observaciones}</div>`:""}
        </div>
        <div style="text-align:right">
          ${diasU!=null?`<div style="font-size:${diasU>180?"16":"14"}px;font-weight:700;color:${diasU>180?"#ef4444":diasU>150?"#f59e0b":"#16a34a"}">${diasU} días</div><div style="color:#64748b;font-size:10px">desde el cambio</div>`:""}
        </div>
      </div>
    </div>

    <!-- Próximo cambio -->
    <div style="background:#1e293b;border:1px solid #334155;border-radius:12px;padding:12px;margin-bottom:14px">
      <div style="font-size:10px;color:#64748b;font-weight:700;margin-bottom:4px">PRÓXIMO CAMBIO</div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-weight:700;font-size:15px">📍 ${(kmProx||0).toLocaleString("es")} km</div>
        <div style="color:#475569;font-size:11px">cada ${KM_INTERVALO.toLocaleString("es")} km</div>
      </div>
    </div>

    <!-- Calculadora km actual -->
    <div style="margin-bottom:14px">
      <div style="color:#64748b;font-size:11px;font-weight:700;margin-bottom:8px">🔢 ¿CUÁNTO MARCA TU ODÓMETRO?</div>
      <div style="display:flex;gap:8px">
        <input id="km_actual" type="number" min="0" max="999999" placeholder="Ej: 87500" class="input"
          style="font-size:16px;font-weight:700;text-align:center;flex:1" oninput="calcularAceite()"/>
        <span style="align-self:center;color:#475569;font-size:12px;white-space:nowrap">km</span>
      </div>
    </div>

    <!-- Estado calculado -->
    <div id="aceite_estado"></div>`}

    <!-- Historial -->
    ${datos.aceite.length>1?`
    <div style="margin-top:14px;border-top:1px solid #334155;padding-top:12px">
      <div style="color:#64748b;font-size:10px;font-weight:700;margin-bottom:8px">HISTORIAL DE CAMBIOS</div>
      ${datos.aceite.map((a,i)=>`
      <div style="display:flex;justify-content:space-between;font-size:11px;padding:5px 0;border-bottom:1px solid #0f172a;${i===datos.aceite.length-1?"border:none":""}">
        <span style="color:#64748b">${a.fecha||"—"}</span>
        <span style="color:#94a3b8">${(a.km_cambio||0).toLocaleString("es")} km</span>
        <span style="color:#475569">${a.taller||"—"}</span>

    <!-- Botón agendar -->

      📱 Agendar cambio de aceite por WhatsApp
    </a>
  </div>`;
}

function calcularAceite(){
  const ultimo=datos.aceite[0];
  if(!ultimo)return;
  const kmActual=vn("km_actual");
  if(!kmActual){$$("aceite_estado").innerHTML="";return;}
  const kmProx=ultimo.km_proximo||(ultimo.km_cambio+KM_INTERVALO);
  const restante=kmProx-kmActual;
  const pct=Math.min(100,Math.round(((kmActual-ultimo.km_cambio)/KM_INTERVALO)*100));
  const ok=restante>KM_INTERVALO*0.1; // >10% remaining
  const warn=restante<=KM_INTERVALO*0.1&&restante>0;
  const over=restante<=0;
  const color=over?"#ef4444":warn?"#f59e0b":"#16a34a";
  const icon=over?"🔴":warn?"🟡":"🟢";
  $$("aceite_estado").innerHTML=`
  <div style="background:${color}15;border:1px solid ${color}30;border-radius:12px;padding:14px;text-align:center">
    <div class="prog-track"><div id="prog_aceite" class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
    <div style="font-size:22px;font-weight:900;color:${color};margin:8px 0">${icon} ${Math.abs(restante).toLocaleString("es")} km</div>
    <div style="color:#94a3b8;font-size:12px">
      ${over?`de retraso · ¡Cambia tu aceite lo antes posible!`:warn?`para el próximo cambio · ¡Ya casi es hora!`:`para el próximo cambio`}
    </div>
    <div style="color:#475569;font-size:10px;margin-top:6px">Tu km actual: ${kmActual.toLocaleString("es")} · Próximo: ${kmProx.toLocaleString("es")}</div>
  </div>`;
}

/* ── ENCUESTA ───────────────────────────────────────── */
function renderEncuesta(){
  return `<div class="card" style="text-align:center;padding:30px 18px">
    <div style="font-size:36px;margin-bottom:12px">⭐</div>
    <div style="color:#fbbf24;font-weight:700;font-size:15px;margin-bottom:8px">Encuesta de satisfacción</div>
    <div style="color:#475569;font-size:13px">Próximamente disponible</div>
  </div>`;
}

function actualizarEncuesta(){
  const el=$$("contenido_enc")||$$("app");
  const card=$$("enc_top");
  if(card)card.outerHTML=renderEncuesta();
}

function setEstrellas(n){
  estrellas=n;
  // Update stars display
  const cont=$$("stars_container");
  const lbl=$$("stars_label");
  if(cont)cont.innerHTML=[1,2,3,4,5].map(i=>`<span class="star ${n>=i?"on":""}" onclick="setEstrellas(${i})">★</span>`).join("");
  if(lbl)lbl.textContent=["","Muy malo 😞","Malo 😕","Regular 😐","Bueno 😊","Excelente 🤩"][n]||"";
  // Re-enable submit button
  const btn=document.querySelector("button[onclick='enviarEncuesta()']");
  if(btn){btn.disabled=nps<0;btn.style.background=estrellas&&nps>=0?"#f59e0b":"#334155";btn.style.color=estrellas&&nps>=0?"#1e293b":"#64748b";}
}

function setNPS(n){
  nps=n;
  // Update NPS buttons
  document.querySelectorAll(".nps-btn").forEach((btn,i)=>{
    btn.className="nps-btn"+(i===n?" sel-"+(i<=6?"r":i<=8?"y":"g"):"");
  });
  const btn=document.querySelector("button[onclick='enviarEncuesta()']");
  if(btn){btn.disabled=estrellas<1;btn.style.background=estrellas&&nps>=0?"#f59e0b":"#334155";btn.style.color=estrellas&&nps>=0?"#1e293b":"#64748b";}
}

async function enviarEncuesta(){
  if(!estrellas||nps<0){alert("Selecciona estrellas y puntuación de recomendación");return;}
  const payload={
    placa:datos.placa,ot_num:encOtNum||null,
    estrellas,nps,
    aspecto_bueno:v("enc_bueno"),
    aspecto_mejora:v("enc_mejora"),
  };
  const{error}=await SB.from("encuestas").insert(payload);
  if(error){alert("Error al enviar: "+error.message);return;}
  datos.encuestas=[{...payload,created_at:new Date().toISOString()},...datos.encuestas];
  encEnviada=true;
  renderApp();
}

    <div style="font-size:56px;margin-bottom:14px">🎉</div>

      ${"★".repeat(estrellas)}${"☆".repeat(5-estrellas)}

      📱 Compartir mi experiencia por WhatsApp
    </a>`:""}
    <button onclick="tab='historial';encEnviada=false;renderApp()"
      style="width:100%;padding:10px;background:#334155;color:#94a3b8;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer">

}

[
