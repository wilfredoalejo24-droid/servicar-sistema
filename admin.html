<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin — Servi Car Platinium</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;min-height:100vh}
input,select,textarea{outline:none;font-family:inherit}
input:focus,select:focus{border-color:#f59e0b!important}
.input{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#fff;font-size:13px}
.label{color:#64748b;font-size:11px;font-weight:700;margin-bottom:5px;display:block}
.card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:16px;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:7px 10px;background:#0f172a;color:#f59e0b;font-size:10px;text-align:left;font-weight:700;white-space:nowrap}
.tbl td{padding:7px 10px;border-bottom:1px solid #0f172a;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:#0f172a40}
.ovf{overflow-x:auto;-webkit-overflow-scrolling:touch}
.badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .25s ease both}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#1e293b;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.su{animation:su .25s ease both}
@media print{.noprint{display:none!important}body{background:#fff;color:#000}.tbl th{color:#000}}
</style>
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#475569">
    <div style="text-align:center"><div style="font-size:38px;margin-bottom:8px">⚙️</div>Cargando admin...</div>
  </div>
</div>
<div id="modal"></div>
<script>
const SB=window.supabase.createClient(
  "https://epirsbudngwbxgcsryvv.supabase.co",
  "sb_publishable_zsqvMzJMc80Ypf3UQqs-SA_IrV-XIGc"
);
const EMPRESA={nombre:"SERVI CAR PLATINIUM",ciudad:"Viacha - La Paz"};
const TALLERES=["Taller 1 · Montes","Taller 2 · Bella Vista"];
const CATS_INV=["Lubricantes","Repuestos","Repuestos usados"];
const PREF_INV={Lubricantes:"LB",Repuestos:"RP","Repuestos usados":"RU"};
const EST_COLORS={Activa:"#16a34a",Dañada:"#f97316",Transferida:"#3b82f6","Dada de baja":"#64748b",Faltante:"#ef4444"};
const WORKERS_FB=["Wilfredo","William","Diego","Evo","Adolfo","Joel"];

/* ── Estado ─────────────────────────────────────────── */
let usuario=null, tab="inventario";
let inv=null, crmD=null, workers=null, herrs=null;
let vacSaldos=null, vacSols=null;
let turnosData=null;
let invBusq="", invCat="";
let crmBusq="";
let herWorker=null;
let vacVista="resumen";
let configData=null;

/* ── Utils ──────────────────────────────────────────── */
const hoy=()=>new Date().toLocaleDateString("es-BO");
const fmt=n=>`Bs. ${parseFloat(n||0).toFixed(2)}`;
const esAdmin=()=>usuario?.rol==="admin";
const esEnc=()=>["admin","encargado"].includes(usuario?.rol);
function getSession(){try{return JSON.parse(localStorage.getItem("scp_user"))||JSON.parse(localStorage.getItem("sc_user"))||null;}catch{return null;}}
function $$(id){return document.getElementById(id);}
function v(id){return ($$(id)?.value||"").trim();}
function vn(id){return parseFloat($$(id)?.value)||0;}
function closeModal(){document.getElementById("modal").innerHTML="";}
function salir(){localStorage.removeItem("scp_user");localStorage.removeItem("sc_user");location.href="/";}
function calcDiasHab(ini,fin){
  if(!ini||!fin)return 0;
  let d=0,cur=new Date(ini),end=new Date(fin);
  while(cur<=end){const day=cur.getDay();if(day!==0&&day!==6)d++;cur.setDate(cur.getDate()+1);}
  return d;
}
function blobCSV(csv,nombre){
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=nombre;a.click();
}

/* ── Init ───────────────────────────────────────────── */
async function init(){
  usuario=getSession();
  if(!usuario){location.href="/";return;}
  if(!esEnc()){alert("❌ Sin acceso al panel admin");location.href="/";return;}
  render();
  await Promise.all([cargarInventario(),cargarCRM()]);
  actualizarContenido();
}

/* ══════════════════════════════════════════════════════
   RENDER PRINCIPAL
══════════════════════════════════════════════════════ */
function render(){
  const TABS=[
    {k:"inventario",  l:"📦 Inventario"},
    {k:"crm",         l:"👥 CRM"},
    {k:"herramientas",l:"🔧 Herramientas"},
    {k:"personal",    l:"🏖️ Personal"},
    {k:"facturas",    l:"🖼️ Facturas IA"},
    {k:"config",      l:"⚙️ Config"},
  ];
  document.getElementById("app").innerHTML=`
  <div style="background:#1e293b;border-bottom:1px solid #334155;padding:12px 16px;position:sticky;top:0;z-index:100" class="noprint">
    <div style="max-width:860px;margin:0 auto;display:flex;justify-content:space-between;align-items:center">
      <div>
        <a href="/" style="color:#475569;text-decoration:none;font-size:10px;font-weight:700">← Inicio</a>
        <div style="color:#fbbf24;font-weight:900;font-size:15px;margin-top:1px">⚙️ Panel Admin</div>
        <div style="color:#475569;font-size:10px">${usuario.nombre} · ${hoy()}</div>
      </div>
      <button onclick="salir()" style="padding:7px 12px;background:#ef444415;color:#ef4444;border:1px solid #ef444430;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">Salir</button>
    </div>
  </div>
  <div class="fi" style="padding:10px 14px;max-width:860px;margin:0 auto">
    <div style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap" class="noprint">
      ${TABS.map(t=>`<button onclick="cambiarTab('${t.k}')"
        style="padding:7px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;
          border:1px solid ${tab===t.k?"#f59e0b":"#334155"};
          background:${tab===t.k?"#f59e0b":"#1e293b"};
          color:${tab===t.k?"#1e293b":"#64748b"}">${t.l}</button>`).join("")}
    </div>
    <div id="contenido" class="fi">${renderTab()}</div>
    <div style="height:28px"></div>
  </div>`;
}

function renderTab(){
  if(tab==="inventario")   return renderInventario();
  if(tab==="crm")          return renderCRM();
  if(tab==="herramientas") return renderHerramientas();
  if(tab==="personal")     return renderPersonal();
  if(tab==="facturas")     return renderFacturas();
  if(tab==="config")       return renderConfig();
  return "";
}

function actualizarContenido(){
  const el=$$("contenido");
  if(el){el.innerHTML=renderTab();el.className="fi";}
}

async function cambiarTab(t){
  tab=t;
  actualizarContenido();
  if(t==="herramientas"&&!workers){await cargarWorkers();actualizarContenido();}
  if(t==="personal"){
    const ps=[];
    if(!vacSaldos)ps.push(cargarVacaciones());
    if(!workers)ps.push(cargarWorkers());
    if(!turnosData)ps.push(cargarTurnos());
    if(ps.length){await Promise.all(ps);actualizarContenido();}
  }
  if(t==="config"&&!configData){await cargarConfig();actualizarContenido();}
}

/* ══════════════════════════════════════════════════════
   TAB: INVENTARIO
══════════════════════════════════════════════════════ */
async function cargarInventario(){
  const{data}=await SB.from("inventario").select("*").order("nom");
  inv=data||[];
}

function genCod(cat){
  const p=PREF_INV[cat]||"PR";
  const nums=(inv||[]).filter(i=>i.cod?.startsWith(p)).map(i=>parseInt(i.cod?.split("-")[1])||0);
  return `${p}-${String((Math.max(0,...(nums.length?nums:[0]))+1)).padStart(3,"0")}`;
}

function renderInventario(){
  if(!inv) return `<div style="text-align:center;padding:30px;color:#475569">Cargando inventario...</div>`;
  const agotados=inv.filter(i=>i.stock===0);
  const bajos=inv.filter(i=>i.stock>0&&i.stock<=(i.min||2));
  const filtrado=inv.filter(i=>{
    const q=invBusq.toLowerCase();
    return(!q||(i.nom||"").toLowerCase().includes(q)||(i.cod||"").toLowerCase().includes(q)||(i.marca||"").toLowerCase().includes(q))
      &&(!invCat||i.cat===invCat);
  });
  return `
  ${agotados.length?`<div style="background:#ef444412;border:1px solid #ef444430;border-radius:10px;padding:10px 14px;margin-bottom:10px">
    <span style="color:#ef4444;font-size:11px;font-weight:700">❌ Agotados (${agotados.length}):</span>
    <span style="color:#f87171;font-size:11px"> ${agotados.slice(0,4).map(i=>i.nom).join(", ")}${agotados.length>4?"…":""}</span>
  </div>`:""}
  ${bajos.length?`<div style="background:#f9741612;border:1px solid #f9741630;border-radius:10px;padding:10px 14px;margin-bottom:10px">
    <span style="color:#f97316;font-size:11px;font-weight:700">⚠️ Stock bajo (${bajos.length}):</span>
    <span style="color:#fb923c;font-size:11px"> ${bajos.slice(0,4).map(i=>i.nom).join(", ")}${bajos.length>4?"…":""}</span>
  </div>`:""}
  <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap" class="noprint">
    <input oninput="invBusq=this.value;actualizarContenido()" value="${invBusq}" placeholder="🔍 Nombre, código o marca..."
      style="flex:1;min-width:120px;padding:8px 12px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#fff;font-size:13px"/>
    <select onchange="invCat=this.value;actualizarContenido()"
      style="padding:8px 10px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#fff;font-size:12px">
      <option value="">Todas las categorías</option>
      ${CATS_INV.map(c=>`<option value="${c}" ${invCat===c?"selected":""}>${c}</option>`).join("")}
    </select>
    <button onclick="exportarInvCSV()" style="padding:7px 12px;background:#16a34a20;color:#16a34a;border:1px solid #16a34a30;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">⬇ CSV</button>
    ${esEnc()?`<button onclick="modalNuevoProd()" style="padding:7px 12px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">+ Producto</button>`:""}
  </div>
  <div class="ovf">
    <table class="tbl">
      <thead><tr>
        <th style="width:48px">Foto</th><th>Código</th><th>Producto</th><th>Marca</th><th>Cat.</th><th>Para</th><th>Stock</th><th>P.Venta</th>
        ${esAdmin()?`<th>Costo</th><th>Margen</th>`:""}
      </tr></thead>
      <tbody>
      ${filtrado.length===0?`<tr><td colspan="12" style="text-align:center;padding:24px;color:#334155">Sin resultados</td></tr>`:""}
      ${filtrado.map(i=>{
        const margen=i.precio>0?((i.precio-i.costo)/i.precio*100):0;
        const sc=i.stock===0?"#ef4444":i.stock<=(i.min||2)?"#f97316":"#16a34a";
        return `<tr>
          <td style="padding:5px">
            ${i.foto_url
              ?`<img src="${i.foto_url}" onclick="verFotoInv(${i.id})" title="Ver foto"
                  style="width:40px;height:40px;object-fit:cover;border-radius:7px;cursor:pointer;display:block"/>`
              :`<div style="width:40px;height:40px;background:#0f172a;border:1px dashed #334155;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#334155;font-size:16px">📷</div>`}
          </td>
          <td style="color:#64748b;font-size:10px">${i.cod||"—"}</td>
          <td>
            <div style="font-weight:700">${i.nom}</div>
            ${i.medida?`<div style="color:#475569;font-size:10px">${i.medida}</div>`:""}
            ${i.stock===0?`<span class="badge" style="background:#ef444420;color:#ef4444;margin-top:2px;display:inline-block">AGOTADO</span>`:""}
            ${i.stock>0&&i.stock<=(i.min||2)?`<span class="badge" style="background:#f9741620;color:#f97316;margin-top:2px;display:inline-block">BAJO</span>`:""}
          </td>
          <td style="color:#64748b">${i.marca||"—"}</td>
          <td style="color:#475569;font-size:10px">${i.cat||"—"}</td>
          <td style="color:#475569;font-size:10px">${i.para||"—"}</td>
          <td style="font-weight:700;color:${sc}">${i.stock}</td>
          <td style="color:#fbbf24;font-weight:700">${fmt(i.precio)}</td>
          ${esAdmin()?`
          <td style="color:#64748b">${fmt(i.costo)}</td>
          <td><span class="badge" style="background:${margen>=20?"#16a34a":margen>=10?"#f59e0b":"#ef4444"}20;color:${margen>=20?"#16a34a":margen>=10?"#f59e0b":"#ef4444"}">${margen.toFixed(0)}%</span></td>`:""}
        </tr>`;
      }).join("")}
      </tbody>
    </table>
  </div>`;
}

function exportarInvCSV(){
  const cols=["Código","Producto","Marca","Categoría","Para","Medida","Stock","Mínimo","Precio venta",...(esAdmin()?["Costo","Margen%"]:[])];
  const rows=(inv||[]).map(i=>[i.cod,i.nom,i.marca,i.cat,i.para,i.medida,i.stock,i.min,i.precio,...(esAdmin()?[i.costo,i.precio>0?(((i.precio-i.costo)/i.precio)*100).toFixed(0)+"%":"0%"]:[])].map(x=>`"${x||""}"`));
  blobCSV([cols.map(c=>`"${c}"`), ...rows].map(r=>r.join(",")).join("\n"),"inventario_servicar.csv");
}

function verFotoInv(id){
  const item=(inv||[]).find(i=>i.id===id);
  if(!item?.foto_url)return;
  document.getElementById("modal").innerHTML=`
  <div class="modal-bg" onclick="closeModal()" style="align-items:center;justify-content:center">
    <div onclick="event.stopPropagation()" style="background:#1e293b;border:1px solid #334155;border-radius:14px;padding:16px;max-width:380px;width:90%;max-height:90vh;overflow-y:auto">
      <div style="color:#fbbf24;font-weight:700;font-size:13px;margin-bottom:10px">📷 ${item.nom}</div>
      <img src="${item.foto_url}" style="width:100%;border-radius:8px;object-fit:contain;max-height:280px"/>
      ${item.foto_caja_url?`
      <div style="color:#64748b;font-size:11px;font-weight:700;text-transform:uppercase;margin:12px 0 6px">📦 Foto de la caja / empaque</div>
      <img src="${item.foto_caja_url}" style="width:100%;border-radius:8px;object-fit:contain;max-height:200px"/>`:""}
      <button onclick="closeModal()" style="width:100%;margin-top:12px;padding:10px;background:#334155;color:#94a3b8;border:none;border-radius:8px;font-weight:700;cursor:pointer">Cerrar</button>
    </div>
  </div>`;
}

function modalNuevoProd(){
  let n={nom:"",marca:"",cat:"",stock:0,min:2,costo:0,precio:0,prov:"",para:"",medida:""};
  let dup="";
  let fotoFile=null,fotoCajaFile=null,fotoPreview=null,fotoCajaPreview=null;
  const thumb=(prev)=>prev
    ?`<img src="${prev}" style="width:64px;height:64px;object-fit:cover;border-radius:8px"/>`
    :`<div style="width:64px;height:64px;background:#0f172a;border:1px dashed #334155;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#475569;font-size:20px">📷</div>`;
  const draw=()=>{
    document.getElementById("modal").innerHTML=`
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal-box su">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="color:#fbbf24;font-weight:900">➕ Nuevo producto</div>
          <button onclick="closeModal()" style="background:none;border:none;color:#64748b;font-size:20px;cursor:pointer">✕</button>
        </div>
        <div style="display:grid;gap:10px">
          <div>
            <div class="label">Nombre *</div>
            <input id="pn_nom" class="input" value="${n.nom}" oninput="pnDup(this.value)" placeholder="Nombre del producto"/>
            <div id="pn_dup" style="color:#ef4444;font-size:11px;margin-top:3px">${dup}</div>
          </div>
          <div><div class="label">Marca</div><input id="pn_marca" class="input" value="${n.marca}" placeholder="Toyota, Bosch..."/></div>
          <div>
            <div class="label">Categoría *</div>
            <select id="pn_cat" class="input" onchange="pnCat(this.value)">
              <option value="">Seleccionar...</option>
              ${CATS_INV.map(c=>`<option value="${c}" ${n.cat===c?"selected":""}>${c}</option>`).join("")}
            </select>
            ${n.cat?`<div style="color:#475569;font-size:10px;margin-top:3px">Código: <strong style="color:#94a3b8">${genCod(n.cat)}</strong></div>`:""}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div><div class="label">Stock actual</div><input id="pn_stock" type="number" min="0" class="input" value="${n.stock}"/></div>
            <div><div class="label">Stock mínimo</div><input id="pn_min" type="number" min="0" class="input" value="${n.min}"/></div>
            ${esAdmin()?`<div><div class="label">Costo Bs.</div><input id="pn_costo" type="number" min="0" class="input" value="${n.costo}"/></div>`:""}
            <div><div class="label">Precio venta Bs. *</div><input id="pn_precio" type="number" min="0" class="input" value="${n.precio}"/></div>
          </div>
          <div><div class="label">Para qué vehículo</div><input id="pn_para" class="input" value="${n.para}" placeholder="Toyota Corolla 2015-2020"/></div>
          <div><div class="label">Medida / Especificación</div><input id="pn_medida" class="input" value="${n.medida}" placeholder="500ml, 1L, 14mm..."/></div>
          <div><div class="label">Proveedor</div><input id="pn_prov" class="input" value="${n.prov}" placeholder="Nombre del proveedor"/></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div>
              <div class="label">📷 Foto del producto</div>
              <input type="file" accept="image/*" id="pn_foto" onchange="pnFoto('prod')" style="width:100%;font-size:11px;color:#94a3b8"/>
              <div id="pn_fp" style="margin-top:5px">${thumb(fotoPreview)}</div>
            </div>
            <div>
              <div class="label">📦 Foto de la caja</div>
              <input type="file" accept="image/*" id="pn_foto_caja" onchange="pnFoto('caja')" style="width:100%;font-size:11px;color:#94a3b8"/>
              <div id="pn_fp_caja" style="margin-top:5px">${thumb(fotoCajaPreview)}</div>
            </div>
          </div>
          <div style="color:#475569;font-size:10px;padding:8px;background:#0f172a;border-radius:8px">
            💡 Las fotos se suben al bucket <strong style="color:#94a3b8">inventario</strong> en Supabase Storage. Asegúrate de que el bucket exista con acceso público.
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px">
          <button onclick="closeModal()" style="padding:11px;background:#334155;color:#94a3b8;border:none;border-radius:10px;font-weight:700;cursor:pointer">Cancelar</button>
          <button id="pn_btn_guardar" onclick="pnGuardar()" style="padding:11px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer">✅ Agregar</button>
        </div>
      </div>
    </div>`;
    window.pnDup=val=>{
      n.nom=val;
      const d=(inv||[]).find(i=>i.nom?.toLowerCase()===val.toLowerCase());
      dup=d?`⚠️ Ya existe: ${d.cod}`:"";
      const el=$$("pn_dup");if(el)el.textContent=dup;
    };
    window.pnCat=val=>{n.cat=val;draw();};
    window.pnFoto=(tipo)=>{
      const f=$$(tipo==="prod"?"pn_foto":"pn_foto_caja")?.files?.[0];if(!f)return;
      if(tipo==="prod")fotoFile=f;else fotoCajaFile=f;
      const r=new FileReader();
      r.onload=ev=>{
        const prev=ev.target.result;
        if(tipo==="prod")fotoPreview=prev;else fotoCajaPreview=prev;
        const el=$$(tipo==="prod"?"pn_fp":"pn_fp_caja");
        if(el)el.innerHTML=`<img src="${prev}" style="width:64px;height:64px;object-fit:cover;border-radius:8px"/>`;
      };
      r.readAsDataURL(f);
    };
    window.pnGuardar=async()=>{
      n.marca=v("pn_marca");n.para=v("pn_para");n.medida=v("pn_medida");n.prov=v("pn_prov");
      n.stock=vn("pn_stock");n.min=vn("pn_min");n.precio=vn("pn_precio");
      if(esAdmin())n.costo=vn("pn_costo");
      if(!n.nom||!n.cat){alert("Nombre y categoría son obligatorios");return;}
      if(dup){alert("Ya existe ese producto");return;}
      const cod=genCod(n.cat);
      const btn=$$("pn_btn_guardar");if(btn){btn.disabled=true;btn.textContent="⏳ Guardando...";}
      let foto_url=null,foto_caja_url=null;
      if(fotoFile){
        const path=`productos/${Date.now()}_${cod}.${(fotoFile.name.split(".").pop()||"jpg")}`;
        const{error:e1}=await SB.storage.from("inventario").upload(path,fotoFile,{contentType:fotoFile.type,upsert:true});
        if(!e1)foto_url=SB.storage.from("inventario").getPublicUrl(path).data.publicUrl;
        else console.warn("Error subiendo foto:",e1.message);
      }
      if(fotoCajaFile){
        const path=`cajas/${Date.now()}_${cod}.${(fotoCajaFile.name.split(".").pop()||"jpg")}`;
        const{error:e2}=await SB.storage.from("inventario").upload(path,fotoCajaFile,{contentType:fotoCajaFile.type,upsert:true});
        if(!e2)foto_caja_url=SB.storage.from("inventario").getPublicUrl(path).data.publicUrl;
        else console.warn("Error subiendo foto caja:",e2.message);
      }
      const{data,error}=await SB.from("inventario").insert({...n,cod,foto_url,foto_caja_url}).select().single();
      if(error){
        alert("Error: "+error.message);
        if(btn){btn.disabled=false;btn.textContent="✅ Agregar";}
        return;
      }
      inv=[...inv,data].sort((a,b)=>(a.nom||"").localeCompare(b.nom||""));
      closeModal();actualizarContenido();
    };
  };
  draw();
}

    <button onclick="exportarCRMCSV()" style="padding:7px 12px;background:#16a34a20;color:#16a34a;border:1px solid #16a34a30;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">⬇ CSV</button>
  </div>
  <div class="ovf">
    <table class="tbl">
      <thead><tr>
        <th>Fecha</th><th>OT</th><th>Placa</th><th>Cliente</th><th>Vehículo</th><th>Taller</th><th>Técnico</th>

      </tr></thead>
      <tbody>
      ${filt.length===0?`<tr><td colspan="9" style="text-align:center;padding:24px;color:#334155">Sin registros</td></tr>`:""}
      ${filt.map(r=>`<tr>
        <td style="color:#64748b;font-size:10px;white-space:nowrap">${r.fecha||"—"}</td>
        <td style="color:#3b82f6;font-weight:700">${r.num||"—"}</td>
        <td style="font-weight:700">${r.placa||"—"}</td>
        <td>${r.cliente||"—"}</td>
        <td style="color:#64748b;font-size:10px">${r.vehiculo||"—"}</td>
        <td style="color:#475569;font-size:10px">${r.taller||"—"}</td>

      </tr>`).join("")}
      </tbody>

}

function exportarCRMCSV(){
  const filt=crmD.filter(r=>{const q=crmBusq.toLowerCase();return!q||(r.placa||"").toLowerCase().includes(q)||(r.cliente||"").toLowerCase().includes(q)||(r.num||"").toLowerCase().includes(q);});
  const cols=["Fecha","OT","Placa","Cliente","Vehículo","Taller","Técnico","Ganancia neta","Capital","Total"];
  const rows=filt.map(r=>[r.fecha,r.num,r.placa,r.cliente,r.vehiculo,r.taller,r.tecnico,r.ganancia_neta,r.capital,(parseFloat(r.ganancia_neta||0)+parseFloat(r.capital||0)).toFixed(2)].map(x=>`"${x||""}"`));
  blobCSV([cols.map(c=>`"${c}"`), ...rows].map(r=>r.join(",")).join("\n"),"crm_servicar.csv");
}

async function cambiarEstH(id,estado,pedirObs){
  let obs="";
  if(pedirObs){obs=prompt(`Descripción (${estado}):`);if(!obs)return;}
  await SB.from("herramientas").update({estado,...(obs?{obs}:{})}).eq("id",id);
  herrs=herrs.map(h=>h.id===id?{...h,estado,...(obs?{obs}:{})}:h);
  actualizarContenido();
}

async function eliminarHerr(id){
  if(!confirm("¿Eliminar esta herramienta?"))return;
  await SB.from("herramientas").delete().eq("id",id);
  herrs=herrs.filter(h=>h.id!==id);
  actualizarContenido();
}

async function aprobarVac(id){
  const sol=(vacSols||[]).find(s=>s.id===id);if(!sol)return;
  await SB.from("vacaciones_solicitudes").update({estado:"Aprobado",aprobado_por:usuario.nombre,fecha_aprobacion:hoy()}).eq("id",id);
  const saldo=(vacSaldos||[]).find(s=>s.trabajador===sol.trabajador);
  if(saldo){
    const nu=saldo.dias_usados+sol.dias;
    await SB.from("vacaciones_saldo").update({dias_usados:nu}).eq("id",saldo.id);
    vacSaldos=vacSaldos.map(s=>s.id===saldo.id?{...s,dias_usados:nu}:s);
  }
  vacSols=vacSols.map(s=>s.id===id?{...s,estado:"Aprobado",aprobado_por:usuario.nombre}:s);
  alert(`✅ Vacaciones aprobadas para ${sol.trabajador}`);
  actualizarContenido();
}

}

window.cargarFacturaImg=function(){
  const f=$$("fac_img")?.files?.[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement("canvas");
      const MAX=1200;let w=img.width,h=img.height;
      if(w>MAX){h=h*(MAX/w);w=MAX;}else if(h>MAX){w=w*(MAX/h);h=MAX;}
      cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
      facturaImg=cv.toDataURL("image/jpeg",0.85).split(",")[1];
      const prev=$$("fac_preview");
      if(prev) prev.innerHTML=`<img src="data:image/jpeg;base64,${facturaImg}" style="width:100%;border-radius:8px;max-height:280px;object-fit:contain;margin-bottom:8px"/>`;
      actualizarContenido();
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
};

window.analizarFactura=async function(){
  if(!facturaImg){alert("Primero subí una imagen");return;}
  if(!facturaApiKey){
    facturaApiKey=localStorage.getItem("gemini_api_key")||null;
  }
  if(!facturaApiKey){alert("Pegá tu API Key de Gemini arriba y presioná Guardar antes de analizar.");return;}
  const btn=$$("btn_analizar");if(btn){btn.disabled=true;btn.textContent="Analizando imagen...";}
  const res=$$("fac_resultado");if(res) res.innerHTML=`<div class="card" style="text-align:center;padding:20px;color:#475569">Gemini está leyendo la factura...</div>`;
  try{
    const resp=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${facturaApiKey}`,
      {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({contents:[{role:"user",parts:[
          {inline_data:{mime_type:"image/jpeg",data:facturaImg}},
          {text:`Esta es una factura o lista de compras de un taller automotriz en Bolivia. Extrae TODOS los productos con sus precios en Bolivianos. Responde SOLO con JSON válido: {"productos":[{"nombre":"...","costo":0,"cantidad":1,"precio_venta":0}]}. Sin texto adicional.`}
        ]}],generationConfig:{maxOutputTokens:1500}})
      }
    );
    if(!resp.ok){const e=await resp.json();throw new Error(e.error?.message||"Error de Gemini API");}
    const data=await resp.json();
    const jsonStr=(data.candidates?.[0]?.content?.parts?.[0]?.text||"{}").replace(/```json\n?/g,"").replace(/```\n?/g,"").trim();
    const parsed=JSON.parse(jsonStr);
    facturaProductos=(parsed.productos||[]).map(p=>({...p,categoria:"Repuestos",precio_venta:p.precio_venta||Math.round((p.costo||0)*1.3)||0}));
    mostrarProductosFactura();
  }catch(e){
    if(res) res.innerHTML=`<div class="card" style="border-color:#ef444430;text-align:center;padding:20px;color:#ef4444">Error: ${e.message}</div>`;
  }
  if(btn){btn.disabled=false;btn.textContent="Analizar con Gemini IA";}
};

window.registrarFactura=async function(){
  if(!facturaProductos.length)return;
  let ok=0,err=0;
  for(const p of facturaProductos){
    if(!p.nombre)continue;
    const cat=p.categoria||"Repuestos";
    const pref=PREF_INV[cat]||"PR";
    const{data:ex}=await SB.from("inventario").select("id,stock").ilike("nom",p.nombre).limit(1);
    if(ex?.length){
      const{error}=await SB.from("inventario").update({stock:ex[0].stock+(p.cantidad||1),costo:p.costo||ex[0].costo,precio:p.precio_venta||ex[0].precio}).eq("id",ex[0].id);
      if(error)err++;else ok++;
    } else {
      const{data:existing}=await SB.from("inventario").select("cod").like("cod",`${pref}-%`);
      const nums=(existing||[]).map(i=>parseInt(i.cod?.split("-")[1])||0);
      const cod=`${pref}-${String(Math.max(0,...(nums.length?nums:[0]))+1).padStart(3,"0")}`;
      const{error}=await SB.from("inventario").insert({nom:p.nombre,costo:p.costo||0,precio:p.precio_venta||0,stock:p.cantidad||1,cat,cod});
      if(error)err++;else ok++;
    }
  }
  await cargarInventario();
  facturaProductos=[];facturaImg=null;tab="inventario";actualizarContenido();
  alert(`Registrados: ${ok} productos${err?` · Errores: ${err}`:""}`);
};

  const clave="turno_"+uname;
  if(turno==="auto"){
    await SB.from("config").delete().eq("clave",clave);
    turnosData[uname]=null;
  }else{
    const{error}=await SB.from("config").upsert({clave,valor:turno},{onConflict:"clave"});
    if(error){alert("Error: "+error.message);return;}
    turnosData[uname]=turno;
  }
  actualizarContenido();
}

function renderAsignTurnos(){
  if(!turnosData)return`<div style="text-align:center;padding:30px;color:#475569">Cargando turnos...</div>`;
  const TRAB=[
    {uname:"evo",   nombre:"Evo",   turnoA:["07:25","17:50"],turnoB:["08:55","19:30"]},
    {uname:"diego", nombre:"Diego", turnoA:["08:55","19:30"],turnoB:["07:25","17:50"]},
  ];
  return`
  <div class="card" style="border-color:#f59e0b30">
    <div style="color:#f59e0b;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:4px">🔄 Asignación de Turnos A/B</div>
    <div style="color:#475569;font-size:11px;margin-bottom:16px">Asigná manualmente el turno de esta semana. En "Auto" se calcula por semana par/impar.</div>
    ${TRAB.map(t=>{
      const cur=turnosData[t.uname];
      return`
      <div style="background:#0f172a;border:1px solid #334155;border-radius:12px;padding:14px;margin-bottom:10px">
        <div style="font-weight:700;font-size:14px;margin-bottom:12px">👷 ${t.nombre}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
          ${["A","B","auto"].map(op=>{
            const act=(op==="auto"&&!cur)||(cur===op);
            const info=op==="A"?`${t.turnoA[0]}–${t.turnoA[1]}`:op==="B"?`${t.turnoB[0]}–${t.turnoB[1]}`:"Automático";
            return`<button onclick="guardarTurno('${t.uname}','${op}')"
              style="padding:10px 4px;border-radius:10px;border:2px solid ${act?"#f59e0b":"#334155"};
                background:${act?"#f59e0b15":"#1e293b"};color:${act?"#f59e0b":"#64748b"};
                font-weight:700;font-size:${op==="auto"?"10":"15"}px;cursor:pointer;text-align:center">
              <div>${op==="auto"?"AUTO":op}</div>
              <div style="font-size:9px;font-weight:400;margin-top:2px;color:${act?"#f59e0b":"#475569"}">${info}</div>
            </button>`;
          }).join("")}
        </div>
        <div style="margin-top:10px;font-size:11px;${cur?"color:#f59e0b;font-weight:700":"color:#475569"}">
          ${cur?`✅ Turno ${cur} asignado manualmente`:"🔄 Modo automático activo"}
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

/* ── Exponer globales ───────────────────────────────── */
[
  "cambiarTab","actualizarContenido","closeModal","salir",
  "exportarInvCSV","modalNuevoProd","verFotoInv",
  "exportarCRMCSV",
  "selWorker","cambiarEstH","eliminarHerr","modalNuevaHerr","imprimirActa",
  "calcVsDias","enviarSolicitud","aprobarVac","rechazarVac","modalEditarSaldo",
  "renderFacturas","guardarFacturaKey","mostrarProductosFactura",
  "cargarConfig","guardarConfigNotion","probarConexionNotion",
  "cargarTurnos","guardarTurno","renderAsignTurnos",
].forEach(fn=>window[fn]=eval(fn));

init();
</script>
