<!DOCTYPE html>

<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;min-height:100vh}
input,select,textarea{outline:none}
input:focus,select:focus,textarea:focus{border-color:#f59e0b!important}
.input{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#fff;font-size:13px}
.label{color:#64748b;font-size:11px;font-weight:700;margin-bottom:5px;display:block}
.card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:16px;margin-bottom:12px}
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.foto-item{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:#0f172a;border:1px solid #334155}
.foto-item img{width:100%;height:100%;object-fit:cover}
.foto-del{position:absolute;top:3px;right:3px;background:rgba(239,68,68,.9);border:none;border-radius:50%;width:20px;height:20px;color:#fff;font-size:10px;cursor:pointer}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;z-index:1000}
.modal-box{background:#1e293b;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.su{animation:su .25s ease both}
.btn-wa{display:block;text-align:center;padding:9px;background:#25d36620;color:#25d366;border:1px solid #25d36640;border-radius:10px;text-decoration:none;font-weight:700;font-size:12px;cursor:pointer}
</style>
</head>

<div id="modal-area"></div>

/* ── Sesión ──────────────────────────────────────────── */
function getSession(){
  try{
    return JSON.parse(localStorage.getItem("scp_user"))
        ||JSON.parse(localStorage.getItem("sc_user"))
        ||null;

}

/* ── Roles (por campo rol de la DB) ─────────────────── */
const esAdmin    =()=>usuario?.rol==="admin";
const esEncargado=()=>["admin","encargado"].includes(usuario?.rol);
const esMecanico =()=>usuario?.rol==="mecanico";

/* ── Init ────────────────────────────────────────────── */
async function init(){
  usuario=getSession();
  if(!usuario){location.href="/";return;}
  if(!otId){location.href="/ot.html";return;}
  await Promise.all([cargarOT(),cargarInventario(),cargarUsuarios(),cargarHijas()]);
  // Técnicos y vendedores solo pueden ver OTs asignadas a ellos
  const esLimitado=["vendedor","mecanico"].includes(usuario.rol)||/t[eé]cnico/i.test(usuario.rol||"");
  if(ot && esLimitado && ot.creado_por!==usuario.user_name && ot.tecnico!==usuario.nombre){
    document.getElementById("app").innerHTML=`
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#64748b;gap:12px;padding:24px">
        <div style="font-size:48px">🔒</div>
        <div style="font-weight:700">Solo podés ver OTs asignadas a vos</div>
        <a href="/ot.html" style="padding:10px 20px;background:#334155;color:#94a3b8;border-radius:8px;font-weight:700;font-size:13px;text-decoration:none">← Volver a mis OTs</a>
      </div>`;
    return;
  }
  render();
}

async function cargarOT(){
  const{data}=await SB.from("ots").select("*").eq("id",otId).single();
  if(!data){alert("OT no encontrada");location.href="/ot.html";return;}
  ot=data;
  const parseArr=k=>{
    if(!ot[k])ot[k]=[];
    else if(!Array.isArray(ot[k]))try{ot[k]=JSON.parse(ot[k]||"[]")}catch{ot[k]=[];}
  };
  ["procedimientos","repuestos","repuestos_usados","fotos_recepcion","fotos_trabajo","repuestos_requeridos","repuestos_conseguir","fotos_entrada","fotos_salida","problemas"].forEach(parseArr);
  // checklist_fluidos es objeto, no array
  if(!ot.checklist_fluidos||Array.isArray(ot.checklist_fluidos))ot.checklist_fluidos={};
  else if(typeof ot.checklist_fluidos==="string"){try{ot.checklist_fluidos=JSON.parse(ot.checklist_fluidos);}catch{ot.checklist_fluidos={};}}
  if(!ot.nivel_gasolina)ot.nivel_gasolina="";
  ot.adelanto =ot.adelanto ||0;
  ot.descuento=ot.descuento||0;
  if(!ot.paso||ot.paso<1)ot.paso=1;
}

async function cargarHijas(){
  const{data}=await SB.from("ots").select("id,num,estado,taller,tecnico").eq("ot_padre_id",otId).order("id",{ascending:true});
  hijas=data||[];
}

async function cargarInventario(){
  const campos=esEncargado()?"*":"id,nom,marca,cat,stock,precio,foto_url,foto_caja_url,cod";
  const{data}=await SB.from("inventario").select(campos).order("nom");
  inventario=data||[];
}

async function cargarUsuarios(){
  const{data}=await SB.from("usuarios").select("nombre,user_name,tel,taller,rol");
  usuarios_db=data||[];
}

/* ── Guardar ─────────────────────────────────────────── */
async function guardar(campos){
  const{error}=await SB.from("ots").update(campos).eq("id",otId);
  if(error){console.error("guardar error:",error);alert("Error al guardar: "+error.message);return;}
  Object.assign(ot,campos);
  render();
}

/* ── Totales ─────────────────────────────────────────── */
function calcMO ()  {return(ot.procedimientos||[]).reduce((s,x)=>s+(x.precio||0),0);}
function calcRep()  {return(ot.repuestos||[]).reduce((s,x)=>s+((x.precio||0)*(x.cantidad||1)),0);}
function calcTotal(){return calcMO()+calcRep();}
function calcCotEstimado(){
  const mo=(ot.procedimientos||[]).reduce((s,x)=>s+(x.precio||0),0);
  const rcs=(ot.repuestos_requeridos&&ot.repuestos_requeridos.length)?ot.repuestos_requeridos:(ot.repuestos_conseguir||[]);
  const rep=rcs.reduce((s,x)=>s+(x.precio_estimado||0)*(x.cantidad||1),0);
  return{mo,rep,total:mo+rep};
}

/* ── WA número por user_name ─────────────────────────── */
function cleanTel(t){return (t||"").replace(/\D/g,"").replace(/^591/,"").replace(/^0/,"");}
function waNum(user_name){
  const u=usuarios_db.find(x=>x.user_name===user_name?.toLowerCase());
  if(u?.tel) return "591"+cleanTel(u.tel);
  return WA_MAP[user_name?.toLowerCase()]||"";
}
function waClienteHref(){
  const probs=(ot.problemas||[]).length>0?(ot.problemas||[]).join(", "):(ot.problema||"Sin descripción");
  const msg=`Hola ${ot.cliente||"cliente"} 👋, le contactamos de *SERVI CAR PLATINIUM*.\n\n✅ Su vehículo ha sido registrado en nuestro sistema.\n\n🚗 *Datos del vehículo:*\n• Placa: ${ot.placa||"—"}\n• Vehículo: ${ot.marca||""} ${ot.modelo||""} ${ot.anio||""}\n• Km ingreso: ${ot.km||"No registrado"}\n\n🔧 *Problema reportado:*\n${probs}\n\n📋 *Estado:* En revisión — le notificaremos con la cotización pronto.\n\n📍 *SERVI CAR PLATINIUM*\nGracias por confiar en nosotros 🙏`;
  return `https://wa.me/591${cleanTel(ot.tel)}?text=${encodeURIComponent(msg)}`;
}

/* ── Fotos ───────────────────────────────────────────── */
function tomarFoto(campo){
  const inp=document.createElement("input");
  inp.type="file";inp.accept="image/*";inp.capture="environment";
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=async e=>{
      const img=new Image();
      img.onload=async()=>{
        const c=document.createElement("canvas");
        const MAX=700;let w=img.width,h=img.height;
        if(w>MAX){h=h*MAX/w;w=MAX;}
        c.width=w;c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        const b64=c.toDataURL("image/jpeg",0.75);
        await guardar({[campo]:[...(ot[campo]||[]),b64]});
      };img.src=e.target.result;
    };r.readAsDataURL(f);
  };inp.click();
}

async function borrarFoto(campo,idx){
  if(!esAdmin())return;
  if(!confirm("¿Borrar foto?"))return;
  const arr=[...(ot[campo]||[])];arr.splice(idx,1);
  await guardar({[campo]:arr});
}

function renderFotos(campo){
  const arr=ot[campo]||[];
  const admin=esAdmin();
  return arr.length===0
    ?`<div style="color:#334155;font-size:11px;text-align:center;padding:8px">Sin fotos</div>`
    :`<div class="foto-grid">${arr.map((f,i)=>`
      <div class="foto-item">
        <img src="${f}" onclick="verFoto('${campo}',${i})"/>
        ${admin?`<button class="foto-del" onclick="borrarFoto('${campo}',${i})">✕</button>`:""}

function verFoto(campo,idx){

}

/* ── PASO 2: Diagnóstico ─────────────────────────────── */

async function guardarServicio(idx){
  const nombre=(document.getElementById("srv_nombre")?.value||"").trim();
  const desc=(document.getElementById("srv_desc")?.value||"").trim();
  const tiempo=(document.getElementById("srv_tiempo")?.value||"").trim();
  const precio=parseFloat(document.getElementById("srv_precio")?.value)||0;
  if(!nombre){alert("Escribe el nombre del servicio");return;}
  const arr=[...(ot.procedimientos||[])];
  const item={nombre,desc,tiempo,tecnico:usuario.nombre,precio};
  if(idx>=0) arr[idx]={...arr[idx],...item};
  else arr.push(item);
  await guardar({procedimientos:arr});
  cerrarModal();
}

async function borrarServicio(idx){
  if(!esAdmin())return;

}

function buscarInvRR(){
  const q=(document.getElementById("rr_nombre")?.value||"").toLowerCase().trim();
  const res=document.getElementById("rr_inv_res");
  const badge=document.getElementById("rr_stock_badge");
  if(!res) return;
  if(q.length<2){res.style.display="none";res.innerHTML="";if(badge)badge.innerHTML="";return;}
  const matches=inventario.filter(i=>(i.nom||"").toLowerCase().includes(q)||(i.marca||"").toLowerCase().includes(q)).slice(0,6);
  res.style.display="block";
  if(!matches.length){
    res.innerHTML=`<div style="color:#64748b;font-size:11px;padding:8px">Sin coincidencias en inventario — se buscará externo</div>`;
    if(badge) badge.innerHTML=`<span style="color:#f59e0b;font-size:11px">🔍 No está en inventario — a conseguir</span>`;
    return;
  }
  res.innerHTML=matches.map(i=>`
    <div onclick="selInvRR('${(i.nom||"").replace(/'/g,"\\'")}',${i.stock>0},${i.stock||0})"
      style="padding:8px 10px;border-bottom:1px solid #1e293b;cursor:pointer;display:flex;justify-content:space-between;align-items:center">
      <span style="color:#fbbf24;font-size:12px;font-weight:700">${i.nom}</span>
      <span style="color:${i.stock>0?"#16a34a":"#ef4444"};font-size:11px;font-weight:700">${i.stock>0?"✅ "+i.stock+" disp.":"❌ Sin stock"}</span>
    </div>`).join("");
}

function selInvRR(nom,hayStock,stock){
  const inp=document.getElementById("rr_nombre");
  const badge=document.getElementById("rr_stock_badge");
  const res=document.getElementById("rr_inv_res");
  if(inp) inp.value=nom;
  if(badge) badge.innerHTML=hayStock
    ?`<span style="color:#16a34a;font-size:11px;font-weight:700">✅ En inventario — ${stock} disponibles</span>`
    :`<span style="color:#ef4444;font-size:11px;font-weight:700">❌ Sin stock en tienda — a conseguir</span>`;
  badge.dataset.hayStock=hayStock?"1":"0";
  if(res){res.style.display="none";res.innerHTML="";}
}

async function enviarInformeEncargado(){
  if(!(ot.procedimientos||[]).length){alert("Agrega al menos un servicio antes de enviar.");return;}
  const procs=(ot.procedimientos||[]).map((p,i)=>`${i+1}. *${p.nombre}*\n   ${p.desc}`).join("\n\n");

}

/* ── PASO 3: Cotización ──────────────────────────────── */
let _cotSrvExtra=0, _cotRepExtra=0;

function recalcTot(){
  let mo=0,rep=0;
  document.querySelectorAll("[data-cotmo]").forEach(el=>mo+=(parseFloat(el.value)||0));
  document.querySelectorAll("[data-cotrep]").forEach(el=>rep+=(parseFloat(el.value)||0)*(parseFloat(el.dataset.cant)||1));
  const em=document.getElementById("tot_mo");
  const er=document.getElementById("tot_rep");
  const eg=document.getElementById("tot_gen");
  if(em)em.textContent="Bs. "+mo;
  if(er)er.textContent="Bs. "+rep;
  if(eg)eg.textContent="Bs. "+(mo+rep);
}

async function guardarCotizacion(){
  const procs=[...(ot.procedimientos||[])];
  procs.forEach((_,i)=>{
    const nom=document.getElementById(`mo_nom_${i}`);
    const desc=document.getElementById(`mo_desc_${i}`);
    const precio=document.getElementById(`mo_${i}`);
    if(nom) procs[i].nombre=nom.value.trim()||procs[i].nombre;
    if(desc) procs[i].desc=desc.value.trim();
    if(precio) procs[i].precio=parseFloat(precio.value)||0;
  });
  for(let i=0;i<_cotSrvExtra;i++){
    const nom=(document.getElementById(`cot_srv_nom_${i}`)?.value||"").trim();
    const precio=parseFloat(document.getElementById(`cot_srv_precio_${i}`)?.value)||0;
    if(nom) procs.push({nombre:nom,desc:"",precio,tecnico:usuario.nombre});
  }

  const rcs=[...((ot.repuestos_requeridos&&ot.repuestos_requeridos.length)?ot.repuestos_requeridos:(ot.repuestos_conseguir||[]))];
  rcs.forEach((_,i)=>{
    const nom=document.getElementById(`rp_nom_${i}`);
    const p=document.getElementById(`rp_${i}`);
    const v=document.getElementById(`inv_${i}`);
    if(nom) rcs[i].nombre=nom.value.trim()||rcs[i].nombre;
    if(p)rcs[i].precio_estimado=parseFloat(p.value)||0;
    if(v)rcs[i].en_inventario=v.value==="1";
  });
  for(let i=0;i<_cotRepExtra;i++){
    const nom=(document.getElementById(`cot_rep_nom_${i}`)?.value||"").trim();
    const precio=parseFloat(document.getElementById(`cot_rep_precio_${i}`)?.value)||0;
    const enInv=document.getElementById(`cot_rep_inv_${i}`)?.value==="1";
    if(nom) rcs.push({nombre:nom,nota:"",cantidad:1,unidad:"unid",conseguido:false,precio_estimado:precio,en_inventario:enInv});
  }

  const adelanto=parseFloat(document.getElementById("cot_adelanto")?.value)||0;
  const moTotal=procs.reduce((s,p)=>s+(p.precio||0),0);
  const repTotal=rcs.reduce((s,r)=>s+(r.precio_estimado||0)*(r.cantidad||1),0);
  const total=moTotal+repTotal;
  await guardar({procedimientos:procs,repuestos_requeridos:rcs,adelanto,total,paso:4,estado:"Cotización enviada"});
  cerrarModal();
  enviarCotizacionWA();
}

async function enviarCotizacionWA(){
  const cot=calcCotEstimado();
  if(cot.total===0){
    alert("⚠️ Primero define los precios en la cotización antes de enviar al cliente.");
    return;
  }
  if(ot.estado==="Pendiente cotización"){
    await guardar({paso:4,estado:"Cotización enviada"});
  }
  const nombre=(ot.cliente||"cliente").split(" ")[0];
  const vehiculo=`${ot.marca||""} ${ot.modelo||""}`.trim()||"vehículo";
  const probs=(ot.problemas||[]).length>0
    ?(ot.problemas||[]).map((p,i)=>`${i+1}. ${p}`).join("\n")
    :(ot.problema||"—");
  const moLines=(ot.procedimientos||[]).filter(p=>p.precio>0).map((p,i)=>`${i+1}. ${p.nombre}: Bs. ${p.precio}`).join("\n");
  const repLines=(ot.repuestos_requeridos||[]).filter(r=>r.precio_estimado>0).map((r,i)=>`${i+1}. ${r.nombre}: Bs. ${r.precio_estimado}`).join("\n");
  const cotDesglose=[moLines,repLines].filter(Boolean).join("\n")||"(ver con el encargado)";
  const dir=(ot.taller||"").includes("Montes")?"Viacha - Zona Montes":"Viacha - Bella Vista";
  const msg=`Hola ${nombre} 👋, le contactamos de *SERVI CAR PLATINIUM*.\n\nSu vehículo *${vehiculo}* - Placa *${ot.placa||"—"}* está en nuestro taller.\n\n🔧 *Trabajo a realizar:*\n${probs}\n\n💰 *Cotización:*\n${cotDesglose}\n*Total: Bs. ${cot.total}*\n\n¿Aprueba el presupuesto para proceder con el trabajo?\n\n📍 Estamos en ${dir}\n⏰ Horario: Lun-Sáb 7:00 - 19:00`;
  const tel=ot.tel?`591${cleanTel(ot.tel)}`:null;
  if(tel) window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`,"_blank");
  else alert("Sin teléfono del cliente. Estado actualizado a 'Cotización enviada'.");
}

function esVinculado(rc, repUsados){
  const n=(rc.nombre||"").toLowerCase().trim();
  if(!n)return true;
  return repUsados.some(r=>{
    const rn=(r.nombre||"").toLowerCase().trim();
    return rn.includes(n)||n.includes(rn);
  });
}

async function marcarTerminado(){
  // Validar vinculación
  const repCot=ot.repuestos_conseguir||[];
  const repUsados=ot.repuestos||[];
  const sinVincular=repCot.filter(rc=>!esVinculado(rc,repUsados));
  if(sinVincular.length>0){
    alert(`⛔ Faltan ${sinVincular.length} repuesto(s) sin vincular al inventario:\n${sinVincular.map(r=>"• "+r.nombre).join("\n")}`);
    return;
  }
  // Validar y descontar stock
  for(const r of repUsados){
    const p=inventario.find(x=>x.id===r.inv_id);
    if(!p)continue;
    if((p.stock||0)<r.cantidad){
      alert(`❌ Stock insuficiente: solo hay ${p.stock} unidad(es) de "${r.nombre}"`);
      return;
    }
  }
  for(const r of repUsados){
    const p=inventario.find(x=>x.id===r.inv_id);
    if(!p)continue;
    const nuevoStock=Math.max(0,(p.stock||0)-r.cantidad);
    await SB.from("inventario").update({stock:nuevoStock}).eq("id",p.id);
    p.stock=nuevoStock;
  }
  const mo=calcMO(),rep=calcRep(),total=mo+rep;
  await guardar({paso:6,estado:"Listo para entregar",total});
  const encUN=ot.taller?.includes("Montes")?"william":"wilfredo";
  const numEnc=waNum(encUN);
  const msg=`🔧 *SERVI CAR PLATINIUM*\n✅ *Trabajo terminado — OT #${otId}*\n\n🚗 *${ot.placa} · ${ot.marca||""} ${ot.modelo||""}*\n👤 Cliente: ${ot.cliente||"-"}\n🔧 Técnico: ${usuario.nombre}\n\n✅ El trabajo está terminado y listo para revisión/entrega. El encargado debe realizar el cobro.\n\n_Listo para entregar._`;
  if(numEnc) window.open(`https://wa.me/${numEnc}?text=${encodeURIComponent(msg)}`,"_blank");
}

function actualizarSaldo(){
  const mo=(ot.procedimientos||[]).reduce((s,x)=>s+(x.precio||0),0);
  const repArr=[...(ot.repuestos||[]),...(ot.repuestos_usados||[])];
  const rep=repArr.reduce((s,x)=>s+((x.precio||0)*(x.cantidad||1)),0);
  const total=mo+rep;
  const desc=parseFloat(document.getElementById("cobro_desc")?.value)||0;
  const adel=parseFloat(document.getElementById("cobro_adelanto")?.value)||0;
  const el=document.getElementById("cobro_saldo");
  if(el)el.textContent=`A cobrar: Bs. ${Math.max(0,total-desc-adel)}`;
}

async function confirmarCobro(){
  if(!esEncargado()){alert("Sin permiso.");return;}
  const mo=(ot.procedimientos||[]).reduce((s,x)=>s+(x.precio||0),0);
  const repArr=[...(ot.repuestos||[]),...(ot.repuestos_usados||[])];
  /* venta_rep = lo que pagó el cliente por repuestos (precio_venta × cant) */
  const venta_rep=repArr.reduce((s,x)=>s+((x.precio||0)*(x.cantidad||1)),0);
  /* capital = lo que costó comprar los repuestos (costo inventario × cant) */
  const capital=repArr.reduce((s,x)=>{
    const inv_item=inventario.find(i=>i.id===x.inv_id);
    return s+((inv_item?.costo||0)*(x.cantidad||1));
  },0);
  const margen_rep=venta_rep-capital;
  const ganancia_neta=mo+margen_rep;   /* MO + margen de repuestos */
  const total=mo+venta_rep;            /* total cobrado al cliente  */
  const desc=parseFloat(document.getElementById("cobro_desc")?.value)||0;
  const adelanto=parseFloat(document.getElementById("cobro_adelanto")?.value)||0;
  const metodo=document.getElementById("cobro_metodo")?.value||"Efectivo";
  const total_final=Math.max(0,total-desc);
  const saldo=Math.max(0,total_final-adelanto);

  const btn=document.getElementById("btn_cobro");
  if(btn){btn.disabled=true;btn.textContent="⏳ Procesando...";}

  const repuestoSinCosto=repArr.find(x=>{
    const inv_item=inventario.find(i=>i.id===x.inv_id);
    return !inv_item||parseFloat(inv_item?.costo||0)<=0;
  });
  if(repuestoSinCosto){
    alert("No se puede cobrar: el repuesto "+(repuestoSinCosto.nom||repuestoSinCosto.nombre||repuestoSinCosto.descripcion||"seleccionado")+" no tiene costo registrado en inventario.");
    if(btn){btn.disabled=false;btn.textContent="✅ Confirmar cobro y entregar";}
    return;
  }
  if(venta_rep>0&&venta_rep<capital){
    alert("No se puede cobrar: el precio de venta de repuestos es menor al costo.");
    if(btn){btn.disabled=false;btn.textContent="✅ Confirmar cobro y entregar";}
    return;
  }

  try{
    /* CRM */
    await SB.from("crm").insert({
      nombre:ot.cliente,tel:ot.tel,placa:ot.placa,
      marca:ot.marca,modelo:ot.modelo,
      servicio:JSON.stringify(ot.procedimientos||[]),
      repuestos:JSON.stringify(repArr),
      total:total_final,descuento:desc,adelanto,
      ganancia_neta,capital,
      fecha:new Date().toLocaleDateString("es-BO"),
      taller:ot.taller,tecnico:ot.tecnico,metodo_pago:metodo
    });
    /* Caja — ganancia neta (MO + margen repuestos) */
    if(ganancia_neta>0) await SB.from("caja").insert({
      concepto:`OT ${ot.num||otId} — Ganancia/MO`,
      monto:ganancia_neta,tipo:"ingreso",subtipo:"ganancia_neta",
      taller:ot.taller,fecha:new Date().toLocaleDateString("es-BO"),
      registrado_por:usuario.user_name,metodo_pago:metodo
    });
    /* Caja — capital tienda (costo real de repuestos) */
    if(capital>0) await SB.from("caja").insert({
      concepto:`OT ${ot.num||otId} — Capital repuestos`,
      monto:capital,tipo:"ingreso",subtipo:"capital_tienda",
      taller:ot.taller,fecha:new Date().toLocaleDateString("es-BO"),
      registrado_por:usuario.user_name,metodo_pago:metodo
    });
    /* OT cerrada */
    await guardar({
      paso:6,estado:"Entregado",entregado:true,
      entregado_por:usuario.nombre,
      fecha_entrega:new Date().toLocaleDateString("es-BO"),
      total:total_final,ganancia_neta,capital,
      descuento:desc,adelanto,metodo_pago:metodo
    });
    cerrarModal();
    enviarComprobanteCliente(mo,venta_rep,total,desc,adelanto,total_final,saldo,metodo);
    notionGuardarOT(mo,venta_rep).then(ok=>notionToast(ok));
  }catch(e){
    alert("Error: "+e.message);
    if(btn){btn.disabled=false;btn.textContent="✅ Confirmar cobro y entregar";}
  }
}

function enviarComprobanteCliente(mo,rep,total,desc,adelanto,total_final,saldo,metodo){
  const moList=(ot.procedimientos||[]).map((s,i)=>`${i+1}. ${s.nombre} — Bs. ${s.precio||0}`).join("\n");
  const repList=(ot.repuestos||[]).map((r,i)=>`${i+1}. ${r.nombre} x${r.cantidad} — Bs. ${(r.precio||0)*(r.cantidad||1)}`).join("\n");
  const msg=`🔧 *SERVI CAR PLATINIUM*\n✅ *COMPROBANTE DE ENTREGA*\n📋 OT #${otId} · ${new Date().toLocaleDateString("es-BO")}\n\n🚗 *${ot.placa} · ${ot.marca||""} ${ot.modelo||""}*\n👤 ${ot.cliente||"-"}\n\n*🔧 SERVICIOS:*\n${moList||"—"}\n\n*📦 REPUESTOS:*\n${repList||"—"}\n\n💰 Total: Bs. ${total}${desc>0?`\n🎁 Descuento: -Bs. ${desc}\n💰 Total final: Bs. ${total_final}`:""}\n${adelanto>0?`✅ Adelanto: Bs. ${adelanto}\n💳 Saldo cobrado: Bs. ${saldo}`:""}\n💳 Método: ${metodo}\n\n✅ *Su vehículo ha sido entregado.*\n⚠️ Garantía: 30 días en mano de obra\n📞 ${EMPRESA.tel1} / ${EMPRESA.tel2}`;
  const numCliente=ot.tel?`591${cleanTel(ot.tel)}`:null;
  if(numCliente) window.open(`https://wa.me/${numCliente}?text=${encodeURIComponent(msg)}`,"_blank");
}

async function subirFoto(campo,b64){
  let url=b64;
  try{
    const path=`${otId}/${campo}_${Date.now()}.jpg`;
    const blob=await (await fetch(b64)).blob();
    const{error:upErr}=await SB.storage.from("ot-fotos").upload(path,blob,{contentType:"image/jpeg",upsert:true});
    if(!upErr) url=SB.storage.from("ot-fotos").getPublicUrl(path).data.publicUrl;
  }catch{}
  await guardar({[campo]:[...(ot[campo]||[]),url]});
}

function tomarFotoEntrada(){
  if((ot.fotos_entrada||[]).length>=4){alert("Máximo 4 fotos de entrada");return;}
  const inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.capture="environment";
  inp.onchange=()=>{
    const f=inp.files[0];if(!f)return;
    const r=new FileReader();r.onload=e=>{
      const img=new Image();img.onload=()=>{
        const c=document.createElement("canvas");const MAX=800;let w=img.width,h=img.height;
        if(w>MAX){h=h*MAX/w;w=MAX;}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
        subirFoto("fotos_entrada",c.toDataURL("image/jpeg",.75));
      };img.src=e.target.result;
    };r.readAsDataURL(f);
  };inp.click();
}

    `<div style="color:#334155;font-size:11px;text-align:center;padding:8px">Cotización en proceso</div>`}
  </div>`:""}

  <!-- ════════════════════════════════════════════
       PASO 4: APROBACIÓN  (visible enc o paso≥4)
  ════════════════════════════════════════════ -->
  ${enc||paso>=4?`

    <div style="color:${sc(4)};font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:12px">✅ Paso 4 — Aprobación del cliente</div>
    ${paso>4||ot.aprobado?`
      <div style="background:#16a34a15;border:1px solid #16a34a30;border-radius:10px;padding:10px;text-align:center;color:#4ade80;font-size:12px;font-weight:700">✅ Cliente aprobó el trabajo</div>`

      <div style="background:#ef444415;border:1px solid #ef444430;border-radius:10px;padding:10px;text-align:center;color:#fca5a5;font-size:12px;font-weight:700">❌ Cliente rechazó la cotización</div>`
    :enc&&paso===4?`
      <div style="color:#94a3b8;font-size:12px;margin-bottom:12px">
        ¿El cliente aprobó la cotización de <strong style="color:#fbbf24">Bs. ${cot.total}</strong>?
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="registrarAprobacion()" style="flex:1;padding:11px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer">✅ Sí, aprobó</button>
        <button onclick="rechazarCotizacion()" style="flex:1;padding:11px;background:#ef444415;color:#ef4444;border:1px solid #ef444430;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer">❌ No aprobó</button>
      </div>`:
    `<div style="color:#334155;font-size:11px;text-align:center;padding:8px">Esperando respuesta del cliente</div>`}
  </div>`:""}

  <!-- ════════════════════════════════════════════
       PASO 5: EJECUCIÓN  (visible paso≥5)
  ════════════════════════════════════════════ -->
  ${paso>=5?`

      ${repCotInfo.map(({rc,added,invMatches})=>{

        if(invMatches.length>0) return`<div style="padding:8px 10px;background:#0f172a;border:1px solid #f59e0b40;border-radius:8px;margin-bottom:6px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div><div style="font-size:12px;font-weight:700;color:#fbbf24">${rc.nombre}</div><div style="font-size:10px;color:#64748b">×${rc.cantidad||1} ${rc.unidad||"unid"}</div></div><span style="color:#f59e0b;font-size:10px;font-weight:700">✅ En inventario</span></div>${invMatches.map(m=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:#1e293b;border-radius:6px;margin-bottom:4px"><div><div style="font-size:11px;font-weight:700">${m.nom||m.nombre}</div><div style="font-size:10px;color:#64748b">Stock: ${m.stock} · Bs. ${m.precio||0}</div></div><button onclick="confirmarVinculacion(${m.id},${rc.cantidad||1})" style="padding:4px 8px;background:#16a34a;color:#fff;border:none;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer">Agregar</button></div>`).join("")}</div>`;
        return`<div style="padding:8px 10px;background:#0f172a;border:1px solid #ef444440;border-radius:8px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:12px;font-weight:700;color:#f87171">${rc.nombre}</div><div style="font-size:10px;color:#64748b">×${rc.cantidad||1} ${rc.unidad||"unid"}</div></div><div style="text-align:right"><div style="color:#ef4444;font-size:10px;font-weight:700">⚠️ No en inventario</div><a href="admin.html" target="_blank" style="font-size:9px;color:#f97316;text-decoration:underline">➕ Registrar</a></div></div>`;
      }).join("")}
    </div>`:""}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="color:#60a5fa;font-size:11px;font-weight:700">Repuestos del inventario</div>
      <button onclick="modalRepInventario()" style="padding:5px 10px;background:#1d4ed820;color:#60a5fa;border:1px solid #1d4ed840;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer">+ Agregar</button>
    </div>
    ${(ot.repuestos||[]).length===0
      ?`<div style="color:#334155;font-size:11px;text-align:center;padding:8px">Sin repuestos registrados</div>`
      :(ot.repuestos||[]).map((r,i)=>`
      <div style="padding:10px;background:#0f172a;border:1px solid #334155;border-radius:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
        <div style="display:flex;gap:8px;align-items:center">
          ${r.foto?`<img src="${r.foto}" style="width:32px;height:32px;border-radius:6px;object-fit:cover"/>`:
            `<div style="width:32px;height:32px;background:#334155;border-radius:6px;display:flex;align-items:center;justify-content:center">📦</div>`}
          <div>
            <div style="font-size:12px;font-weight:700">${r.nombre} x${r.cantidad}</div>
            <div style="font-size:10px;color:#fbbf24;cursor:pointer" onclick="editarPrecioRep(${i})">Bs. ${(r.precio||0)*(r.cantidad||1)} ✏️</div>
          </div>
        </div>
        ${admin?`<button onclick="borrarRepUsado(${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px">🗑</button>`:""}
      </div>`).join("")}
    ${(ot.repuestos||[]).length>0?`<div style="text-align:right;color:#fbbf24;font-weight:700;font-size:13px;padding-top:6px;border-top:1px solid #334155">Subtotal: Bs. ${rep}</div>`:""}
    <div style="margin-bottom:14px"></div>

    <!-- Servicios adicionales (enc) -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="color:#a78bfa;font-size:11px;font-weight:700">⚡ Servicios adicionales</div>
      <button onclick="modalServicioExtra()" style="padding:5px 10px;background:#7c3aed20;color:#a78bfa;border:1px solid #7c3aed40;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer">+ Agregar</button>
    </div>
    ${extras.length===0
      ?`<div style="color:#334155;font-size:11px;text-align:center;padding:8px">Sin servicios adicionales</div>`
      :extras.map(s=>`
      <div style="padding:10px;background:#0f172a;border:1px solid #7c3aed30;border-radius:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:12px;font-weight:700">${s.nombre}</div>
          <div style="font-size:10px;color:#fbbf24">Bs. ${s.precio||0}</div>
        </div>
        ${admin?`<button onclick="borrarServicioExtra(${s._oi})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px">🗑</button>`:""}
      </div>`).join("")}
    ${extras.length>0?`<div style="text-align:right;color:#a78bfa;font-weight:700;font-size:12px;padding-top:6px;border-top:1px solid #334155;margin-bottom:12px">Subtotal extra: Bs. ${extras.reduce((s,e)=>s+(e.precio||0),0)}</div>`:"<div style='margin-bottom:10px'></div>"}

    <!-- Actualizar cotización final -->
    ${paso===5?`
    <button id="btn_act_cot" onclick="actualizarCotFinal()" style="width:100%;padding:10px;background:#7c3aed20;color:#a78bfa;border:1px solid #7c3aed40;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;margin-bottom:10px">
      💾 Actualizar cotización final (Bs. ${mo+rep})
    </button>`:""}
    `:""}

    <!-- Fotos del trabajo -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="color:#64748b;font-size:10px;font-weight:700;text-transform:uppercase">📷 Evidencia del trabajo (${(ot.fotos_trabajo||[]).length})</div>
      <button onclick="tomarFoto('fotos_trabajo')" style="padding:5px 10px;background:#1d4ed820;color:#60a5fa;border:1px solid #1d4ed840;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer">📷 Foto</button>
    </div>
    ${renderFotos("fotos_trabajo")}

    <!-- Fotos de salida -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;margin-top:12px">
      <div style="color:#22d3ee;font-size:10px;font-weight:700;text-transform:uppercase">📷 Fotos de salida (${(ot.fotos_salida||[]).length})</div>
      <button onclick="tomarFotoSalida()" style="padding:5px 10px;background:#22d3ee20;color:#22d3ee;border:1px solid #22d3ee40;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer">📷 Foto</button>
    </div>
    ${renderFotos("fotos_salida")}

    <!-- Estimado de entrega -->
    ${paso===5?`
    <div style="margin-top:12px">
      <div class="label">⏱ Estimado de entrega (ej: "hoy 3pm", "mañana por la mañana")</div>
      <div style="display:flex;gap:6px">
        <input id="estimado_input" type="text" class="input" style="flex:1"
          placeholder="hoy 3pm / mañana / 2 días"
          value="${ot.estimado_entrega||""}"/>
        <button onclick="guardar({estimado_entrega:document.getElementById('estimado_input').value})"
          style="padding:8px 12px;background:#334155;color:#94a3b8;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0">
          💾
        </button>
      </div>
    </div>`:""}

    <!-- Marcar terminado -->
    ${paso===5?`
    ${enc&&sinVincular>0?`
    <div style="background:#ef444415;border:1px solid #ef444430;border-radius:10px;padding:10px;text-align:center;margin-top:10px;font-size:12px;color:#fca5a5;font-weight:700">
      ⛔ Debes vincular todos los repuestos al inventario (${sinVincular} pendiente${sinVincular>1?"s":""})
    </div>`:`
    <button onclick="marcarTerminado()" style="width:100%;padding:12px;background:#22d3ee;color:#0f172a;border:none;border-radius:10px;font-weight:900;font-size:13px;cursor:pointer;margin-top:10px">
      🏁 Marcar trabajo terminado → Listo para entregar
    </button>`}`:""}
  </div>`:""}

  <!-- Vista técnico cuando ya está listo para entregar -->
  ${!enc&&paso>=6?`
  <div class="card">
    <div style="background:${ot.entregado?"#16a34a15":"#22d3ee15"};border:1px solid ${ot.entregado?"#16a34a30":"#22d3ee30"};border-radius:12px;padding:14px;text-align:center">
      <div style="color:${ot.entregado?"#4ade80":"#22d3ee"};font-weight:900;font-size:14px;margin-bottom:4px">
        ${ot.entregado?"✅ Vehículo entregado al cliente":"🏁 Listo para entregar"}
      </div>
      <div style="color:#64748b;font-size:11px">
        ${ot.entregado?`Entregado el ${ot.fecha_entrega||"—"}`:"El encargado realizará el cobro y cierre de la OT"}
      </div>
    </div>
  </div>`:""}

  <!-- ════════════════════════════════════════════
       PASO 6: COBRO Y ENTREGA  (enc + paso≥6)
  ════════════════════════════════════════════ -->
  ${enc&&paso>=6?`
  <div style="background:#1e293b;border:1px solid ${bd(6)};border-radius:14px;padding:16px;margin-bottom:12px">
    <div style="color:${sc(6)};font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:12px">💵 Paso 6 — Cobro y entrega</div>

    ${ot.entregado?`
    <div style="background:#16a34a15;border:1px solid #16a34a30;border-radius:12px;padding:14px;text-align:center;margin-bottom:12px">
      <div style="color:#4ade80;font-weight:900;font-size:15px;margin-bottom:4px">✅ Vehículo entregado</div>
      <div style="color:#64748b;font-size:11px">
        ${ot.fecha_entrega||"—"} · ${ot.entregado_por||"—"} · ${ot.metodo_pago||"—"}
      </div>
    </div>`:`
    <!-- Resumen financiero -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px">
      <div style="background:#16a34a12;border:1px solid #16a34a25;border-radius:10px;padding:10px;text-align:center">
        <div style="color:#475569;font-size:9px;font-weight:700;margin-bottom:4px">GANANCIA</div>
        <div style="color:#16a34a;font-weight:900;font-size:16px">Bs.${mo}</div>
        <div style="color:#334155;font-size:9px">Mano de obra</div>
      </div>
      <div style="background:#1d4ed812;border:1px solid #1d4ed825;border-radius:10px;padding:10px;text-align:center">
        <div style="color:#475569;font-size:9px;font-weight:700;margin-bottom:4px">CAPITAL</div>
        <div style="color:#60a5fa;font-weight:900;font-size:16px">Bs.${rep}</div>
        <div style="color:#334155;font-size:9px">Repuestos</div>
      </div>
      <div style="background:#fbbf2412;border:1px solid #fbbf2425;border-radius:10px;padding:10px;text-align:center">
        <div style="color:#475569;font-size:9px;font-weight:700;margin-bottom:4px">TOTAL</div>
        <div style="color:#fbbf24;font-weight:900;font-size:16px">Bs.${total}</div>
        <div style="color:#334155;font-size:9px">A cobrar</div>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <button onclick="enviarCotizacionCliente()" class="btn-wa" style="flex:1">📤 Cotización final</button>
      <button onclick="modalRepInventario()" style="flex:1;padding:9px;background:#1d4ed820;color:#60a5fa;border:1px solid #1d4ed840;border-radius:10px;font-weight:700;font-size:11px;cursor:pointer">+ Repuesto</button>
    </div>
    <!-- Notificación al cliente -->
    <button onclick="notificarClienteListo()" style="width:100%;padding:11px;background:#25d36620;color:#25d366;border:1px solid #25d36640;border-radius:10px;font-weight:900;font-size:13px;cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px">
      📱 Notificar cliente — vehículo listo
    </button>
    <button onclick="modalCobro()" style="width:100%;padding:14px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-weight:900;font-size:14px;cursor:pointer">
      💵 Cobrar y entregar vehículo
    </button>`}

    <button onclick="generarPDF()" style="width:100%;padding:10px;background:#1d4ed820;color:#60a5fa;border:1px solid #1d4ed840;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;margin-top:8px">
      📄 Generar PDF / Comprobante
    </button>
    ${ot.entregado?`
    <button onclick="enviarComprobanteWA()" style="width:100%;padding:11px;background:#25d36620;color:#25d366;border:1px solid #25d36640;border-radius:10px;font-weight:900;font-size:13px;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px">
      📱 Enviar comprobante al cliente por WhatsApp
    </button>`:""}
  </div>`:""}

  <!-- ════════════════════════════════════════════
       HISTORIAL / SEGUIMIENTO (enc + admin)
  ════════════════════════════════════════════ -->
  ${enc?`
  <div class="card">
    <div style="color:#64748b;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">📋 Historial de seguimiento</div>
    <div style="position:relative;padding-left:22px">
      <div style="position:absolute;left:7px;top:8px;bottom:8px;width:2px;background:#334155;border-radius:2px"></div>

      <!-- Recepcionado -->
      <div style="position:relative;margin-bottom:12px">
        <div style="position:absolute;left:-17px;top:4px;width:10px;height:10px;border-radius:50%;background:#16a34a;border:2px solid #0f172a"></div>
        <div style="font-size:12px;font-weight:700;color:#4ade80">📥 Vehículo recepcionado</div>
        <div style="font-size:10px;color:#475569;margin-top:1px">${ot.fecha||"—"} · Registrado por ${ot.creado_por||"—"}</div>
        ${ot.problema?`<div style="font-size:10px;color:#334155;margin-top:2px;font-style:italic">"${ot.problema}"</div>`:""}
      </div>

      <!-- Diagnóstico enviado al encargado -->
      ${ot.informe_enviado?`
      <div style="position:relative;margin-bottom:12px">
        <div style="position:absolute;left:-17px;top:4px;width:10px;height:10px;border-radius:50%;background:#3b82f6;border:2px solid #0f172a"></div>
        <div style="font-size:12px;font-weight:700;color:#60a5fa">🔍 Diagnóstico enviado al encargado</div>
        <div style="font-size:10px;color:#475569;margin-top:1px">Por: ${ot.tecnico||"—"}</div>
      </div>`:""}

      <!-- Cotización enviada al cliente -->
      ${paso>=4||["Cotización enviada","En proceso","Listo para entregar","Entregado"].includes(ot.estado)?`
      <div style="position:relative;margin-bottom:12px">
        <div style="position:absolute;left:-17px;top:4px;width:10px;height:10px;border-radius:50%;background:#f59e0b;border:2px solid #0f172a"></div>
        <div style="font-size:12px;font-weight:700;color:#fbbf24">💰 Cotización enviada al cliente</div>
        ${cot.total>0?`<div style="font-size:10px;color:#475569;margin-top:1px">Total estimado: <strong style="color:#fbbf24">Bs. ${cot.total}</strong>${ot.adelanto>0?" · Adelanto: Bs. "+ot.adelanto:""}</div>`:""}
        ${ot.tel?`<div style="font-size:10px;color:#25d366;margin-top:1px">📱 Enviado por WhatsApp al ${ot.tel}</div>`:""}
      </div>`:""}

      <!-- Cliente aprobó -->
      ${ot.aprobado?`
      <div style="position:relative;margin-bottom:12px">
        <div style="position:absolute;left:-17px;top:4px;width:10px;height:10px;border-radius:50%;background:#16a34a;border:2px solid #0f172a"></div>
        <div style="font-size:12px;font-weight:700;color:#4ade80">✅ Cliente aprobó el trabajo</div>
        <div style="font-size:10px;color:#475569;margin-top:1px">Trabajo en ejecución</div>
      </div>`:""}
      ${ot.rechazado?`
      <div style="position:relative;margin-bottom:12px">
        <div style="position:absolute;left:-17px;top:4px;width:10px;height:10px;border-radius:50%;background:#ef4444;border:2px solid #0f172a"></div>
        <div style="font-size:12px;font-weight:700;color:#fca5a5">❌ Cliente rechazó la cotización</div>
      </div>`:""}

      <!-- Trabajo terminado -->
      ${["Listo para entregar","Entregado"].includes(ot.estado)||ot.entregado?`
      <div style="position:relative;margin-bottom:12px">
        <div style="position:absolute;left:-17px;top:4px;width:10px;height:10px;border-radius:50%;background:#22d3ee;border:2px solid #0f172a"></div>
        <div style="font-size:12px;font-weight:700;color:#22d3ee">🏁 Trabajo completado</div>
        <div style="font-size:10px;color:#475569;margin-top:1px">Técnico: ${ot.tecnico||"—"}${ot.estimado_entrega?" · Estimado: "+ot.estimado_entrega:""}</div>
      </div>`:""}

      <!-- Vehículo entregado -->
      ${ot.entregado?`
      <div style="position:relative">
        <div style="position:absolute;left:-17px;top:4px;width:10px;height:10px;border-radius:50%;background:#16a34a;border:2px solid #0f172a"></div>
        <div style="font-size:12px;font-weight:700;color:#4ade80">✅ Vehículo entregado y cobrado</div>
        <div style="font-size:10px;color:#475569;margin-top:1px">
          ${ot.fecha_entrega||"—"} · ${ot.metodo_pago||"—"} · Total cobrado: <strong style="color:#fbbf24">Bs. ${ot.total||0}</strong>
        </div>
        <div style="font-size:10px;color:#475569;margin-top:1px">Entregado por: ${ot.entregado_por||"—"}</div>
      </div>`:""}
    </div>
  </div>`:""}

  <!-- Eliminar OT (solo wilfredo) -->
  ${admin&&usuario?.user_name==="wilfredo"?`
  <button onclick="if(confirm('¿Eliminar esta OT permanentemente?'))SB.from('ots').delete().eq('id',${otId}).then(()=>location.href='/ot.html')"
    style="width:100%;padding:10px;background:#ef444412;color:#ef4444;border:1px solid #ef444430;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;margin-bottom:8px">
    🗑 Eliminar OT
  </button>`:""}

  <div style="height:30px"></div>
  </div>`;
}

function cerrarModal(){document.getElementById("modal-area").innerHTML="";}

/* ── WhatsApp: comprobante de entrega al cliente ─────── */
function enviarComprobanteWA(){
  const repArr=[...(ot.repuestos||[]),...(ot.repuestos_usados||[])];
  const moList=(ot.procedimientos||[]).map((s,i)=>`${i+1}. ${s.nombre} — Bs. ${s.precio||0}`).join("\n");
  const repList=repArr.length?repArr.map((r,i)=>`${i+1}. ${r.nombre} x${r.cantidad||1} — Bs. ${(r.precio||0)*(r.cantidad||1)}`).join("\n"):"—";
  const fecha=ot.fecha_entrega||new Date().toLocaleDateString("es-BO");
  const auto=`${ot.marca||""} ${ot.modelo||""}`.trim();
  const msg=`✅ *SERVI CAR PLATINIUM*\n🚗 Su vehículo está listo y entregado.\n\n📋 *COMPROBANTE OT #${ot.num||otId}*\n📅 ${fecha}\n\n🚘 ${auto} - Placa ${ot.placa||"—"}\n\n🔧 *Servicios realizados:*\n${moList||"—"}\n\n🔩 *Repuestos utilizados:*\n${repList}\n\n💰 *TOTAL COBRADO: Bs. ${ot.total||0}*\n💳 Método de pago: ${ot.metodo_pago||"—"}\n\n✅ Garantía: 30 días en mano de obra\n📍 SERVI CAR PLATINIUM — Viacha, La Paz\n📞 68167264 / 60574920\n\n¡Gracias por su preferencia! 🙏`;
  const tel=ot.tel?`591${cleanTel(ot.tel)}`:null;
  if(tel) window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`,"_blank");
  else alert("Sin teléfono del cliente registrado.");
}

/* ── Notion sync ─────────────────────────────────────── */
let _notionKey=null;
async function getNotionKey(){
  if(_notionKey)return _notionKey;
  try{const{data}=await SB.from("config").select("valor").eq("clave","notion_api_key").single();_notionKey=data?.valor||null;}catch{_notionKey=null;}
  return _notionKey;
}
async function notionGuardar(pageId,titulo,filas){
  const key=await getNotionKey();if(!key)return false;
  try{
    const resp=await fetch("/api/notion",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        action:"create_page",token:key,
        data:{
          parent:{page_id:pageId},
          properties:{title:{title:[{text:{content:titulo}}]}},
          children:filas.map(([label,val])=>({object:"block",type:"paragraph",paragraph:{rich_text:[{type:"text",text:{content:label+": "+val}}]}}))
        }
      })
    });
    return resp.ok;
  }catch{return false;}
}
function notionToast(ok){
  const d=document.createElement("div");
  d.style.cssText="position:fixed;top:16px;right:16px;z-index:9999;padding:10px 16px;border-radius:10px;font-size:12px;font-weight:700;"+(ok?"background:#16a34a20;border:1px solid #16a34a40;color:#4ade80":"background:#f59e0b20;border:1px solid #f59e0b40;color:#fbbf24");
  d.textContent=ok?"✅ Guardado en Notion":"⚠️ Sin conexión Notion";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),3500);
}
async function notionGuardarOT(mo,rep){
  const servicios=(ot.procedimientos||[]).map(s=>s.nombre).join(", ")||"—";
  const total_final=mo+rep-(ot.descuento||0);
  return notionGuardar("37d0581972d181a8af7fec47351eb7cd",
    "OT #"+otId+" · "+(ot.placa||"—")+" · "+(ot.cliente||"—"),
    [
      ["Número OT","#"+otId],
      ["Cliente",ot.cliente||"—"],
      ["Placa",ot.placa||"—"],
      ["Servicio",servicios],
      ["Técnico",ot.tecnico||"—"],
      ["Ganancia MO","Bs. "+mo],
      ["Capital repuestos","Bs. "+rep],
      ["Total cobrado","Bs. "+total_final],
      ["Taller",ot.taller||"—"],
      ["Fecha",new Date().toLocaleDateString("es-BO")]
    ]
  );
}

function cambiarTaller(){

  <div class="modal-box su" style="max-width:320px">
    <div style="color:#fbbf24;font-weight:900;font-size:14px;margin-bottom:12px">🏪 Cambiar taller</div>

    <select id="sel_taller_new" class="input" style="margin-bottom:16px">

      <option value="Taller 2 · Bella Vista"${(ot.taller||"").includes("Bella")?" selected":""}>Taller 2 · Bella Vista</option>
    </select>
    <button onclick="confirmarCambioTaller()" style="width:100%;padding:12px;background:#f59e0b;color:#1e293b;border:none;border-radius:10px;font-weight:900;cursor:pointer">✅ Confirmar cambio</button>
  </div></div>`;
}

async function confirmarCambioTaller(){
  const nuevo=document.getElementById("sel_taller_new")?.value;
  if(!nuevo||nuevo===ot.taller){cerrarModal();return;}
  await guardar({taller:nuevo});
  cerrarModal();
}
