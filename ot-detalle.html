// FOTOS
function tomarFoto(tipo){
  const inp=document.createElement("input");
  inp.type="file";inp.accept="image/*";inp.capture="environment";
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=async e=>{
      const img=new Image();
      img.onload=async()=>{
        const c=document.createElement("canvas");
        const MAX=700;let w=img.width,h=img.height;
        if(w>MAX){h=h*MAX/w;w=MAX;}
        c.width=w;c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        const b64=c.toDataURL("image/jpeg",0.75);
        const campo=tipo==="rec"?"fotos_recepcion":"fotos_trabajo";
        const arr=[...(ot[campo]||[]),b64];
        await guardar({[campo]:arr});
      };img.src=e.target.result;
    };r.readAsDataURL(f);
  };inp.click();
}

async function borrarFoto(tipo,idx){
  if(!confirm("¿Borrar foto?"))return;
  const campo=tipo==="rec"?"fotos_recepcion":"fotos_trabajo";
  const arr=[...(ot[campo]||[])];arr.splice(idx,1);
  await guardar({[campo]:arr});
}

async function guardarCotizacion(){
  const procs=[...(ot.procedimientos||[])];
  procs.forEach((_,i)=>{
    const el=document.getElementById(`mo_precio_${i}`);
    if(el) procs[i].precio=parseFloat(el.value)||0;
  });
  const rcs=[...(ot.repuestos_conseguir||[])];
  rcs.forEach((_,i)=>{
    const pel=document.getElementById(`rp_precio_${i}`);
    const iel=document.getElementById(`rp_inv_${i}`);
    if(pel) rcs[i].precio_estimado=parseFloat(pel.value)||0;
    if(iel) rcs[i].en_inventario=iel.value==="1";
  });
  const adelanto=parseFloat(document.getElementById("cot_adelanto").value)||0;
  await guardar({procedimientos:procs,repuestos_conseguir:rcs,adelanto,paso:3,estado:"Cotización"});
  cerrarModal();
  enviarCotizacionCliente();
}

function calcTotalesCot(){
  const mo=(ot.procedimientos||[]).reduce((s,x)=>s+(x.precio||0),0);
  const rep=(ot.repuestos_conseguir||[]).reduce((s,x)=>s+(x.precio_estimado||0),0);
  return{mo,rep,total:mo+rep};
}

function enviarCotizacionCliente(){
  const tot=calcTotalesCot();
  const procs=(ot.procedimientos||[]).map((p,i)=>`${i+1}. ${p.nombre} — Bs. ${p.precio||0}`).join("\n");
  const reps=(ot.repuestos_conseguir||[]).map((r,i)=>`${i+1}. ${r.nombre}${r.en_inventario?" ✅":" 🔍 (a conseguir)"} — Bs. ${r.precio_estimado||0}`).join("\n");
  const adelanto=ot.adelanto||0;
  const saldo=tot.total-adelanto;
  const msg=`🔧 *SERVI CAR PLATINIUM*\n📋 *COTIZACIÓN - ${ot.num||"OT #"+otId}*\n🗓 ${new Date().toLocaleDateString("es-BO")}\n\n🚗 *${ot.placa} · ${ot.marca} ${ot.modelo}*\n👤 Cliente: ${ot.cliente}\n\n*MANO DE OBRA:*\n${procs}\nSubtotal: Bs. ${tot.mo}\n\n*REPUESTOS:*\n${reps}\nSubtotal: Bs. ${tot.rep}\n\n💰 *TOTAL ESTIMADO: Bs. ${tot.total}*\n${adelanto>0?`✅ Adelanto: Bs. ${adelanto}\n💳 Saldo a pagar: Bs. ${saldo}`:""}\n\n_Por favor confirme si aprueba el trabajo._\n📞 ${EMPRESA.tel1} / ${EMPRESA.tel2}`;

}

let repSelId=null;

  repSelId=id;
  document.getElementById("rep_precio").value=p.precio_venta||0;
  document.getElementById("rep_form").style.display="block";
  document.getElementById("rep_lista").style.display="none";
}

async function agregarRep(){
  const p=inventario.find(x=>x.id===repSelId);if(!p)return;
  const cant=parseInt(document.getElementById("rep_cant").value)||1;
  const precio=parseFloat(document.getElementById("rep_precio").value)||p.precio_venta||0;
  if(cant>(p.stock||0)){alert(`Solo hay ${p.stock} en stock`);return;}
  // Descontar del inventario
  await SB.from("inventario").update({stock:Math.max(0,(p.stock||0)-cant)}).eq("id",p.id);
  p.stock=Math.max(0,(p.stock||0)-cant);
  const arr=[...(ot.repuestos||[]),{inv_id:p.id,nombre:p.nombre,foto:p.foto||null,cantidad:cant,precio,estado:"listo"}];
  await guardar({repuestos:arr});
  cerrarModal();
}

async function editarRepPrecio(idx){
  const r=ot.repuestos[idx];
  const nuevo=prompt(`Precio de "${r.nombre}" (Bs.):`,r.precio);
  if(nuevo===null)return;
  const arr=[...(ot.repuestos||[])];arr[idx].precio=parseFloat(nuevo)||0;
  await guardar({repuestos:arr});
}

async function borrarRep(idx){
  if(!confirm("¿Borrar?"))return;
  const arr=[...(ot.repuestos||[])];arr.splice(idx,1);
  await guardar({repuestos:arr});
}

// CALCULAR TOTALES FINALES
function calcTotales(){
  const mo=(ot.servicios||[]).reduce((s,x)=>s+(x.precio||0),0);
  const rep=(ot.repuestos||[]).reduce((s,x)=>s+((x.precio||0)*(x.cantidad||1)),0);
  return{mo,rep,total:mo+rep};
}

function actualizarCobro(){
  const tot=calcTotales();
  const desc=parseFloat(document.getElementById("cobro_desc").value)||0;
  const adelanto=parseFloat(document.getElementById("cobro_adelanto").value)||0;
  const saldo=Math.max(0,tot.total-desc-adelanto);
  document.getElementById("cobro_resumen").textContent=`A cobrar: Bs. ${saldo}`;
}

async function confirmarCobro(){
  const tot=calcTotales();
  const desc=parseFloat(document.getElementById("cobro_desc").value)||0;
  const adelanto=parseFloat(document.getElementById("cobro_adelanto").value)||0;
  const metodo=document.getElementById("cobro_metodo").value;
  const total_final=tot.total-desc;
  const saldo=Math.max(0,total_final-adelanto);

  // Guardar en caja — mano de obra (ganancia neta)
  await SB.from("caja").insert({
    concepto:`OT #${otId} · ${ot.placa} · ${ot.cliente} — Mano de obra`,
    monto:tot.mo,tipo:"ingreso",subtipo:"ganancia_neta",
    taller:ot.taller,fecha:new Date().toLocaleDateString("es-BO"),
    registrado_por:usuario.user_name,metodo_pago:metodo
  });
  // Guardar en caja — repuestos (capital)
  if(tot.rep>0){
    await SB.from("caja").insert({
      concepto:`OT #${otId} · ${ot.placa} · ${ot.cliente} — Repuestos (capital)`,
      monto:tot.rep,tipo:"ingreso",subtipo:"capital_tienda",
      taller:ot.taller,fecha:new Date().toLocaleDateString("es-BO"),
      registrado_por:usuario.user_name,metodo_pago:metodo
    });
  }
  // Guardar en CRM
  await SB.from("crm").insert({
    nombre:ot.cliente,tel:ot.tel,placa:ot.placa,
    marca:ot.marca,modelo:ot.modelo,
    servicio:JSON.stringify(ot.servicios||[]),
    repuestos:JSON.stringify(ot.repuestos||[]),
    total:total_final,descuento:desc,adelanto,
    ganancia_neta:tot.mo,capital:tot.rep,
    fecha:new Date().toLocaleDateString("es-BO"),
    taller:ot.taller,tecnico:ot.tecnico,
    metodo_pago:metodo
  });

  await guardar({paso:8,estado:"Entregado",entregado:true,entregado_por:usuario.nombre,
    fecha_entrega:new Date().toLocaleDateString("es-BO"),total:total_final,
    descuento:desc,adelanto,total_final,metodo_pago:metodo});

  cerrarModal();
  // Enviar resumen final al cliente
  enviarResumenFinalCliente(tot,desc,adelanto,total_final,saldo,metodo);
}

        </div>
      </div>
    </div>`).join("")}

    <!-- Repuestos requeridos por técnico -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0 8px">
      <div style="color:#f97316;font-size:11px;font-weight:700">Repuestos requeridos</div>
      <button onclick="modalRepCons()" class="btn" style="padding:6px 12px;font-size:11px;background:#f97316;color:#fff">+ Agregar</button>
    </div>
    ${(ot.repuestos_conseguir||[]).length===0?`<div style="color:#475569;font-size:12px;text-align:center;padding:8px">Sin repuestos pendientes</div>`:""}
    ${(ot.repuestos_conseguir||[]).map((r,i)=>`
    <div style="padding:10px 12px;border-radius:10px;margin-bottom:6px;background:${r.conseguido?"#16a34a20":"#f9731620"};border:1px solid ${r.conseguido?"#16a34a40":"#f9731640"}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:12px;font-weight:700">${r.conseguido?"✅":"🔍"} ${r.nombre}</div>
          ${r.nota?`<div style="font-size:10px;color:#64748b">${r.nota}</div>`:""}
          ${admin&&r.precio_estimado?`<div style="font-size:10px;color:#fbbf24">Bs. ${r.precio_estimado} ${r.en_inventario?"✅ En tienda":"🔍 A conseguir"}</div>`:""}
        </div>
        ${!r.conseguido&&admin?`<button onclick="marcarConseguido(${i})" class="btn btn-green" style="padding:5px 8px;font-size:10px">✓</button>`:""}
      </div>
    </div>`).join("")}

    ${paso===2?`<button onclick="enviarInformeEncargado()" class="btn btn-wa" style="width:100%;margin-top:12px;font-size:12px">📤 Enviar informe al encargado</button>`:""}
  </div>

  <!-- COTIZACIÓN (solo admin, paso 3+) -->
  ${admin&&paso>=3?`<div class="card" style="border-color:#f59e0b40">
    <div style="color:#fbbf24;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:10px">💰 Cotización</div>
    ${paso===3?`<button onclick="modalCotizacion()" class="btn btn-primary" style="width:100%;margin-bottom:10px;font-size:12px">✏️ Llenar / editar cotización</button>`:""}
    <button onclick="enviarCotizacionCliente()" class="btn btn-wa" style="width:100%;font-size:12px">📤 Enviar cotización al cliente</button>
    ${paso===3?`<button onclick="confirmarAprobacion()" class="btn btn-green" style="width:100%;margin-top:8px;font-size:12px">✅ Registrar aprobación del cliente</button>`:""}
  </div>`:""}

  <!-- FOTOS TRABAJO + REPUESTOS INVENTARIO (paso 5+) -->
  ${paso>=5?`
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase">📷 Fotos del trabajo</div>
      <button onclick="tomarFoto('trab')" class="btn btn-blue" style="padding:6px 12px;font-size:11px">📷 Foto</button>
    </div>
    ${(ot.fotos_trabajo||[]).length===0?`<div style="color:#475569;font-size:12px;text-align:center;padding:10px">Sin fotos</div>`:""}
    <div class="foto-grid">
      ${(ot.fotos_trabajo||[]).map((f,i)=>`<div class="foto-item"><img src="${f}"/>${admin?`<button class="foto-del" onclick="borrarFoto('trab',${i})">✕</button>`:""}</div>`).join("")}
    </div>
    ${paso===5?`<button onclick="guardar({paso:6,estado:'Control técnico'})" class="btn btn-green" style="width:100%;margin-top:10px;font-size:12px">✅ Marcar trabajo terminado</button>`:""}
  </div>

  ${admin?`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase">📦 Repuestos usados</div>
      <button onclick="modalRep()" class="btn btn-blue" style="padding:6px 12px;font-size:11px">+ Inventario</button>
    </div>
    ${(ot.repuestos||[]).length===0?`<div style="color:#475569;font-size:12px;text-align:center;padding:8px">Sin repuestos</div>`:""}
    ${(ot.repuestos||[]).map((r,i)=>`
    <div style="padding:10px;background:#0f172a;border:1px solid #334155;border-radius:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
      <div style="display:flex;gap:8px;align-items:center">
        ${r.foto?`<img src="${r.foto}" style="width:32px;height:32px;border-radius:6px;object-fit:cover"/>`:
        `<div style="width:32px;height:32px;background:#334155;border-radius:6px;display:flex;align-items:center;justify-content:center">📦</div>`}
        <div>
          <div style="font-size:12px;font-weight:700">${r.nombre} x${r.cantidad}</div>
          <div style="font-size:10px;color:#fbbf24;cursor:pointer" onclick="editarRepPrecio(${i})">Bs. ${(r.precio||0)*(r.cantidad||1)} ✏️</div>
        </div>
      </div>
      ${usuario.rol==="admin"?`<button onclick="borrarRep(${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px">🗑️</button>`:""}
    </div>`).join("")}
    ${(ot.repuestos||[]).length>0?`<div style="text-align:right;color:#fbbf24;font-weight:700;font-size:13px;padding-top:6px;border-top:1px solid #334155">Subtotal: Bs. ${(ot.repuestos||[]).reduce((s,x)=>s+((x.precio||0)*(x.cantidad||1)),0)}</div>`:""}
  </div>`:""}
  `:""}

  <!-- CONTROL CALIDAD (paso 7 — OBLIGATORIO) -->
  ${paso>=7?`<div class="card" style="border-color:${paso===7?"#0891b240":"#334155"}">
    <div style="color:#0891b2;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:10px">🔍 Control de calidad</div>
    <textarea id="calidad_txt" class="input" rows="3" placeholder="Observaciones de calidad...">${ot.obs_calidad||""}</textarea>
    ${admin?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
      <button onclick="guardar({obs_calidad:document.getElementById('calidad_txt').value})" class="btn btn-gray" style="font-size:11px">💾 Guardar</button>
      <button onclick="aprobarCalidad()" class="btn btn-green" style="font-size:11px">✅ Aprobar calidad</button>
    </div>
    <button onclick="enviarCotizacionFinal()" class="btn btn-wa" style="width:100%;margin-top:8px;font-size:12px">📤 Enviar cotización final al cliente</button>`:""}
  </div>`:""}

  <!-- RESUMEN FINANCIERO + COBRO (solo admin, paso 7+) -->
  ${admin&&paso>=7?`<div class="card" style="border-color:#fbbf2430">
    <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:10px">💰 Resumen financiero</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center;margin-bottom:12px">
      <div style="background:#16a34a20;border:1px solid #16a34a40;border-radius:10px;padding:10px">
        <div style="color:#64748b;font-size:9px;font-weight:700">GANANCIA NETA</div>
        <div style="color:#16a34a;font-weight:900;font-size:16px">Bs.${tot.mo}</div>
        <div style="color:#475569;font-size:9px">Mano de obra</div>
      </div>
      <div style="background:#1d4ed820;border:1px solid #1d4ed840;border-radius:10px;padding:10px">
        <div style="color:#64748b;font-size:9px;font-weight:700">CAPITAL</div>
        <div style="color:#60a5fa;font-weight:900;font-size:16px">Bs.${tot.rep}</div>
        <div style="color:#475569;font-size:9px">Repuestos</div>
      </div>
      <div style="background:#fbbf2420;border:1px solid #fbbf2440;border-radius:10px;padding:10px">
        <div style="color:#64748b;font-size:9px;font-weight:700">TOTAL</div>
        <div style="color:#fbbf24;font-weight:900;font-size:16px">Bs.${tot.total}</div>
        <div style="color:#475569;font-size:9px">A cobrar</div>
      </div>
    </div>
    ${!ot.entregado?`
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button onclick="modalMO()" class="btn btn-primary" style="flex:1;font-size:11px">+ Servicio</button>
      <button onclick="modalRep()" class="btn btn-blue" style="flex:1;font-size:11px">+ Repuesto</button>
    </div>
    <button onclick="generarPDF()" class="btn btn-blue" style="width:100%;margin-bottom:8px;font-size:12px">📄 Generar PDF</button>
    <button onclick="modalCobro()" class="btn btn-green" style="width:100%;padding:14px;font-size:14px">💵 Cobrar y entregar vehículo</button>
    `:`<div style="background:#16a34a20;border:1px solid #16a34a40;border-radius:12px;padding:12px;text-align:center;color:#4ade80;font-size:12px;font-weight:700">
      ✅ Entregado el ${ot.fecha_entrega} por ${ot.entregado_por}
    </div>
    <button onclick="generarPDF()" class="btn btn-blue" style="width:100%;margin-top:8px;font-size:12px">📄 Ver PDF / Comprobante</button>`}
  </div>`:""}

  <!-- BORRAR OT (solo admin wilfredo) -->
  ${usuario.rol==="admin"?`<button onclick="if(confirm('¿Borrar esta OT?')){SB.from('ots').delete().eq('id',${otId}).then(()=>location.href='/ot.html')}" class="btn btn-red" style="width:100%;margin-bottom:16px;font-size:12px">🗑️ Borrar esta OT</button>`:""}

  <div style="height:20px"></div>
  </div>`;
}

async function marcarConseguido(idx){
  const arr=[...(ot.repuestos_conseguir||[])];
  arr[idx].conseguido=true;
  await guardar({repuestos_conseguir:arr});
}

async function aprobarCalidad(){
  const obs=document.getElementById("calidad_txt")?.value||"";
  await guardar({obs_calidad:obs,paso:8,estado:"Cobro y entrega",aprobado_calidad:true});
}

// Exponer globales
["cerrarModal","tomarFoto","borrarFoto","modalProcedimiento","agregarProcedimiento","borrarProcedimiento",
"modalRepCons","agregarRepCons","marcarConseguido","enviarInformeEncargado","modalCotizacion",
"guardarCotizacion","confirmarAprobacion","modalMO","agregarMO","editarMOPrecio","borrarMO",
"modalRep","selRep","filtrarInv","agregarRep","editarRepPrecio","borrarRep","guardar",
"aprobarCalidad","enviarCotizacionFinal","enviarCotizacionCliente","actualizarCobro",
"modalCobro","confirmarCobro","generarPDF"].forEach(fn=>window[fn]=eval(fn));

init();
</script>
</body>
</html>
