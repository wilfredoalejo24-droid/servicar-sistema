<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OT — Servi Car Platinium</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;min-height:100vh}
input,select,textarea{outline:none}
input:focus,select:focus,textarea:focus{border-color:#f59e0b!important}
.input{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#fff;font-size:13px}
.label{color:#64748b;font-size:11px;font-weight:700;margin-bottom:5px;display:block}
.card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:16px;margin-bottom:12px}
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.foto-item{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:#0f172a;border:1px solid #334155}
.foto-item img{width:100%;height:100%;object-fit:cover}
.foto-del{position:absolute;top:3px;right:3px;background:rgba(239,68,68,.9);border:none;border-radius:50%;width:20px;height:20px;color:#fff;font-size:10px;cursor:pointer}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;z-index:1000}
.modal-box{background:#1e293b;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.su{animation:su .25s ease both}
.btn-wa{display:block;text-align:center;padding:9px;background:#25d36620;color:#25d366;border:1px solid #25d36640;border-radius:10px;text-decoration:none;font-weight:700;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#475569">
    <div style="text-align:center"><div style="font-size:36px;margin-bottom:8px">📋</div>Cargando OT...</div>
  </div>
</div>
<div id="modal-area"></div>
<script>
const SB=window.supabase.createClient(
  "https://epirsbudngwbxgcsryvv.supabase.co",
  "sb_publishable_zsqvMzJMc80Ypf3UQqs-SA_IrV-XIGc"
);
const EMPRESA={nombre:"SERVI CAR PLATINIUM",ciudad:"Viacha - La Paz",tel1:"68167264",tel2:"60574920"};

/* 6 pasos del plan maestro */
const PASOS=[
  {n:1,label:"Recepción",   icon:"📥",color:"#64748b"},
  {n:2,label:"Diagnóstico", icon:"🔍",color:"#60a5fa"},
  {n:3,label:"Cotización",  icon:"💰",color:"#a78bfa"},
  {n:4,label:"Aprobación",  icon:"✅",color:"#f59e0b"},
  {n:5,label:"Ejecución",   icon:"🔧",color:"#f97316"},
  {n:6,label:"Entrega",     icon:"💵",color:"#16a34a"},
];
const TIPOS_SRV=["Servicio Mecánico","Servicio Eléctrico","Servicio Electrónico","Servicio de Tornería"];
const ESTADO_COL={"Pendiente cotización":"#a78bfa","Cotización enviada":"#f59e0b","En proceso":"#f97316","Listo para entregar":"#22d3ee","Entregado":"#16a34a"};
function ecol(e){return ESTADO_COL[e]||"#64748b";}

/* WhatsApp por user_name — fallback si no está en DB */
const WA_MAP={
  wilfredo:"59168167264",william:"59160574920",
  diego:"59171080637",evo:"59164065567",
  adolfo:"59174016189",joel:"59174840206"
};

let usuario=null,ot=null,inventario=[],usuarios_db=[];
const otId=new URLSearchParams(location.search).get("id");

/* ── Sesión ──────────────────────────────────────────── */
function getSession(){
  try{
    return JSON.parse(localStorage.getItem("scp_user"))
        ||JSON.parse(localStorage.getItem("sc_user"))
        ||null;
  }catch{return null;}
}

/* ── Roles (por campo rol de la DB) ─────────────────── */
const esAdmin    =()=>usuario?.rol==="admin";
const esEncargado=()=>["admin","encargado"].includes(usuario?.rol);
const esMecanico =()=>usuario?.rol==="mecanico";

/* ── Init ────────────────────────────────────────────── */
async function init(){
  usuario=getSession();
  if(!usuario){location.href="/";return;}
  if(!otId){location.href="/ot.html";return;}
  await Promise.all([cargarOT(),cargarInventario(),cargarUsuarios()]);
  // Técnicos y vendedores solo pueden ver OTs asignadas a ellos
  const esLimitado=["vendedor","mecanico"].includes(usuario.rol)||/t[eé]cnico/i.test(usuario.rol||"");
  if(ot && esLimitado && ot.tecnico && ot.tecnico!==usuario.user_name){
    document.getElementById("app").innerHTML=`
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#64748b;gap:12px;padding:24px">
        <div style="font-size:48px">🔒</div>
        <div style="font-weight:700">Solo podés ver OTs asignadas a vos</div>
        <a href="/ot.html" style="padding:10px 20px;background:#334155;color:#94a3b8;border-radius:8px;font-weight:700;font-size:13px;text-decoration:none">← Volver a mis OTs</a>
      </div>`;
    return;
  }
  render();
}

async function cargarOT(){
  const{data}=await SB.from("ots").select("*").eq("id",otId).single();
  if(!data){alert("OT no encontrada");location.href="/ot.html";return;}
  ot=data;
  const parseArr=k=>{
    if(!ot[k])ot[k]=[];
    else if(!Array.isArray(ot[k]))try{ot[k]=JSON.parse(ot[k]||"[]")}catch{ot[k]=[];}
  };
  ["procedimientos","repuestos","fotos_recepcion","fotos_trabajo","repuestos_conseguir"].forEach(parseArr);
  ot.adelanto =ot.adelanto ||0;
  ot.descuento=ot.descuento||0;
  if(!ot.paso||ot.paso<1)ot.paso=1;
}

async function cargarInventario(){
  const{data}=await SB.from("inventario").select("*").order("nombre");
  inventario=data||[];
}

async function cargarUsuarios(){
  const{data}=await SB.from("usuarios").select("nombre,user_name,tel,taller,rol");
  usuarios_db=data||[];
}

/* ── Guardar ─────────────────────────────────────────── */
async function guardar(campos){
  await SB.from("ots").update(campos).eq("id",otId);
  Object.assign(ot,campos);
  render();
}

/* ── Totales ─────────────────────────────────────────── */
function calcMO ()  {return(ot.procedimientos||[]).reduce((s,x)=>s+(x.precio||0),0);}
function calcRep()  {return(ot.repuestos||[]).reduce((s,x)=>s+((x.precio||0)*(x.cantidad||1)),0);}
function calcTotal(){return calcMO()+calcRep();}
function calcCotEstimado(){
  const mo=(ot.procedimientos||[]).reduce((s,x)=>s+(x.precio||0),0);
  const rep=(ot.repuestos_conseguir||[]).reduce((s,x)=>s+(x.precio_estimado||0),0);
  return{mo,rep,total:mo+rep};
}

/* ── WA número por user_name ─────────────────────────── */
function waNum(user_name){
  const u=usuarios_db.find(x=>x.user_name===user_name?.toLowerCase());
  if(u?.tel) return "591"+u.tel.replace(/\D/g,"");
  return WA_MAP[user_name?.toLowerCase()]||"";
}

/* ── Fotos ───────────────────────────────────────────── */
function tomarFoto(campo){
  const inp=document.createElement("input");
  inp.type="file";inp.accept="image/*";inp.capture="environment";
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=async e=>{
      const img=new Image();
      img.onload=async()=>{
        const c=document.createElement("canvas");
        const MAX=700;let w=img.width,h=img.height;
        if(w>MAX){h=h*MAX/w;w=MAX;}
        c.width=w;c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        const b64=c.toDataURL("image/jpeg",0.75);
        await guardar({[campo]:[...(ot[campo]||[]),b64]});
      };img.src=e.target.result;
    };r.readAsDataURL(f);
  };inp.click();
}

async function borrarFoto(campo,idx){
  if(!esAdmin())return;
  if(!confirm("¿Borrar foto?"))return;
  const arr=[...(ot[campo]||[])];arr.splice(idx,1);
  await guardar({[campo]:arr});
}

function renderFotos(campo){
  const arr=ot[campo]||[];
  const admin=esAdmin();
  return arr.length===0
    ?`<div style="color:#334155;font-size:11px;text-align:center;padding:8px">Sin fotos</div>`
    :`<div class="foto-grid">${arr.map((f,i)=>`
      <div class="foto-item">
        <img src="${f}" onclick="verFoto('${campo}',${i})"/>
        ${admin?`<button class="foto-del" onclick="borrarFoto('${campo}',${i})">✕</button>`:""}
      </div>`).join("")}
    </div>`;
}

function verFoto(campo,idx){
  const f=ot[campo][idx];
  document.getElementById("modal-area").innerHTML=`
  <div class="modal" onclick="cerrarModal()" style="align-items:center">
    <img src="${f}" style="max-width:95vw;max-height:90vh;border-radius:12px;object-fit:contain"/>
  </div>`;
}

/* ── PASO 2: Diagnóstico ─────────────────────────────── */
function modalServicio(){
  document.getElementById("modal-area").innerHTML=`
  <div class="modal" onclick="if(event.target===this)cerrarModal()">
  <div class="modal-box su">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <strong style="color:#60a5fa">+ Servicio / trabajo</strong>
      <button onclick="cerrarModal()" style="padding:5px 10px;background:#334155;color:#94a3b8;border:none;border-radius:8px;cursor:pointer;font-weight:700">✕</button>
    </div>
    <div class="label">Tipo</div>
    <select id="srv_tipo" class="input" style="margin-bottom:10px">
      ${TIPOS_SRV.map(t=>`<option>${t}</option>`).join("")}
    </select>
    <div class="label">Descripción detallada del trabajo *</div>
    <textarea id="srv_desc" rows="4" style="width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#fff;font-size:13px;resize:vertical;margin-bottom:14px" placeholder="Ej: Desmontado de motor, cambio de anillas, rectificado de culata..."></textarea>
    <button onclick="agregarServicio()" style="width:100%;padding:12px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-weight:900;cursor:pointer">✅ Agregar servicio</button>

}

async function agregarServicio(){
  const tipo=document.getElementById("srv_tipo")?.value||"";
  const desc=(document.getElementById("srv_desc")?.value||"").trim();
  if(!desc){alert("Describe el trabajo");return;}
  const arr=[...(ot.procedimientos||[]),{nombre:tipo,desc,tecnico:usuario.nombre,precio:0}];
  await guardar({procedimientos:arr});
  cerrarModal();
}

async function borrarServicio(idx){
  if(!esAdmin())return;
  if(!confirm("¿Borrar servicio? Solo Wilfredo puede eliminar registros."))return;
  const arr=[...(ot.procedimientos||[])];arr.splice(idx,1);
  await guardar({procedimientos:arr});
}

function modalRepRequerido(){
  document.getElementById("modal-area").innerHTML=`
  <div class="modal" onclick="if(event.target===this)cerrarModal()">

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <strong style="color:#f97316">🔍 Repuesto requerido</strong>

    <div class="label">Nombre del repuesto *</div>
    <input id="rr_nombre" class="input" placeholder="Ej: Anillas de motor" style="margin-bottom:10px"/>
    <div class="label">Referencia / código / medidas</div>
    <textarea id="rr_nota" rows="2" style="width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#fff;font-size:13px;resize:vertical;margin-bottom:14px" placeholder="Marca, código, medidas específicas..."></textarea>
    <button onclick="agregarRepRequerido()" style="width:100%;padding:12px;background:#f97316;color:#fff;border:none;border-radius:10px;font-weight:900;cursor:pointer">✅ Agregar</button>
  </div></div>`;
}

async function agregarRepRequerido(){
  const nombre=(document.getElementById("rr_nombre")?.value||"").trim();
  const nota=(document.getElementById("rr_nota")?.value||"").trim();
  if(!nombre){alert("Escribe el nombre del repuesto");return;}
  const arr=[...(ot.repuestos_conseguir||[]),{nombre,nota,conseguido:false,precio_estimado:0,en_inventario:false}];
  await guardar({repuestos_conseguir:arr});

}

async function marcarConseguido(idx){
  const arr=[...(ot.repuestos_conseguir||[])];

  await guardar({repuestos_conseguir:arr});
}

async function enviarInformeEncargado(){
  if(!(ot.procedimientos||[]).length){alert("Agrega al menos un servicio antes de enviar.");return;}

  const reps=(ot.repuestos_conseguir||[]).map((r,i)=>`${i+1}. ${r.nombre}${r.nota?" ("+r.nota+")":""}`).join("\n");
  const msg=`🔧 *SERVI CAR PLATINIUM*\n📋 *Informe Técnico — OT #${otId}*\n\n🚗 *${ot.placa} · ${ot.marca||""} ${ot.modelo||""}*\n👤 Cliente: ${ot.cliente||"-"}\n\n*📝 SERVICIOS A REALIZAR:*\n${procs}\n\n*🔍 REPUESTOS REQUERIDOS:*\n${reps||"Ninguno"}\n\n_Técnico: ${usuario.nombre}_\n_Por favor revisar y cotizar._`;
  const encargadoUN=ot.taller?.includes("Montes")?"william":"wilfredo";
  const numEnc=waNum(encargadoUN);
  await guardar({paso:3,estado:"Pendiente cotización",informe_enviado:true});
  if(numEnc) window.open(`https://wa.me/${numEnc}?text=${encodeURIComponent(msg)}`,"_blank");
  else alert("Informe enviado. No se encontró número del encargado.");
}

/* ── PASO 3: Cotización ──────────────────────────────── */
function modalCotizacion(){
  const procs=ot.procedimientos||[];
  const rcs=ot.repuestos_conseguir||[];
  document.getElementById("modal-area").innerHTML=`
  <div class="modal" onclick="if(event.target===this)cerrarModal()">
  <div class="modal-box su">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <strong style="color:#fbbf24">💰 Llenar cotización</strong>
      <button onclick="cerrarModal()" style="padding:5px 10px;background:#334155;color:#94a3b8;border:none;border-radius:8px;cursor:pointer;font-weight:700">✕</button>
    </div>

    <div style="color:#60a5fa;font-size:11px;font-weight:700;margin-bottom:8px;text-transform:uppercase">Mano de obra</div>
    ${procs.length===0
      ?`<div style="color:#475569;font-size:12px;padding:8px;text-align:center">Sin servicios</div>`
      :procs.map((p,i)=>`
      <div style="background:#0f172a;border:1px solid #1d4ed830;border-radius:8px;padding:10px;margin-bottom:8px">
        <div style="font-size:12px;font-weight:700;color:#fbbf24;margin-bottom:2px">${p.nombre}</div>
        <div style="font-size:11px;color:#64748b;margin-bottom:6px">${p.desc}</div>
        <div class="label">Precio Bs.</div>
        <input id="mo_${i}" type="number" value="${p.precio||0}" class="input" placeholder="0"/>
      </div>`).join("")}

    <div style="color:#f97316;font-size:11px;font-weight:700;margin:12px 0 8px;text-transform:uppercase">Repuestos requeridos</div>
    ${rcs.length===0
      ?`<div style="color:#475569;font-size:12px;padding:8px;text-align:center">Sin repuestos pendientes</div>`
      :rcs.map((r,i)=>`
      <div style="background:#0f172a;border:1px solid #f9731630;border-radius:8px;padding:10px;margin-bottom:8px">
        <div style="font-size:12px;font-weight:700;color:#fb923c;margin-bottom:6px">${r.nombre}${r.nota?` · ${r.nota}`:""}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <div><div class="label">Precio Bs.</div><input id="rp_${i}" type="number" value="${r.precio_estimado||0}" class="input"/></div>
          <div><div class="label">¿En tienda?</div>
            <select id="inv_${i}" class="input">
              <option value="0" ${!r.en_inventario?"selected":""}>No — conseguir</option>
              <option value="1" ${r.en_inventario?"selected":""}>Sí — en tienda</option>
            </select>
          </div>
        </div>
      </div>`).join("")}

    <div class="label" style="margin-top:8px">Adelanto recibido (Bs.)</div>
    <input id="cot_adelanto" type="number" value="${ot.adelanto||0}" class="input" style="margin-bottom:16px"/>
    <button onclick="guardarCotizacion()" style="width:100%;padding:13px;background:#f59e0b;color:#1e293b;border:none;border-radius:10px;font-weight:900;cursor:pointer">
      💾 Guardar y enviar al cliente
    </button>
  </div></div>`;
}

async function guardarCotizacion(){
  const procs=[...(ot.procedimientos||[])];
  procs.forEach((_,i)=>{const el=document.getElementById(`mo_${i}`);if(el)procs[i].precio=parseFloat(el.value)||0;});
  const rcs=[...(ot.repuestos_conseguir||[])];
  rcs.forEach((_,i)=>{
    const p=document.getElementById(`rp_${i}`);
    const v=document.getElementById(`inv_${i}`);
    if(p)rcs[i].precio_estimado=parseFloat(p.value)||0;
    if(v)rcs[i].en_inventario=v.value==="1";
  });
  const adelanto=parseFloat(document.getElementById("cot_adelanto")?.value)||0;
  await guardar({procedimientos:procs,repuestos_conseguir:rcs,adelanto,paso:4,estado:"Cotización enviada"});
  cerrarModal();
  enviarCotizacionCliente();
}

function enviarCotizacionCliente(){
  const cot=calcCotEstimado();
  const adelanto=ot.adelanto||0;
  const saldo=cot.total-adelanto;
  const moList=(ot.procedimientos||[]).map((p,i)=>`${i+1}. ${p.nombre} — Bs. ${p.precio||0}`).join("\n");
  const repList=(ot.repuestos_conseguir||[]).map((r,i)=>`${i+1}. ${r.nombre}${r.en_inventario?" ✅":" 🔍"} — Bs. ${r.precio_estimado||0}`).join("\n");
  const msg=`🔧 *SERVI CAR PLATINIUM*\n📋 *COTIZACIÓN — OT #${otId}*\n🗓 ${new Date().toLocaleDateString("es-BO")}\n\n🚗 *${ot.placa} · ${ot.marca||""} ${ot.modelo||""}*\n👤 ${ot.cliente||"-"}\n\n*🔧 MANO DE OBRA:*\n${moList||"—"}\nSubtotal: Bs. ${cot.mo}\n\n*📦 REPUESTOS:*\n${repList||"—"}\nSubtotal: Bs. ${cot.rep}\n\n💰 *TOTAL ESTIMADO: Bs. ${cot.total}*\n${adelanto>0?`✅ Adelanto: Bs. ${adelanto}\n💳 Saldo: Bs. ${saldo}`:""}\n\n_Por favor confirme si aprueba el trabajo._\n📞 ${EMPRESA.tel1} / ${EMPRESA.tel2}`;
  const numCliente=ot.tel?`591${ot.tel.replace(/\D/g,"")}`:null;
  if(numCliente) window.open(`https://wa.me/${numCliente}?text=${encodeURIComponent(msg)}`,"_blank");
  else alert("Sin teléfono del cliente. Cotización guardada.");
}

async function rechazarCotizacion(){
  if(!confirm("¿Registrar que el cliente NO aprobó la cotización?"))return;
  await guardar({paso:2,estado:"Diagnóstico",aprobado:false,rechazado:true});
}

/* ── PASO 5: Ejecución — Inventario ─────────────────── */

          </div>

      <button onclick="document.getElementById('inv_form').style.display='none';document.getElementById('inv_lista').style.display='block'" style="width:100%;padding:10px;background:#334155;color:#94a3b8;border:none;border-radius:10px;cursor:pointer;font-weight:700">← Volver</button>

}

function selRep(id){
  const p=inventario.find(x=>x.id===id);
  if(!p||(p.stock||0)<=0){alert("❌ Sin stock disponible");return;}
  repSelId=id;
  document.getElementById("rep_precio").value=p.precio||p.precio_venta||0;
  document.getElementById("inv_form").style.display="block";
  document.getElementById("inv_lista").style.display="none";
}

function filtrarInv(){
  const q=(document.getElementById("inv_busca")?.value||"").toLowerCase();
  document.querySelectorAll("#inv_lista > div").forEach(el=>{
    el.style.display=el.textContent.toLowerCase().includes(q)?"":"none";
  });
}

async function agregarRepInventario(){
  const p=inventario.find(x=>x.id===repSelId);if(!p)return;
  const cant=parseInt(document.getElementById("rep_cant")?.value)||1;
  const precio=parseFloat(document.getElementById("rep_precio")?.value)||p.precio_venta||0;
  if(cant>(p.stock||0)){alert(`Solo hay ${p.stock} en stock`);return;}
  await SB.from("inventario").update({stock:Math.max(0,(p.stock||0)-cant)}).eq("id",p.id);
  p.stock=Math.max(0,(p.stock||0)-cant);
  const arr=[...(ot.repuestos||[]),{inv_id:p.id,nombre:p.nom||p.nombre,foto:p.foto_url||p.foto||null,cantidad:cant,precio}];
  await guardar({repuestos:arr});
  cerrarModal();
}

async function editarPrecioRep(idx){
  if(!esEncargado())return;
  const r=ot.repuestos[idx];
  const nuevo=prompt(`Precio de "${r.nombre}" (Bs.):`,r.precio);
  if(nuevo===null)return;
  const arr=[...(ot.repuestos||[])];arr[idx].precio=parseFloat(nuevo)||0;
  await guardar({repuestos:arr});
}

async function borrarRepUsado(idx){
  if(!esAdmin())return;
  if(!confirm("¿Borrar repuesto?"))return;
  const arr=[...(ot.repuestos||[])];arr.splice(idx,1);
  await guardar({repuestos:arr});
}

function actualizarSaldo(){
  const total=calcMO()+calcRep();
  const desc=parseFloat(document.getElementById("cobro_desc")?.value)||0;
  const adel=parseFloat(document.getElementById("cobro_adelanto")?.value)||0;
  const el=document.getElementById("cobro_saldo");
  if(el)el.textContent=`A cobrar: Bs. ${Math.max(0,total-desc-adel)}`;
}

async function confirmarCobro(){
  const mo=calcMO(),rep=calcRep(),total=mo+rep;
  const desc=parseFloat(document.getElementById("cobro_desc")?.value)||0;
  const adelanto=parseFloat(document.getElementById("cobro_adelanto")?.value)||0;
  const metodo=document.getElementById("cobro_metodo")?.value||"Efectivo";
  const total_final=Math.max(0,total-desc);
  const saldo=Math.max(0,total_final-adelanto);

  const btn=document.getElementById("btn_cobro");
  if(btn){btn.disabled=true;btn.textContent="⏳ Procesando...";}

  try{
    /* CRM */
    await SB.from("crm").insert({
      nombre:ot.cliente,tel:ot.tel,placa:ot.placa,
      marca:ot.marca,modelo:ot.modelo,
      servicio:JSON.stringify(ot.procedimientos||[]),
      repuestos:JSON.stringify(ot.repuestos||[]),
      total:total_final,descuento:desc,adelanto,
      ganancia_neta:mo,capital:rep,
      fecha:new Date().toLocaleDateString("es-BO"),
      taller:ot.taller,tecnico:ot.tecnico,metodo_pago:metodo
    });
    /* Caja — mano de obra */
    if(mo>0) await SB.from("caja").insert({
      concepto:`OT #${otId} · ${ot.placa} · ${ot.cliente} — Mano de obra`,
      monto:mo,tipo:"ingreso",subtipo:"ganancia_neta",
      taller:ot.taller,fecha:new Date().toLocaleDateString("es-BO"),
      registrado_por:usuario.user_name,metodo_pago:metodo
    });
    /* Caja — repuestos */
    if(rep>0) await SB.from("caja").insert({
      concepto:`OT #${otId} · ${ot.placa} · ${ot.cliente} — Repuestos`,
      monto:rep,tipo:"ingreso",subtipo:"capital_tienda",
      taller:ot.taller,fecha:new Date().toLocaleDateString("es-BO"),
      registrado_por:usuario.user_name,metodo_pago:metodo
    });
    /* OT cerrada */
    await guardar({
      paso:6,estado:"Entregado",entregado:true,
      entregado_por:usuario.nombre,
      fecha_entrega:new Date().toLocaleDateString("es-BO"),
      total:total_final,descuento:desc,adelanto,metodo_pago:metodo
    });
    cerrarModal();
    enviarComprobanteCliente(mo,rep,total,desc,adelanto,total_final,saldo,metodo);
    notionGuardarOT(mo,rep).then(ok=>notionToast(ok));
  }catch(e){
    alert("Error: "+e.message);
    if(btn){btn.disabled=false;btn.textContent="✅ Confirmar cobro y entregar";}
  }
}

function enviarComprobanteCliente(mo,rep,total,desc,adelanto,total_final,saldo,metodo){
  const moList=(ot.procedimientos||[]).map((s,i)=>`${i+1}. ${s.nombre} — Bs. ${s.precio||0}`).join("\n");
  const repList=(ot.repuestos||[]).map((r,i)=>`${i+1}. ${r.nombre} x${r.cantidad} — Bs. ${(r.precio||0)*(r.cantidad||1)}`).join("\n");
  const msg=`🔧 *SERVI CAR PLATINIUM*\n✅ *COMPROBANTE DE ENTREGA*\n📋 OT #${otId} · ${new Date().toLocaleDateString("es-BO")}\n\n🚗 *${ot.placa} · ${ot.marca||""} ${ot.modelo||""}*\n👤 ${ot.cliente||"-"}\n\n*🔧 SERVICIOS:*\n${moList||"—"}\n\n*📦 REPUESTOS:*\n${repList||"—"}\n\n💰 Total: Bs. ${total}${desc>0?`\n🎁 Descuento: -Bs. ${desc}\n💰 Total final: Bs. ${total_final}`:""}\n${adelanto>0?`✅ Adelanto: Bs. ${adelanto}\n💳 Saldo cobrado: Bs. ${saldo}`:""}\n💳 Método: ${metodo}\n\n✅ *Su vehículo ha sido entregado.*\n⚠️ Garantía: 30 días en mano de obra\n📞 ${EMPRESA.tel1} / ${EMPRESA.tel2}`;
  const numCliente=ot.tel?`591${ot.tel.replace(/\D/g,"")}`:null;
  if(numCliente) window.open(`https://wa.me/${numCliente}?text=${encodeURIComponent(msg)}`,"_blank");
}

        <div style="font-size:12px;font-weight:700;color:#4ade80">✅ Vehículo entregado y cobrado</div>
        <div style="font-size:10px;color:#475569;margin-top:1px">
          ${ot.fecha_entrega||"—"} · ${ot.metodo_pago||"—"} · Total cobrado: <strong style="color:#fbbf24">Bs. ${ot.total||0}</strong>
        </div>
        <div style="font-size:10px;color:#475569;margin-top:1px">Entregado por: ${ot.entregado_por||"—"}</div>
      </div>`:""}
    </div>
  </div>`:""}

  <!-- Eliminar OT (solo admin) -->
  ${admin?`
  <button onclick="if(confirm('¿Eliminar esta OT permanentemente?'))SB.from('ots').delete().eq('id',${otId}).then(()=>location.href='/ot.html')"
    style="width:100%;padding:10px;background:#ef444412;color:#ef4444;border:1px solid #ef444430;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;margin-bottom:8px">
    🗑 Eliminar OT
  </button>`:""}

  <div style="height:30px"></div>
  </div>`;
}

function notificarClienteListo(){
  const nombre=(ot.cliente||"cliente").split(" ")[0];
  const auto=`${ot.marca||""} ${ot.modelo||""}`.trim()||"vehículo";
  const placa=ot.placa||"";
  const estimado=ot.estimado_entrega?`\nPuedes pasar ${ot.estimado_entrega}.`:"";
  const msg=`Hola ${nombre}! Tu ${auto} (${placa}) ya está listo en Servi Car Platinium.${estimado}\nPuedes pasar a recogerlo cuando gustes 🔧\nCualquier consulta: 59168167264`;
  const tel=ot.tel?("591"+ot.tel.replace(/\D/g,"").replace(/^591/,"")):"";
  if(tel) window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`,"_blank");
  else{
    const d=document.createElement("div");
    d.style.cssText="position:fixed;inset:0;background:#000a;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px";
    d.innerHTML=`<div style="background:#1e293b;border:1px solid #334155;border-radius:14px;padding:20px;max-width:340px;width:100%">
      <div style="color:#fbbf24;font-weight:700;margin-bottom:10px">📱 Mensaje para el cliente</div>
      <div style="background:#0f172a;border-radius:8px;padding:12px;color:#94a3b8;font-size:12px;line-height:1.6;white-space:pre-wrap;margin-bottom:12px">${msg}</div>
      <div style="color:#f87171;font-size:11px;margin-bottom:10px">Sin teléfono registrado — copia el mensaje manualmente</div>
      <button onclick="this.closest('div[style]').remove()" style="width:100%;padding:10px;background:#334155;color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer">Cerrar</button>
    </div>`;
    document.body.appendChild(d);
  }
}

/* ── Notion sync ─────────────────────────────────────── */
let _notionKey=null;
async function getNotionKey(){
  if(_notionKey)return _notionKey;
  try{const{data}=await SB.from("config").select("valor").eq("clave","notion_api_key").single();_notionKey=data?.valor||null;}catch{_notionKey=null;}
  return _notionKey;
}
async function notionGuardar(pageId,titulo,filas){
  const key=await getNotionKey();if(!key)return false;
  try{
    const resp=await fetch("/api/notion",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        action:"create_page",token:key,
        data:{
          parent:{page_id:pageId},
          properties:{title:{title:[{text:{content:titulo}}]}},
          children:filas.map(([label,val])=>({object:"block",type:"paragraph",paragraph:{rich_text:[{type:"text",text:{content:label+": "+val}}]}}))
        }
      })
    });
    return resp.ok;
  }catch{return false;}
}
function notionToast(ok){
  const d=document.createElement("div");
  d.style.cssText="position:fixed;top:16px;right:16px;z-index:9999;padding:10px 16px;border-radius:10px;font-size:12px;font-weight:700;"+(ok?"background:#16a34a20;border:1px solid #16a34a40;color:#4ade80":"background:#f59e0b20;border:1px solid #f59e0b40;color:#fbbf24");
  d.textContent=ok?"✅ Guardado en Notion":"⚠️ Sin conexión Notion";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),3500);
}
async function notionGuardarOT(mo,rep){
  const servicios=(ot.procedimientos||[]).map(s=>s.nombre).join(", ")||"—";
  const total_final=mo+rep-(ot.descuento||0);
  return notionGuardar("37d0581972d181a8af7fec47351eb7cd",
    "OT #"+otId+" · "+(ot.placa||"—")+" · "+(ot.cliente||"—"),
    [
      ["Número OT","#"+otId],
      ["Cliente",ot.cliente||"—"],
      ["Placa",ot.placa||"—"],
      ["Servicio",servicios],
      ["Técnico",ot.tecnico||"—"],
      ["Ganancia MO","Bs. "+mo],
      ["Capital repuestos","Bs. "+rep],
      ["Total cobrado","Bs. "+total_final],
      ["Taller",ot.taller||"—"],
      ["Fecha",new Date().toLocaleDateString("es-BO")]
    ]
  );
}
