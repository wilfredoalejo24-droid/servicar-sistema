<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Detalle OT — Servi Car Platinium</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;min-height:100vh}
.btn{padding:10px 16px;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer}
.btn-primary{background:#f59e0b;color:#1e293b}
.btn-green{background:#16a34a;color:#fff}
.btn-blue{background:#1d4ed8;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-gray{background:#334155;color:#94a3b8}
.card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:16px;margin-bottom:12px}
.input{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#fff;font-size:13px}
.label{color:#64748b;font-size:11px;font-weight:700;margin-bottom:5px;display:block}
select,textarea{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#fff;font-size:13px}
textarea{resize:vertical}
.step-done{background:#16a34a20;border:1px solid #16a34a40}
.step-active{background:#f59e0b20;border:1px solid #f59e0b60}
.step-pending{background:#1e293b;border:1px solid #334155}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:flex-end;justify-content:center;z-index:1000}
.modal-box{background:#1e293b;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.foto-item{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:#0f172a;border:1px solid #334155}
.foto-item img{width:100%;height:100%;object-fit:cover}
.foto-del{position:absolute;top:3px;right:3px;background:rgba(239,68,68,.9);border:none;border-radius:50%;width:20px;height:20px;color:#fff;font-size:10px;cursor:pointer}
</style>
</head>
<body>
<div id="app"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#64748b;font-size:14px">Cargando OT...</div></div>
<div id="modal-area"></div>
<script>
const SB=window.supabase.createClient("https://epirsbudngwbxgcsryvv.supabase.co","sb_publishable_zsqvMzJMc80Ypf3UQqs-SA_IrV-XIGc");
const PASOS=["Recepción","Diagnóstico","Cotización","Aprobación","Ejecución","Trabajo adicional","Control calidad","Entrega"];
const MO_OPTS=["Cambio de aceite","Lavado de motor","Alineado","Balanceado","Cambio de frenos","Cambio de pastillas","Cambio de embrague","Cambio de suspensión","Diagnóstico eléctrico","Diagnóstico electrónico","Cambio de filtros","Cambio de correa","Mantenimiento general","Soldadura","Rectificado","Otro (personalizado)"];

let usuario=null, ot=null, inventario=[], otId=null;

const params=new URLSearchParams(location.search);
otId=params.get("id");

async function init(){
  const u=localStorage.getItem("sc_user");
  if(!u){location.href="/ot.html";return;}
  usuario=JSON.parse(u);
  if(!otId){location.href="/ot.html";return;}
  await cargarOT();
  await cargarInventario();
  render();
}

async function cargarOT(){
  const{data}=await SB.from("ots").select("*").eq("id",otId).single();
  if(!data){alert("OT no encontrada");location.href="/ot.html";return;}
  ot=data;
  // Normalizar arrays
  if(!Array.isArray(ot.servicios)) try{ot.servicios=JSON.parse(ot.servicios||"[]")}catch{ot.servicios=[];}
  if(!Array.isArray(ot.repuestos)) try{ot.repuestos=JSON.parse(ot.repuestos||"[]")}catch{ot.repuestos=[];}
  if(!Array.isArray(ot.fotos_recepcion)) try{ot.fotos_recepcion=JSON.parse(ot.fotos_recepcion||"[]")}catch{ot.fotos_recepcion=[];}
  if(!Array.isArray(ot.fotos_trabajo)) try{ot.fotos_trabajo=JSON.parse(ot.fotos_trabajo||"[]")}catch{ot.fotos_trabajo=[];}
  if(!ot.repuestos_conseguir) ot.repuestos_conseguir=[];
  if(!Array.isArray(ot.repuestos_conseguir)) try{ot.repuestos_conseguir=JSON.parse(ot.repuestos_conseguir||"[]")}catch{ot.repuestos_conseguir=[];}
}

async function cargarInventario(){
  const{data}=await SB.from("inventario").select("*").order("nombre");
  inventario=data||[];
}

const esAdmin=()=>["admin","encargado"].includes(usuario?.rol)||["wilfredo","william"].includes(usuario?.user_name);

async function guardar(campos){
  await SB.from("ots").update(campos).eq("id",otId);
  Object.assign(ot,campos);
  render();
}

// FOTOS
function tomarFoto(tipo){
  const inp=document.createElement("input");
  inp.type="file";inp.accept="image/*";inp.capture="environment";
  inp.onchange=async()=>{
    const f=inp.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=async e=>{
      const img=new Image();
      img.onload=async()=>{
        const c=document.createElement("canvas");
        const MAX=600;let w=img.width,h=img.height;
        if(w>MAX){h=h*MAX/w;w=MAX;}
        c.width=w;c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        const b64=c.toDataURL("image/jpeg",0.7);
        const campo=tipo==="rec"?"fotos_recepcion":"fotos_trabajo";
        const arr=[...(ot[campo]||[]),b64];
        await guardar({[campo]:arr});
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(f);
  };
  inp.click();
}

async function borrarFoto(tipo,idx){
  if(!confirm("¿Borrar foto?"))return;
  const campo=tipo==="rec"?"fotos_recepcion":"fotos_trabajo";
  const arr=[...(ot[campo]||[])];arr.splice(idx,1);
  await guardar({[campo]:arr});
}

// MANO DE OBRA (servicios)
function modalMO(){
  document.getElementById("modal-area").innerHTML=`
  <div class="modal" onclick="if(event.target===this)cerrarModal()">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <strong style="color:#fbbf24">+ Agregar servicio</strong>
      <button onclick="cerrarModal()" class="btn btn-gray" style="padding:5px 10px">✕</button>
    </div>
    <div class="label">Tipo de servicio</div>
    <select id="mo_tipo" class="input" style="margin-bottom:10px" onchange="document.getElementById('mo_custom').style.display=this.value==='Otro (personalizado)'?'block':'none'">
      ${MO_OPTS.map(o=>`<option>${o}</option>`).join("")}
    </select>
    <div id="mo_custom" style="display:none;margin-bottom:10px">
      <div class="label">Nombre del servicio</div>
      <input id="mo_nombre_c" class="input" placeholder="Ej: Cambio de termostato"/>
    </div>
    <div class="label">Precio (Bs.)</div>
    <input id="mo_precio" type="number" class="input" placeholder="0" style="margin-bottom:14px"/>
    <button onclick="agregarMO()" class="btn btn-green" style="width:100%">✅ Agregar</button>
  </div></div>`;
}

async function agregarMO(){
  const tipo=document.getElementById("mo_tipo").value;
  const nombre=tipo==="Otro (personalizado)"?document.getElementById("mo_nombre_c").value.trim():tipo;
  const precio=parseFloat(document.getElementById("mo_precio").value)||0;
  if(!nombre||!precio){alert("Completa nombre y precio");return;}
  const arr=[...(ot.servicios||[]),{nombre,precio,tecnico:usuario.nombre,fecha:new Date().toLocaleDateString("es-BO")}];
  await guardar({servicios:arr});
  cerrarModal();
}

async function borrarMO(idx){
  if(!confirm("¿Borrar?"))return;
  const arr=[...(ot.servicios||[])];arr.splice(idx,1);
  await guardar({servicios:arr});
}

// REPUESTOS
function modalRep(){
  document.getElementById("modal-area").innerHTML=`
  <div class="modal" onclick="if(event.target===this)cerrarModal()">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <strong style="color:#fbbf24">+ Repuesto del inventario</strong>
      <button onclick="cerrarModal()" class="btn btn-gray" style="padding:5px 10px">✕</button>
    </div>
    <input id="rep_busca" class="input" placeholder="Buscar producto..." oninput="filtrarInv()" style="margin-bottom:10px"/>
    <div id="rep_lista" style="max-height:280px;overflow-y:auto">
      ${inventario.map(p=>`
        <div onclick="selRep(${p.id})" style="padding:10px;background:#0f172a;border:1px solid #334155;border-radius:8px;margin-bottom:6px;cursor:pointer;display:flex;gap:8px;align-items:center">
          ${p.foto?`<img src="${p.foto}" style="width:36px;height:36px;border-radius:6px;object-fit:cover"/>`:
          `<div style="width:36px;height:36px;background:#334155;border-radius:6px;display:flex;align-items:center;justify-content:center">📦</div>`}
          <div>
            <div style="color:#fff;font-size:12px;font-weight:700">${p.nombre}</div>
            <div style="font-size:10px;color:${(p.stock||0)>0?"#16a34a":"#ef4444"};font-weight:700">${(p.stock||0)>0?"Stock: "+p.stock:"❌ SIN STOCK"}</div>
            <div style="font-size:10px;color:#fbbf24">Bs. ${p.precio_venta||0}</div>
          </div>
        </div>`).join("")}
    </div>
    <div id="rep_form" style="display:none;margin-top:10px">
      <div class="label">Cantidad</div>
      <input id="rep_cant" type="number" value="1" class="input" style="margin-bottom:10px"/>
      <button onclick="agregarRep()" class="btn btn-green" style="width:100%;margin-bottom:8px">✅ Agregar</button>
      <button onclick="document.getElementById('rep_form').style.display='none';document.getElementById('rep_lista').style.display='block'" class="btn btn-gray" style="width:100%">← Volver</button>
    </div>
  </div></div>`;
}

let repSelId=null;
function selRep(id){
  const p=inventario.find(x=>x.id===id);
  if(!p||(p.stock||0)<=0){alert("❌ Sin stock. Agrega al inventario primero.");return;}
  repSelId=id;
  document.getElementById("rep_form").style.display="block";
  document.getElementById("rep_lista").style.display="none";
}

function filtrarInv(){
  const q=document.getElementById("rep_busca").value.toLowerCase();
  document.querySelectorAll("#rep_lista > div").forEach(el=>{
    el.style.display=el.textContent.toLowerCase().includes(q)?"":"none";
  });
}

async function agregarRep(){
  const p=inventario.find(x=>x.id===repSelId);if(!p)return;
  const cant=parseInt(document.getElementById("rep_cant").value)||1;
  if(cant>(p.stock||0)){alert(`Solo hay ${p.stock} en stock`);return;}
  const arr=[...(ot.repuestos||[]),{inv_id:p.id,nombre:p.nombre,foto:p.foto||null,cantidad:cant,precio:p.precio_venta||0,estado:"pendiente"}];
  await guardar({repuestos:arr});
  cerrarModal();
}

async function descontarRep(idx){
  const arr=[...(ot.repuestos||[])];
  const rep=arr[idx];
  if(rep.estado==="listo")return;
  const inv=inventario.find(x=>x.id===rep.inv_id);
  if(inv){
    await SB.from("inventario").update({stock:Math.max(0,(inv.stock||0)-rep.cantidad)}).eq("id",inv.id);
    inv.stock=Math.max(0,(inv.stock||0)-rep.cantidad);
  }
  arr[idx].estado="listo";
  await guardar({repuestos:arr});
}

async function borrarRep(idx){
  if(!confirm("¿Borrar?"))return;
  const arr=[...(ot.repuestos||[])];arr.splice(idx,1);
  await guardar({repuestos:arr});
}

// REPUESTOS A CONSEGUIR
function modalRepCons(){
  document.getElementById("modal-area").innerHTML=`
  <div class="modal" onclick="if(event.target===this)cerrarModal()">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <strong style="color:#f97316">🔍 Repuesto a conseguir</strong>
      <button onclick="cerrarModal()" class="btn btn-gray" style="padding:5px 10px">✕</button>
    </div>
    <div class="label">Nombre del repuesto</div>
    <input id="rc_nombre" class="input" placeholder="Ej: Bomba de agua" style="margin-bottom:10px"/>
    <div class="label">Nota (opcional)</div>
    <textarea id="rc_nota" class="input" rows="2" placeholder="Medidas, referencia..."></textarea>
    <button onclick="agregarRepCons()" class="btn" style="width:100%;margin-top:14px;background:#f97316;color:#fff">✅ Agregar</button>
  </div></div>`;
}

async function agregarRepCons(){
  const nombre=document.getElementById("rc_nombre").value.trim();
  const nota=document.getElementById("rc_nota").value.trim();
  if(!nombre){alert("Escribe el nombre");return;}
  const arr=[...(ot.repuestos_conseguir||[]),{nombre,nota,conseguido:false,fecha:new Date().toLocaleDateString("es-BO")}];
  await guardar({repuestos_conseguir:arr});
  cerrarModal();
}

async function marcarConseguido(idx){
  const arr=[...(ot.repuestos_conseguir||[])];
  arr[idx].conseguido=true;
  await guardar({repuestos_conseguir:arr});
}

function cerrarModal(){document.getElementById("modal-area").innerHTML="";}

// TOTALES
function calcTotales(){
  const mo=(ot.servicios||[]).reduce((s,x)=>s+(x.precio||0),0);
  const rep=(ot.repuestos||[]).reduce((s,x)=>s+((x.precio||0)*(x.cantidad||1)),0);
  return{mo,rep,total:mo+rep};
}

function puedeEntregar(){
  const pendCons=(ot.repuestos_conseguir||[]).some(r=>!r.conseguido);
  const pendRep=(ot.repuestos||[]).some(r=>r.estado!=="listo");
  return !pendCons&&!pendRep;
}

async function confirmarEntrega(){
  if(!puedeEntregar()){alert("⚠️ Hay repuestos pendientes.");return;}
  if(!confirm("¿Confirmar entrega del vehículo?"))return;
  const tot=calcTotales();
  await SB.from("crm").insert({
    nombre:ot.cliente,tel:ot.tel,placa:ot.placa,
    marca:ot.marca,modelo:ot.modelo,
    servicio:"OT-"+otId,total:tot.total,
    fecha:new Date().toLocaleDateString("es-BO"),
    taller:ot.taller,tecnico:ot.tecnico
  });
  await SB.from("caja").insert({
    concepto:`OT #${otId} · ${ot.placa} · ${ot.cliente}`,
    monto:tot.total,tipo:"ingreso",
    taller:ot.taller,
    fecha:new Date().toLocaleDateString("es-BO"),
    registrado_por:usuario.user_name
  });
  await guardar({paso:8,estado:"Entregado",entregado:true,entregado_por:usuario.nombre,fecha_entrega:new Date().toLocaleDateString("es-BO"),total:tot.total});
  alert("✅ Vehículo entregado. Guardado en CRM y Caja.");
}

function generarPDF(){
  const tot=calcTotales();
  const w=window.open("","_blank");
  const fotsRec=(ot.fotos_recepcion||[]).map(f=>`<img src="${f}" style="width:80px;height:60px;object-fit:cover;border-radius:4px;margin:2px"/>`).join("");
  const fotsTrab=(ot.fotos_trabajo||[]).map(f=>`<img src="${f}" style="width:80px;height:60px;object-fit:cover;border-radius:4px;margin:2px"/>`).join("");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>OT #${otId}</title>
  <style>body{font-family:Arial;font-size:12px;padding:20px;color:#1e293b}
  h2{font-size:13px;color:#475569;margin:14px 0 6px}
  table{width:100%;border-collapse:collapse}td{border-bottom:1px solid #e2e8f0;padding:5px 8px}
  .total{font-weight:700;font-size:14px}@media print{button{display:none}}</style></head>
  <body>
  <div style="text-align:center;margin-bottom:16px">
    <div style="color:#f59e0b;font-weight:900;font-size:18px">🔧 SERVI CAR PLATINIUM</div>
    <div style="font-size:11px;color:#64748b">Viacha - La Paz · 68167264 / 60574920</div>
    <div style="font-weight:700;margin-top:8px">ORDEN DE TRABAJO #${otId}</div>
    <div style="font-size:11px;color:#64748b">${ot.fecha||""}</div>
  </div>
  <h2>🚗 VEHÍCULO</h2>
  <table>
    <tr><td>Placa</td><td>${ot.placa||"-"}</td></tr>
    <tr><td>Marca / Modelo</td><td>${ot.marca||"-"} ${ot.modelo||"-"}</td></tr>
    <tr><td>Km</td><td>${ot.km||"-"}</td></tr>
    <tr><td>Cliente</td><td>${ot.cliente||"-"}</td></tr>
    <tr><td>Teléfono</td><td>${ot.tel||"-"}</td></tr>
    <tr><td>Problema</td><td>${ot.problema||"-"}</td></tr>
  </table>
  ${fotsRec?`<h2>📷 FOTOS RECEPCIÓN</h2><div>${fotsRec}</div>`:""}
  <h2>🔧 MANO DE OBRA</h2>
  <table>${(ot.servicios||[]).map(s=>`<tr><td>${s.nombre}</td><td style="text-align:right">Bs. ${s.precio}</td></tr>`).join("")}
  <tr class="total"><td>Subtotal</td><td style="text-align:right">Bs. ${tot.mo}</td></tr></table>
  <h2>📦 REPUESTOS</h2>
  <table>${(ot.repuestos||[]).map(r=>`<tr><td>${r.nombre} x${r.cantidad}</td><td style="text-align:right">Bs. ${(r.precio||0)*(r.cantidad||1)}</td></tr>`).join("")}
  <tr class="total"><td>Subtotal</td><td style="text-align:right">Bs. ${tot.rep}</td></tr></table>
  ${fotsTrab?`<h2>📷 EVIDENCIA DEL TRABAJO</h2><div>${fotsTrab}</div>`:""}
  <h2>💰 RESUMEN</h2>
  <table>
    <tr><td>Mano de obra (ganancia neta)</td><td style="text-align:right">Bs. ${tot.mo}</td></tr>
    <tr><td>Repuestos (capital)</td><td style="text-align:right">Bs. ${tot.rep}</td></tr>
    <tr class="total" style="font-size:15px"><td>TOTAL</td><td style="text-align:right">Bs. ${tot.total}</td></tr>
  </table>
  <div style="margin-top:30px;border-top:1px solid #e2e8f0;padding-top:16px">
    <div style="color:#64748b;font-size:11px">Garantía: 30 días en mano de obra</div>
    <div style="margin-top:30px;border-top:1px dashed #94a3b8;width:200px;padding-top:6px;font-size:11px;color:#64748b">Firma del cliente</div>
  </div>
  <div style="text-align:center;margin-top:16px"><button onclick="window.print()" style="padding:8px 20px;background:#f59e0b;border:none;border-radius:6px;font-weight:700;cursor:pointer">🖨️ Imprimir / Guardar PDF</button></div>
  </body></html>`);
}

// RENDER PRINCIPAL
function render(){
  if(!ot)return;
  const paso=ot.paso||1;
  const tot=calcTotales();
  const admin=esAdmin();
  const pendCons=(ot.repuestos_conseguir||[]).filter(r=>!r.conseguido).length;
  const pendRep=(ot.repuestos||[]).filter(r=>r.estado!=="listo").length;

  document.getElementById("app").innerHTML=`
  <!-- HEADER -->
  <div style="background:#1e293b;border-bottom:1px solid #334155;padding:12px 16px;position:sticky;top:0;z-index:100">
    <div style="display:flex;align-items:center;gap:10px;max-width:500px;margin:0 auto">
      <a href="/ot.html" style="color:#64748b;text-decoration:none;font-size:20px">←</a>
      <div style="flex:1">
        <div style="color:#fbbf24;font-weight:900;font-size:14px">${ot.num||"OT #"+otId} · ${ot.placa||"-"}</div>
        <div style="color:#64748b;font-size:11px">${ot.marca||""} ${ot.modelo||""} · ${ot.cliente||""}</div>
      </div>
      <span style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;background:#f59e0b20;color:#f59e0b;border:1px solid #f59e0b40">Paso ${paso}/8</span>
    </div>
  </div>

  <div style="padding:14px 16px;max-width:500px;margin:0 auto">

  <!-- PROGRESO -->
  <div class="card">
    <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:10px">Progreso</div>
    ${PASOS.map((p,i)=>{
      const n=i+1;const done=paso>n;const active=paso===n;
      return `<div class="${done?"step-done":active?"step-active":"step-pending"}" style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;margin-bottom:6px">
        <span>${done?"✅":active?"🔄":"⏳"}</span>
        <span style="font-size:12px;color:${done?"#16a34a":active?"#fbbf24":"#64748b"};font-weight:${active?"700":"400"}">${n}. ${p}</span>
        ${active&&admin&&n<8?`<button onclick="guardar({paso:${n+1},estado:'${PASOS[n]}'})" class="btn btn-green" style="margin-left:auto;padding:5px 10px;font-size:10px">→ Siguiente</button>`:""}
      </div>`;
    }).join("")}
  </div>

  <!-- INFO VEHÍCULO -->
  <div class="card">
    <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:10px">🚗 Vehículo</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px">
      ${[["Placa",ot.placa],["Marca",ot.marca],["Modelo",ot.modelo],["Año",ot.anio],["Km",ot.km],["Color",ot.color],["Combustible",ot.combustible],["Taller",ot.taller],["Técnico",ot.tecnico],["Cliente",ot.cliente],["Tel",ot.tel],["Fecha",ot.fecha]].map(([k,v])=>
        `<div><div style="color:#475569;font-size:10px">${k}</div><div style="color:#fff;font-weight:700">${v||"-"}</div></div>`
      ).join("")}
    </div>
    <div style="margin-top:10px;background:#0f172a;border-radius:8px;padding:10px;font-size:12px;color:#94a3b8">
      <span style="color:#64748b;font-size:10px">PROBLEMA: </span>${ot.problema||"-"}
    </div>
    ${ot.tel?`<a href="https://wa.me/591${ot.tel}" target="_blank" class="btn btn-green" style="display:block;text-align:center;text-decoration:none;margin-top:10px;font-size:12px">📱 WhatsApp al cliente</a>`:""}
    ${admin&&(usuario.user_name==="wilfredo"||usuario.user_name==="william")?`
    <div style="margin-top:10px;display:flex;gap:8px">
      ${usuario.user_name==="wilfredo"?`<button onclick="guardar({tecnico:'William'})" class="btn btn-blue" style="flex:1;font-size:11px">→ Asignar a William</button>`:""}
      ${usuario.user_name==="william"?`<button onclick="guardar({tecnico:'Wilfredo'})" class="btn btn-blue" style="flex:1;font-size:11px">→ Asignar a Wilfredo</button>`:""}
    </div>`:""}
  </div>

  <!-- DIAGNÓSTICO -->
  <div class="card">
    <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:10px">🔍 Diagnóstico</div>
    <textarea id="diag_txt" class="input" rows="3" placeholder="Describe el diagnóstico...">${ot.diagnostico||""}</textarea>
    <button onclick="guardar({diagnostico:document.getElementById('diag_txt').value})" class="btn btn-primary" style="margin-top:8px;width:100%;font-size:12px">💾 Guardar diagnóstico</button>
  </div>

  <!-- FOTOS RECEPCIÓN -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase">📷 Fotos recepción</div>
      <button onclick="tomarFoto('rec')" class="btn btn-blue" style="padding:6px 12px;font-size:11px">📷 Tomar</button>
    </div>
    ${(ot.fotos_recepcion||[]).length===0?`<div style="color:#475569;font-size:12px;text-align:center;padding:10px">Sin fotos</div>`:""}
    <div class="foto-grid">
      ${(ot.fotos_recepcion||[]).map((f,i)=>`<div class="foto-item"><img src="${f}"/>${admin?`<button class="foto-del" onclick="borrarFoto('rec',${i})">✕</button>`:""}</div>`).join("")}
    </div>
  </div>

  <!-- REPUESTOS A CONSEGUIR -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase">🔍 Repuestos a conseguir</div>
      <button onclick="modalRepCons()" class="btn" style="padding:6px 12px;font-size:11px;background:#f97316;color:#fff">+ Agregar</button>
    </div>
    ${(ot.repuestos_conseguir||[]).length===0?`<div style="color:#475569;font-size:12px;text-align:center;padding:8px">Sin repuestos pendientes</div>`:""}
    ${(ot.repuestos_conseguir||[]).map((r,i)=>`
      <div style="padding:10px 12px;border-radius:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;background:${r.conseguido?"#16a34a20":"#ef444420"};border:1px solid ${r.conseguido?"#16a34a40":"#ef444440"}">
        <div>
          <div style="font-size:12px;font-weight:700">${r.conseguido?"✅":"🔴"} ${r.nombre}</div>
          ${r.nota?`<div style="font-size:10px;color:#64748b">${r.nota}</div>`:""}
        </div>
        ${!r.conseguido&&admin?`<button onclick="marcarConseguido(${i})" class="btn btn-green" style="padding:5px 8px;font-size:10px">Llegó ✓</button>`:""}
      </div>`).join("")}
  </div>

  <!-- MANO DE OBRA (solo admin) -->
  ${admin?`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase">🔧 Mano de obra</div>
      <button onclick="modalMO()" class="btn btn-primary" style="padding:6px 12px;font-size:11px">+ Agregar</button>
    </div>
    ${(ot.servicios||[]).length===0?`<div style="color:#475569;font-size:12px;text-align:center;padding:8px">Sin servicios</div>`:""}
    ${(ot.servicios||[]).map((s,i)=>`
      <div style="padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:12px;font-weight:700">${s.nombre}</div>
          <div style="font-size:10px;color:#64748b">${s.tecnico||""}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:#fbbf24;font-weight:700">Bs. ${s.precio}</span>
          ${usuario.rol==="admin"?`<button onclick="borrarMO(${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:14px">🗑️</button>`:""}
        </div>
      </div>`).join("")}
    ${(ot.servicios||[]).length>0?`<div style="text-align:right;color:#fbbf24;font-weight:700;font-size:13px;padding-top:6px;border-top:1px solid #334155">Subtotal: Bs. ${(ot.servicios||[]).reduce((s,x)=>s+(x.precio||0),0)}</div>`:""}
  </div>`:""}

  <!-- REPUESTOS (solo admin) -->
  ${admin?`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase">📦 Repuestos usados</div>
      <button onclick="modalRep()" class="btn btn-blue" style="padding:6px 12px;font-size:11px">+ Del inventario</button>
    </div>
    ${(ot.repuestos||[]).length===0?`<div style="color:#475569;font-size:12px;text-align:center;padding:8px">Sin repuestos</div>`:""}
    ${(ot.repuestos||[]).map((r,i)=>`
      <div style="padding:10px 12px;border-radius:10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;background:${r.estado==="listo"?"#16a34a20":"#f59e0b20"};border:1px solid ${r.estado==="listo"?"#16a34a40":"#f59e0b40"}">
        <div style="display:flex;gap:8px;align-items:center">
          ${r.foto?`<img src="${r.foto}" style="width:32px;height:32px;border-radius:6px;object-fit:cover"/>`:
          `<div style="width:32px;height:32px;background:#334155;border-radius:6px;display:flex;align-items:center;justify-content:center">📦</div>`}
          <div>
            <div style="font-size:12px;font-weight:700">${r.nombre} x${r.cantidad}</div>
            <div style="font-size:10px;color:#fbbf24">Bs. ${(r.precio||0)*(r.cantidad||1)}</div>
            <div style="font-size:9px;color:${r.estado==="listo"?"#16a34a":"#f59e0b"}">${r.estado==="listo"?"✅ Descontado":"⏳ Pendiente"}</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px">
          ${r.estado!=="listo"?`<button onclick="descontarRep(${i})" class="btn btn-green" style="padding:4px 8px;font-size:9px">✓ Descontar</button>`:""}
          ${usuario.rol==="admin"?`<button onclick="borrarRep(${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px">🗑️</button>`:""}
        </div>
      </div>`).join("")}
    ${(ot.repuestos||[]).length>0?`<div style="text-align:right;color:#fbbf24;font-weight:700;font-size:13px;padding-top:6px;border-top:1px solid #334155">Subtotal: Bs. ${(ot.repuestos||[]).reduce((s,x)=>s+((x.precio||0)*(x.cantidad||1)),0)}</div>`:""}
  </div>`:""}

  <!-- FOTOS TRABAJO -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase">📷 Evidencia del trabajo</div>
      <button onclick="tomarFoto('trab')" class="btn btn-blue" style="padding:6px 12px;font-size:11px">📷 Tomar</button>
    </div>
    ${(ot.fotos_trabajo||[]).length===0?`<div style="color:#475569;font-size:12px;text-align:center;padding:10px">Sin fotos</div>`:""}
    <div class="foto-grid">
      ${(ot.fotos_trabajo||[]).map((f,i)=>`<div class="foto-item"><img src="${f}"/>${admin?`<button class="foto-del" onclick="borrarFoto('trab',${i})">✕</button>`:""}</div>`).join("")}
    </div>
  </div>

  <!-- RESUMEN FINANCIERO (solo admin) -->
  ${admin?`<div class="card" style="border-color:#fbbf2430">
    <div style="color:#94a3b8;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:10px">💰 Resumen financiero</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
      <div style="background:#16a34a20;border:1px solid #16a34a40;border-radius:10px;padding:10px">
        <div style="color:#64748b;font-size:9px;font-weight:700">GANANCIA NETA</div>
        <div style="color:#16a34a;font-weight:900;font-size:16px">Bs.${tot.mo}</div>
        <div style="color:#475569;font-size:9px">Mano de obra</div>
      </div>
      <div style="background:#1d4ed820;border:1px solid #1d4ed840;border-radius:10px;padding:10px">
        <div style="color:#64748b;font-size:9px;font-weight:700">CAPITAL</div>
        <div style="color:#60a5fa;font-weight:900;font-size:16px">Bs.${tot.rep}</div>
        <div style="color:#475569;font-size:9px">Repuestos</div>
      </div>
      <div style="background:#fbbf2420;border:1px solid #fbbf2440;border-radius:10px;padding:10px">
        <div style="color:#64748b;font-size:9px;font-weight:700">TOTAL</div>
        <div style="color:#fbbf24;font-weight:900;font-size:16px">Bs.${tot.total}</div>
        <div style="color:#475569;font-size:9px">A cobrar</div>
      </div>
    </div>
  </div>`:""}

  <!-- ACCIONES FINALES (solo admin) -->
  ${admin?`
  ${pendCons>0||pendRep>0?`<div style="background:#ef444420;border:1px solid #ef444460;border-radius:12px;padding:12px;margin-bottom:12px;font-size:12px;color:#f87171;text-align:center">
    ⚠️ No se puede entregar: ${pendCons} repuesto(s) a conseguir · ${pendRep} repuesto(s) sin descontar
  </div>`:""}
  ${ot.entregado?`<div style="background:#16a34a20;border:1px solid #16a34a40;border-radius:12px;padding:12px;margin-bottom:12px;font-size:12px;color:#4ade80;text-align:center">
    ✅ Entregado el ${ot.fecha_entrega} por ${ot.entregado_por}
  </div>`:""}
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
    <button onclick="generarPDF()" class="btn btn-blue" style="padding:13px;font-size:13px">📄 PDF</button>
    <button onclick="${puedeEntregar()?"confirmarEntrega()":"alert('⚠️ Faltan repuestos pendientes')"}"
      class="btn ${puedeEntregar()?"btn-green":"btn-gray"}" style="padding:13px;font-size:13px">
      ${ot.entregado?"✅ Entregado":puedeEntregar()?"✅ Entregar":"🔒 Pendientes"}
    </button>
  </div>
  ${usuario.rol==="admin"?`<button onclick="if(confirm('¿Borrar esta OT?')){SB.from('ots').delete().eq('id',${otId}).then(()=>location.href='/ot.html')}" class="btn btn-red" style="width:100%;margin-bottom:16px;font-size:12px">🗑️ Borrar esta OT</button>`:""}
  `:""}

  <div style="height:20px"></div>
  </div>`;
}

// Exponer funciones globales
window.cerrarModal=cerrarModal;
window.tomarFoto=tomarFoto;
window.borrarFoto=borrarFoto;
window.modalMO=modalMO;
window.agregarMO=agregarMO;
window.borrarMO=borrarMO;
window.modalRep=modalRep;
window.selRep=selRep;
window.filtrarInv=filtrarInv;
window.agregarRep=agregarRep;
window.descontarRep=descontarRep;
window.borrarRep=borrarRep;
window.modalRepCons=modalRepCons;
window.agregarRepCons=agregarRepCons;
window.marcarConseguido=marcarConseguido;
window.guardar=guardar;
window.confirmarEntrega=confirmarEntrega;
window.generarPDF=generarPDF;

init();
</script>
</body>
</html>
