const comprimirFoto=(file,cb)=>{
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      const MAX=300;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=h*(MAX/w);w=MAX;}}else{if(h>MAX){w=w*(MAX/h);h=MAX;}}
      c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      cb(c.toDataURL("image/jpeg",0.6));
    };img.src=ev.target.result;
  };r.readAsDataURL(file);
};

function FotoUpload({fotos,setFotos,label="📷 Agregar fotos"}){
  const add=e=>{Array.from(e.target.files).forEach(f=>comprimirFoto(f,url=>setFotos(p=>[...p,{url,hora:hora()}])));e.target.value="";};
  return <div>
    <label style={{display:"inline-block",padding:"6px 12px",background:"#f1f5f9",border:"1px dashed #94a3b8",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,color:"#64748b"}}>
      {label}<input type="file" accept="image/*" multiple onChange={add} style={{display:"none"}}/>
    </label>
    {fotos.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:7}}>
      {fotos.map((f,i)=><div key={i} style={{position:"relative"}}>

      </div>)}
    </div>}
  </div>;
}

function BuscadorCliente({onSelect}){
  const [q,setQ]=React.useState("");
  const [resultados,setResultados]=React.useState([]);
  const [open,setOpen]=React.useState(false);

  React.useEffect(()=>{
    if(q.length<2){setResultados([]);setOpen(false);return;}
    const t=setTimeout(async()=>{
      const{data}=await sb.from("crm").select("placa,cliente,tel,vehiculo").or(`placa.ilike.%${q}%,cliente.ilike.%${q}%,tel.ilike.%${q}%`).limit(8);
      const unicos=[];const placas=new Set();
      (data||[]).forEach(r=>{if(!placas.has(r.placa)){placas.add(r.placa);unicos.push(r);}});
      setResultados(unicos);setOpen(true);
    },300);
    return()=>clearTimeout(t);
  },[q]);

  return <div style={{position:"relative"}}>
    <input value={q} onChange={e=>setQ(e.target.value)} onFocus={()=>q.length>1&&setOpen(true)}
      placeholder="🔍 Buscar cliente por nombre, placa o teléfono..."
      style={{width:"100%",padding:"7px 10px",border:"1px solid #3b82f6",borderRadius:8,fontSize:13,boxSizing:"border-box"}}/>
    {open&&resultados.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,boxShadow:"0 8px 24px rgba(0,0,0,.15)",zIndex:400,maxHeight:200,overflowY:"auto"}}>
      {resultados.map((r,i)=><div key={i} onClick={()=>{onSelect(r);setQ(r.cliente||r.placa);setOpen(false);}}
        style={{padding:"8px 12px",cursor:"pointer",borderBottom:"1px solid #f3f4f6"}}
        onMouseEnter={e=>e.currentTarget.style.background="#fffbeb"}
        onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
        <div style={{fontWeight:700,fontSize:12}}>🚗 {r.placa} — {r.cliente||"Sin nombre"}</div>
        <div style={{fontSize:11,color:"#94a3b8"}}>{r.vehiculo||"—"} · 📞 {r.tel||"—"}</div>
      </div>)}
    </div>}
    {q.length>1&&resultados.length===0&&open&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#94a3b8",zIndex:400}}>
      No encontrado — llena los datos manualmente
    </div>}
  </div>;
}

  const [lf,setLf]=React.useState(false);const [lfSel,setLfSel]=React.useState(null);const [lfPv,setLfPv]=React.useState(0);
  const [ad,setAd]=React.useState(false);const [adSel,setAdSel]=React.useState(null);const [adPv,setAdPv]=React.useState(0);

  const [desc,setDesc]=React.useState(0);

  const tallerDef=usuario.taller==="ambos"?"":usuario.taller;
  const [tallerSel,setTallerSel]=React.useState(tallerDef);

  const aceitesInv=inv.filter(i=>i.cat==="Aceites"&&!i.nom?.toLowerCase().includes("freno")&&!i.nom?.toLowerCase().includes("direc")&&!i.nom?.toLowerCase().includes("hidra"));

  const filtrosAire=inv.filter(i=>i.cat==="Repuestos nuevos"&&i.nom?.toLowerCase().includes("filtro")&&i.nom?.toLowerCase().includes("aire"));
  const liquidosFreno=inv.filter(i=>i.cat==="Aceites"&&i.nom?.toLowerCase().includes("freno"));
  const aceitesDir=inv.filter(i=>i.cat==="Aceites"&&(i.nom?.toLowerCase().includes("direc")||i.nom?.toLowerCase().includes("hidra")));
  const esPorEnvase=m=>{if(m==null||m===undefined)return false;const ml=String(m).toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").trim();return ml.includes("galon")||ml.includes("envase")||ml.includes("cerrado");};
  const porEnvase=acSel?esPorEnvase(acSel.medida):false;

  const items=[
    {d:`🛢️ ${acSel?acSel.nom:"Aceite motor"} x${acLit}${porEnvase?"env":"L"}`,p:acLit*acPv},
    ...(filtro?[{d:`🔘 ${filtro.nom}`,p:fiPv}]:[]),
    ...(plan?[{d:"🚿 Lavado ext+int",p:20}]:[]),

    ...(fa&&faSel?[{d:`💨 ${faSel.nom}`,p:faPv}]:[]),

  const guardar=async()=>{

    const capitalTotal=

      if(lf&&lfSel) check(await sb.from("inventario").update({stock:Math.max(0,lfSel.stock-1)}).eq("id",lfSel.id),"inv líquido freno");
      if(ad&&adSel) check(await sb.from("inventario").update({stock:Math.max(0,adSel.stock-1)}).eq("id",adSel.id),"inv aceite dirección");
      alert(`✅ Guardado en CRM\n🚗 ${placa} — ${fmt(total)}`);
      setPlan("");setNombre("");setTel("");setPlaca("");setModelo("");setKmIn("");setAcSel(null);setAcPv(45);setFiltro(null);setFiPv(0);
      setFa(false);setFaSel(null);setLf(false);setLfSel(null);setCj(false);setAd(false);setAdSel(null);setDesc(0);setProxCambio("");setPago("Efectivo");setFotos([]);
    }catch(e){
      alert("Error al guardar: "+e.message);
    }
  };

  const enviarWA=()=>{
    const msg=`🚗 *${EMPRESA.nombre}*\n━━━━━━━━━\n*CAMBIO DE ACEITE*\n🚗 Placa: *${placa}*\n👤 ${nombre||"Cliente"}\n\n${items.map(i=>`• ${i.d}: ${fmt(i.p)}`).join("\n")}${parseFloat(desc)>0?`\n\n💸 Descuento: -${fmt(desc)}`:""}\n\n💰 *TOTAL: ${fmt(total)}*\n${kmOut?`🔔 Próximo cambio: ${kmOut.toLocaleString()} km`:""}\n\n¡Gracias! 📞 ${EMPRESA.tel1}`;

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {[{k:"normal",l:"🔵 Normal",c:"#1d4ed8",it:["Aceite motor","Filtro aceite","Lavado Bs.20","Ambientador"]},
          {k:"premium",l:"⭐ Premium",c:"#d97706",it:["Todo Normal","+Bs.100 extra","Motor+chasis","Scanner Launch"]}].map(p=>
          <div key={p.k} onClick={()=>setPlan(p.k)} style={{border:`2px solid ${plan===p.k?p.c:"#e2e8f0"}`,borderRadius:10,padding:12,cursor:"pointer",background:plan===p.k?(p.k==="normal"?"#eff6ff":"#fffbeb"):"#f8fafc"}}>

function Lavado({usuario}){
  const [precio,setPrecio]=React.useState(20);
  const [obs,setObs]=React.useState("");
  const [cliente,setCliente]=React.useState("");
  const [placa,setPlaca]=React.useState("");
  const [tel,setTel]=React.useState("");
  const [fotos,setFotos]=React.useState([]);
  const [pago,setPago]=React.useState("Efectivo");
  const tallerDef=usuario.taller==="ambos"?"":usuario.taller;
  const [tallerSel,setTallerSel]=React.useState(tallerDef);

  const registrar=async()=>{
    if(!tallerSel){alert("Selecciona el taller.");return;}
    if(!(await validarCajaAbierta(tallerSel))) return;
    await sb.from("caja").insert({fecha:hoy(),taller:tallerSel,concepto:`Lavado${placa?` — ${placa}`:""}${obs?` (${obs})`:""}`,tipo:"ingreso",subtipo:"ganancia_neta",monto:precio,metodo_pago:pago,registrado_por:usuario.user_name||usuario.nombre,user_name:usuario.nombre});
    if(placa) await sb.from("crm").insert({fecha:hoy(),num:"LV",placa,cliente,tel,vehiculo:"",taller:tallerSel,tecnico:usuario.nombre,total:fmt(precio),tipo:"Lavado"});
    alert(`✅ Lavado registrado — ${fmt(precio)}`);
    setPrecio(20);setObs("");setCliente("");setPlaca("");setTel("");setPago("Efectivo");setFotos([]);
  };

  return <Card>
    <Tit text="🚿 Servicio de Lavado"/>
    {usuario.taller==="ambos"&&<div style={{marginBottom:10}}><Campo label="Taller *"><Sel value={tallerSel} onChange={setTallerSel} options={TALLERES}/></Campo></div>}
    <div style={{marginBottom:8}}>
      <div style={{fontSize:11,color:"#3b82f6",fontWeight:700,marginBottom:4}}>🔍 Buscar cliente (opcional):</div>
      <BuscadorCliente onSelect={c=>{setCliente(c.cliente||"");setPlaca(c.placa||"");setTel(c.tel||"");}}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
      <Campo label="Cliente"><Inp value={cliente} onChange={setCliente} placeholder="Nombre (opcional)"/></Campo>
      <Campo label="Placa"><Inp value={placa} onChange={setPlaca} placeholder="1234ABC"/></Campo>
      <Campo label="Teléfono"><Inp value={tel} onChange={setTel} placeholder="70000000"/></Campo>
      <Campo label="Observación"><Inp value={obs} onChange={setObs} placeholder="Tipo de lavado..."/></Campo>
    </div>
    <div style={{marginBottom:10}}>
      <div style={{fontSize:11,color:"#64748b",fontWeight:700,marginBottom:6}}>PRECIO Bs. (mínimo Bs. 5)</div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
        <button onClick={()=>setPrecio(p=>Math.max(5,p-5))} style={{width:34,height:34,borderRadius:8,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:18,cursor:"pointer",fontWeight:700}}>−</button>
        <input type="number" value={precio} min={5} onChange={e=>setPrecio(Math.max(5,parseFloat(e.target.value)||5))}
          style={{width:85,padding:"7px",border:"2px solid #fbbf24",borderRadius:8,fontSize:20,fontWeight:900,textAlign:"center",color:"#92400e"}}/>
        <button onClick={()=>setPrecio(p=>p+5)} style={{width:34,height:34,borderRadius:8,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:18,cursor:"pointer",fontWeight:700}}>+</button>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {[5,10,20,30,50,80].map(v=><button key={v} onClick={()=>setPrecio(v)} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${precio===v?"#f59e0b":"#e2e8f0"}`,background:precio===v?"#fef3c7":"#f8fafc",fontWeight:700,fontSize:12,cursor:"pointer"}}>Bs. {v}</button>)}
      </div>
    </div>
    <div style={{marginBottom:10}}><Tit text="📷 Fotos del vehículo"/><FotoUpload fotos={fotos} setFotos={setFotos} label="📷 Fotografiar antes/después"/></div>
    <div style={{background:"#1e293b",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <span style={{color:"#94a3b8",fontSize:12}}>Total</span>
      <span style={{color:"#fbbf24",fontWeight:900,fontSize:18}}>{fmt(precio)}</span>
    </div>
    <div style={{marginBottom:10}}>
      <Campo label="💳 Pago"><Sel value={pago} onChange={setPago} options={["Efectivo","QR","Transferencia"]}/></Campo>
    </div>
    <Btn onClick={registrar} color="#16a34a" text="💾 Cobrar y registrar" style={{width:"100%",padding:11}}/>
  </Card>;
}

function Alineado({usuario}){
  const [tipo,setTipo]=React.useState("");
  const [precioAl,setPrecioAl]=React.useState(100);
  const [precioBalLlanta,setPrecioBalLlanta]=React.useState(35);
  const [llantas,setLlantas]=React.useState(4);
  const [placa,setPlaca]=React.useState("");
  const [marca,setMarca]=React.useState("");
  const [color,setColor]=React.useState("");
  const [cliente,setCliente]=React.useState("");
  const [tel,setTel]=React.useState("");
  const [tec,setTec]=React.useState(usuario.nombre);
  const [km,setKm]=React.useState("");
  const [proxRevision,setProxRevision]=React.useState("");
  const [obs,setObs]=React.useState("");
  const [pago,setPago]=React.useState("Efectivo");
  const [fotos,setFotos]=React.useState([]);
  const tallerDef=usuario.taller==="ambos"?"":usuario.taller;
  const [tallerSel,setTallerSel]=React.useState(tallerDef);

  const totalAl=(tipo==="alineado"||tipo==="ambos")?precioAl:0;
  const totalBal=(tipo==="balanceado"||tipo==="ambos")?precioBalLlanta*llantas:0;
  const total=totalAl+totalBal;

  const registrar=async()=>{
    if(!tipo||!tallerSel){alert("Selecciona servicio y taller.");return;}
    if(!(await validarCajaAbierta(tallerSel))) return;
    const tipoLabel=tipo==="ambos"?"Alineado+Balanceado":tipo==="alineado"?"Alineado":"Balanceado";
    const concepto=`${tipoLabel}${placa?` — ${placa}`:""}${proxRevision?` · Próx: ${proxRevision}`:""}${obs?` · ${obs}`:""}`;
    await sb.from("caja").insert({fecha:hoy(),taller:tallerSel,concepto,tipo:"ingreso",subtipo:"ganancia_neta",monto:total,metodo_pago:pago,registrado_por:usuario.user_name||usuario.nombre,user_name:usuario.nombre});
    if(placa) await sb.from("crm").insert({fecha:hoy(),num:"AL",placa,cliente,tel,vehiculo:`${marca} ${color}${km?` · ${km}km`:""}`,taller:tallerSel,tecnico:tec||usuario.nombre,total:fmt(total),tipo:"Alineado"});
    alert(`✅ Registrado — ${fmt(total)}`);
    setTipo("");setPlaca("");setMarca("");setColor("");setCliente("");setTel("");setTec(usuario.nombre);setKm("");setProxRevision("");setObs("");setFotos([]);
  };

  return <Card>
    <Tit text="🎯 Alineado y Balanceado"/>
    {usuario.taller==="ambos"
      ?<div style={{marginBottom:10}}><Campo label="Taller *"><Sel value={tallerSel} onChange={setTallerSel} options={TALLERES}/></Campo></div>
      :<div style={{padding:"7px 10px",background:"#eff6ff",borderRadius:8,fontWeight:700,color:"#1d4ed8",fontSize:12,marginBottom:10}}>🔧 {tallerSel}</div>}

    <div style={{marginBottom:8}}>
      <div style={{fontSize:11,color:"#3b82f6",fontWeight:700,marginBottom:4}}>🔍 Buscar cliente (opcional):</div>
      <BuscadorCliente onSelect={c=>{setCliente(c.cliente||"");setPlaca(c.placa||"");setTel(c.tel||"");setMarca(c.vehiculo||"");}}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:10}}>
      <Campo label="Cliente"><Inp value={cliente} onChange={setCliente} placeholder="Nombre (opcional)"/></Campo>
      <Campo label="Teléfono"><Inp value={tel} onChange={setTel} placeholder="70000000"/></Campo>
      <Campo label="Placa"><Inp value={placa} onChange={setPlaca} placeholder="1234ABC"/></Campo>
      <Campo label="Marca / Modelo"><Inp value={marca} onChange={setMarca} placeholder="Toyota Corolla"/></Campo>
      <Campo label="Color"><Inp value={color} onChange={setColor} placeholder="Blanco"/></Campo>
      <Campo label="Técnico"><Inp value={tec} onChange={setTec} placeholder={usuario.nombre}/></Campo>
      <Campo label="Km actual"><Inp type="number" value={km} onChange={setKm} placeholder="85000"/></Campo>
      <Campo label="Próx. revisión"><Inp value={proxRevision} onChange={setProxRevision} placeholder="6 meses / al notar..."/></Campo>
      <Campo label="Pago"><Sel value={pago} onChange={setPago} options={["Efectivo","QR","Transferencia"]}/></Campo>
      <Campo label="Observación"><Inp value={obs} onChange={setObs} placeholder="Ruido al frenar, vibración..."/></Campo>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:10}}>
      {[{k:"alineado",l:"🎯 Alineado"},{k:"balanceado",l:"⚖️ Balanceado"},{k:"ambos",l:"🎯⚖️ Ambos"}].map(t=>
        <div key={t.k} onClick={()=>setTipo(t.k)} style={{border:`2px solid ${tipo===t.k?"#f59e0b":"#e2e8f0"}`,borderRadius:10,padding:"8px 6px",cursor:"pointer",textAlign:"center",background:tipo===t.k?"#fffbeb":"#f8fafc"}}>

        <span style={{fontSize:12,color:"#64748b",minWidth:120}}>💰 Precio/llanta Bs.:</span>
        <input type="number" value={precioBalLlanta} onChange={e=>setPrecioBalLlanta(parseFloat(e.target.value)||0)}

      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>

      </div>
    </div>}

    <div style={{marginBottom:10}}><Tit text="📷 Fotos del vehículo"/>

    </div>

    <div style={{background:"#1e293b",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div>
        {totalAl>0&&<div style={{color:"#94a3b8",fontSize:10}}>🎯 Alineado: {fmt(totalAl)}</div>}
        {totalBal>0&&<div style={{color:"#94a3b8",fontSize:10}}>⚖️ Balanceado {llantas}x: {fmt(totalBal)}</div>}
      </div>
      <span style={{color:"#fbbf24",fontWeight:900,fontSize:18}}>{fmt(total)}</span>
    </div>
    <Btn onClick={registrar} color="#16a34a" text="💾 Cobrar y registrar" style={{width:"100%",padding:11}}/>
  </Card>;
}

function Grua({usuario}){
  const [precio,setPrecio]=React.useState(100);
  const [cliente,setCliente]=React.useState("");
  const [tel,setTel]=React.useState("");
  const [origen,setOrigen]=React.useState("");
  const [destino,setDestino]=React.useState("");
  const [placa,setPlaca]=React.useState("");
  const [vehiculo,setVehiculo]=React.useState("");
  const [tec,setTec]=React.useState(usuario.nombre);
  const [obs,setObs]=React.useState("");
  const [pago,setPago]=React.useState("Efectivo");
  const [fotos,setFotos]=React.useState([]);
  const tallerDef=usuario.taller==="ambos"?"":usuario.taller;
  const [tallerSel,setTallerSel]=React.useState(tallerDef);

  const registrar=async()=>{
    if(!origen||!destino||!tallerSel){alert("Completa origen, destino y taller.");return;}
    if(!(await validarCajaAbierta(tallerSel))) return;
    const concepto=`Grúa: ${origen} → ${destino}${placa?` (${placa})`:""}${obs?` · ${obs}`:""}`;
    await sb.from("caja").insert({fecha:hoy(),taller:tallerSel,concepto,tipo:"ingreso",subtipo:"ganancia_neta",monto:precio,metodo_pago:pago,registrado_por:usuario.user_name||usuario.nombre,user_name:usuario.nombre});
    if(placa||cliente) await sb.from("crm").insert({fecha:hoy(),num:"GR",placa:placa||"",cliente,tel,vehiculo:vehiculo||"Servicio de grúa",taller:tallerSel,tecnico:tec||usuario.nombre,total:fmt(precio),tipo:"Grúa"});
    alert(`✅ Grúa registrada — ${fmt(precio)}`);
    setOrigen("");setDestino("");setPlaca("");setCliente("");setTel("");setVehiculo("");setTec(usuario.nombre);setObs("");setPrecio(100);setFotos([]);
  };

  return <Card>
    <Tit text="🚛 Servicio de Grúa"/>
    {usuario.taller==="ambos"
      ?<div style={{marginBottom:10}}><Campo label="Ganancia para taller *"><Sel value={tallerSel} onChange={setTallerSel} options={TALLERES}/></Campo></div>
      :<div style={{padding:"7px 10px",background:"#eff6ff",borderRadius:8,fontWeight:700,color:"#1d4ed8",fontSize:12,marginBottom:10}}>🔧 {tallerSel}</div>}
    <div style={{marginBottom:8}}>
      <div style={{fontSize:11,color:"#3b82f6",fontWeight:700,marginBottom:4}}>🔍 Buscar cliente (opcional):</div>
      <BuscadorCliente onSelect={c=>{setCliente(c.cliente||"");setTel(c.tel||"");setPlaca(c.placa||"");}}/>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,margin:"8px 0"}}>
      <Campo label="Cliente"><Inp value={cliente} onChange={setCliente} placeholder="Nombre"/></Campo>
      <Campo label="Teléfono"><Inp value={tel} onChange={setTel} placeholder="70000000"/></Campo>
      <Campo label="📍 Recoge en *"><Inp value={origen} onChange={setOrigen} placeholder="Dirección o referencia"/></Campo>
      <Campo label="📍 Entrega en *"><Inp value={destino} onChange={setDestino} placeholder="Taller, domicilio..."/></Campo>
      <Campo label="Placa"><Inp value={placa} onChange={setPlaca} placeholder="1234ABC"/></Campo>
      <Campo label="Vehículo"><Inp value={vehiculo} onChange={setVehiculo} placeholder="Toyota Corolla, moto, camión..."/></Campo>
      <Campo label="Técnico"><Inp value={tec} onChange={setTec} placeholder={usuario.nombre}/></Campo>
      <Campo label="Pago"><Sel value={pago} onChange={setPago} options={["Efectivo","QR","Transferencia"]}/></Campo>
    </div>
    <Campo label="Observación"><Inp value={obs} onChange={setObs} placeholder="Tipo de falla..."/></Campo>
    <div style={{marginTop:10,marginBottom:8}}>
      <div style={{fontSize:11,color:"#64748b",fontWeight:700,marginBottom:5}}>PRECIO Bs. (base Bs. 100)</div>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
        <button onClick={()=>setPrecio(p=>Math.max(50,p-10))} style={{width:34,height:34,borderRadius:8,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:18,cursor:"pointer",fontWeight:700}}>−</button>
        <input type="number" value={precio} min={50} onChange={e=>setPrecio(Math.max(50,parseFloat(e.target.value)||50))}
          style={{width:95,padding:"7px",border:"2px solid #fbbf24",borderRadius:8,fontSize:20,fontWeight:900,textAlign:"center",color:"#92400e"}}/>
        <button onClick={()=>setPrecio(p=>p+10)} style={{width:34,height:34,borderRadius:8,border:"1px solid #e2e8f0",background:"#f8fafc",fontSize:18,cursor:"pointer",fontWeight:700}}>+</button>
      </div>
      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
        {[100,150,200,250,300,400].map(v=><button key={v} onClick={()=>setPrecio(v)} style={{padding:"4px 10px",borderRadius:20,border:`1px solid ${precio===v?"#f59e0b":"#e2e8f0"}`,background:precio===v?"#fef3c7":"#f8fafc",fontWeight:700,fontSize:12,cursor:"pointer"}}>Bs. {v}</button>)}
      </div>
    </div>
    <div style={{marginBottom:10}}><Tit text="📷 Fotos del vehículo"/>
      <FotoUpload fotos={fotos} setFotos={setFotos} label="📷 Fotografiar el vehículo"/>
    </div>
    <div style={{background:"#1e293b",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <span style={{color:"#94a3b8",fontSize:12}}>Total grúa</span>
      <span style={{color:"#fbbf24",fontWeight:900,fontSize:18}}>{fmt(precio)}</span>
    </div>
    <Btn onClick={registrar} color="#16a34a" text="💾 Registrar y cobrar" style={{width:"100%",padding:11}}/>
  </Card>;
}

function Otros({usuario,inv,esEnc}){
  const [desc,setDesc]=React.useState("");
  const [cliente,setCliente]=React.useState("");
  const [placa,setPlaca]=React.useState("");
  const [tel,setTel]=React.useState("");
  const [tec]=React.useState(usuario.nombre);
  const [mo,setMo]=React.useState(0);
  const [productos,setProductos]=React.useState([]);
  const [busqProd,setBusqProd]=React.useState("");
  const [mostrarProd,setMostrarProd]=React.useState(false);
  const [loading,setLoading]=React.useState(false);
  const tallerDef=usuario.taller==="ambos"?"":usuario.taller;
  const [tallerSel,setTallerSel]=React.useState(tallerDef);

  const totalProds=productos.reduce((s,p)=>s+(parseFloat(p.precio||0)*p.qty),0);
  const moVal=parseFloat(mo||0);
  const total=moVal+totalProds;
  const invFilt=inv.filter(i=>!busqProd||i.nom.toLowerCase().includes(busqProd.toLowerCase())||(i.marca||"").toLowerCase().includes(busqProd.toLowerCase()));

  const agregarProd=p=>{
    setProductos(prev=>{
      const ex=prev.find(x=>x.id===p.id);
      if(ex){if(ex.qty>=p.stock){alert(`Solo hay ${p.stock} en stock`);return prev;}return prev.map(x=>x.id===p.id?{...x,qty:x.qty+1}:x);}
      return [...prev,{...p,qty:1}];
    });
  };

  const registrar=async()=>{
    if(!desc.trim()){alert("La descripción del servicio es obligatoria.");return;}
    if(!tallerSel){alert("Selecciona el taller.");return;}
    setLoading(true);
    if(!(await validarCajaAbierta(tallerSel))){setLoading(false);return;}
    try{
      const costoProds=productos.reduce((s,p)=>s+(parseFloat(p.costo||0)*p.qty),0);
      const margenProds=totalProds-costoProds;
      const productoSinCosto=productos.find(p=>parseFloat(p.costo||0)<=0);
      if(productos.length>0&&productoSinCosto) throw new Error("El producto "+(productoSinCosto.nom||productoSinCosto.nombre||"seleccionado")+" no tiene costo registrado en inventario.");
      if(margenProds<0) throw new Error("El precio de productos es menor al costo.");
      const{error:errSR}=await sb.from("servicios_rapidos").insert({
        tipo:"otro",descripcion:desc.trim(),
        cliente:cliente||null,placa:placa||null,tel:tel||null,
        tecnico:tec,taller:tallerSel,
        mano_obra:moVal,
        productos:productos.map(p=>({id:p.id,nom:p.nom,precio:p.precio,qty:p.qty})),
        total,fecha:hoy(),creado_por:usuario.nombre
      });
      if(errSR)throw new Error("servicios_rapidos: "+errSR.message);
      if(moVal>0) await sb.from("caja").insert({fecha:hoy(),taller:tallerSel,concepto:`Serv. Otro MO: ${desc.trim()}${placa?` — ${placa}`:""}`,tipo:"ingreso",subtipo:"ganancia_neta",monto:moVal,metodo_pago:"Efectivo",registrado_por:usuario.user_name||usuario.nombre,user_name:usuario.nombre});
      if(costoProds>0) await sb.from("caja").insert({fecha:hoy(),taller:tallerSel,concepto:`Serv. Otro Capital: ${desc.trim()}${placa?` — ${placa}`:""}`,tipo:"ingreso",subtipo:"capital_tienda",monto:costoProds,metodo_pago:"Efectivo",registrado_por:usuario.user_name||usuario.nombre,user_name:usuario.nombre});
      if(margenProds>0) await sb.from("caja").insert({fecha:hoy(),taller:tallerSel,concepto:`Serv. Otro Ganancia Prod: ${desc.trim()}${placa?` — ${placa}`:""}`,tipo:"ingreso",subtipo:"ganancia_neta",monto:margenProds,metodo_pago:"Efectivo",registrado_por:usuario.user_name||usuario.nombre,user_name:usuario.nombre});
      for(const p of productos) await sb.from("inventario").update({stock:Math.max(0,p.stock-p.qty)}).eq("id",p.id);
      alert(`✅ Servicio registrado\n💰 Total: ${fmt(total)}`)
      setDesc("");setCliente("");setPlaca("");
      setMo(0);setProductos([]);setBusqProd("");setMostrarProd(false);
    }catch(e){alert("Error al registrar: "+e.message);}
    setLoading(false);
  };

  return <div>
    {usuario.taller==="ambos"&&<Card><Tit text="🏢 Taller"/><Sel value={tallerSel} onChange={setTallerSel} options={TALLERES}/></Card>}

    <Card>
      <Tit text="📝 Descripción del servicio *"/>
      <textarea value={desc} onChange={e=>setDesc(e.target.value)} rows={2}
        placeholder="Ej: Tornería culata, Soldadura escape, Cambio retén cigüeñal..."
        style={{width:"100%",padding:"8px 10px",border:"2px solid #f59e0b",borderRadius:8,fontSize:13,resize:"vertical",boxSizing:"border-box",fontFamily:"inherit"}}/>
    </Card>

    <Card>
      <Tit text="👤 Cliente (opcional)"/>
      <div style={{marginBottom:8}}>
        <div style={{fontSize:11,color:"#3b82f6",fontWeight:700,marginBottom:4}}>🔍 Buscar cliente existente:</div>
        <BuscadorCliente onSelect={c=>{setCliente(c.cliente||"");setPlaca(c.placa||"");setTel(c.tel||"");}}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Campo label="Nombre"><Inp value={cliente} onChange={setCliente} placeholder="Nombre (opcional)"/></Campo>
        <Campo label="Placa"><Inp value={placa} onChange={setPlaca} placeholder="1234ABC"/></Campo>
        <Campo label="Teléfono"><Inp value={tel} onChange={setTel} placeholder="70000000"/></Campo>
        <Campo label="Técnico"><Inp value={tec} readOnly style={{background:"#f8fafc",color:"#64748b"}}/></Campo>
      </div>
    </Card>

    <Card>
      <Tit text="💼 Precio del servicio / Mano de obra"/>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <span style={{fontSize:12,color:"#64748b"}}>Precio Bs.:</span>
        <input type="number" value={mo} min={0} onChange={e=>setMo(parseFloat(e.target.value)||0)}
          style={{width:120,padding:"8px 10px",border:"2px solid #fbbf24",borderRadius:8,fontSize:18,fontWeight:900,textAlign:"center",color:"#92400e"}}/>
        {moVal>0&&<span style={{fontSize:12,color:"#16a34a",fontWeight:700}}>= {fmt(moVal)}</span>}
      </div>
    </Card>

    <Card>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:mostrarProd?8:0}}>
        <Tit text="📦 Productos del inventario"/>
        <button onClick={()=>{setMostrarProd(!mostrarProd);setBusqProd("");}}
          style={{padding:"5px 12px",background:"#1d4ed8",color:"#fff",border:"none",borderRadius:7,fontSize:11,fontWeight:700,cursor:"pointer"}}>
          {mostrarProd?"✕ Cerrar":"+ Agregar"}
        </button>
      </div>
      {mostrarProd&&<div style={{marginBottom:10}}>
        <input value={busqProd} onChange={e=>setBusqProd(e.target.value)} placeholder="🔍 Buscar producto..."
          style={{width:"100%",padding:"7px 10px",border:"1px solid #3b82f6",borderRadius:8,fontSize:12,boxSizing:"border-box",marginBottom:6}}/>
        <div style={{maxHeight:200,overflowY:"auto",border:"1px solid #e2e8f0",borderRadius:8}}>
          {invFilt.length===0?<div style={{padding:12,color:"#94a3b8",fontSize:12,textAlign:"center"}}>Sin resultados</div>:
          invFilt.map(p=><div key={p.id} onClick={()=>agregarProd(p)}
            style={{padding:"8px 10px",cursor:"pointer",borderBottom:"1px solid #f3f4f6",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fff"}}
            onMouseEnter={e=>e.currentTarget.style.background="#fffbeb"}
            onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
            <div>
              <div style={{fontWeight:700,fontSize:11}}>{p.nom}</div>
              <div style={{fontSize:10,color:"#94a3b8"}}>Stock: {p.stock}{p.cat?` · ${p.cat}`:""}</div>
            </div>
            <span style={{fontWeight:900,color:"#f59e0b",fontSize:12}}>{fmt(p.precio)}</span>
          </div>)}
        </div>
      </div>}
      {productos.length===0
        ?<div style={{color:"#94a3b8",fontSize:12,textAlign:"center",padding:"8px 0"}}>Sin productos — servicio de mano de obra pura</div>
        :productos.map(p=><div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 8px",background:"#f8fafc",borderRadius:7,marginBottom:4,border:"1px solid #e2e8f0"}}>
          <div>
            <div style={{fontWeight:700,fontSize:11}}>{p.nom}</div>
            <div style={{fontSize:10,color:"#16a34a",fontWeight:700}}>{fmt(parseFloat(p.precio||0)*p.qty)}</div>
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <button onClick={()=>setProductos(prev=>prev.map(x=>x.id===p.id&&x.qty>1?{...x,qty:x.qty-1}:x))} style={{width:22,height:22,borderRadius:5,border:"1px solid #e2e8f0",background:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>−</button>
            <span style={{fontWeight:800,fontSize:13,minWidth:20,textAlign:"center"}}>{p.qty}</span>
            <button onClick={()=>setProductos(prev=>prev.map(x=>x.id===p.id&&x.qty<x.stock?{...x,qty:x.qty+1}:x))} style={{width:22,height:22,borderRadius:5,border:"1px solid #e2e8f0",background:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>+</button>
            <button onClick={()=>setProductos(prev=>prev.filter(x=>x.id!==p.id))} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:5,padding:"1px 6px",cursor:"pointer",fontSize:11}}>✕</button>
          </div>
        </div>)
      }
    </Card>

    {total>0&&<Card style={{border:"2px solid #1e293b",padding:"10px 14px"}}>
      {moVal>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#64748b",marginBottom:3}}><span>💼 Mano de obra</span><span>{fmt(moVal)}</span></div>}
      {totalProds>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"#64748b",marginBottom:3}}><span>📦 Productos</span><span>{fmt(totalProds)}</span></div>}
      <div style={{display:"flex",justifyContent:"space-between",background:"#1e293b",borderRadius:8,padding:"8px 12px",marginTop:6}}>
        <span style={{color:"#94a3b8",fontSize:13,fontWeight:700}}>💰 TOTAL</span>
        <span style={{color:"#fbbf24",fontWeight:900,fontSize:18}}>{fmt(total)}</span>
      </div>
    </Card>}

    <Btn onClick={registrar} color={loading?"#94a3b8":"#16a34a"}
      text={loading?"⏳ Registrando...":"✅ Registrar Servicio"}
      style={{width:"100%",padding:13,fontSize:14,marginBottom:20}}/>
  </div>;
}

    </div>
    <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"10px 12px",marginBottom:10}}>
      <div style={{fontSize:9,fontWeight:700,color:"#f97316",textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>📋 Mini OT — diagnóstico + seguimiento</div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
        {TABS_OT.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${tab===t.k?"#f97316":"#e2e8f0"}`,background:tab===t.k?"#fff7ed":"#f8fafc",color:tab===t.k?"#c2410c":"#64748b",fontWeight:700,fontSize:11,cursor:"pointer"}}>{t.l}</button>)}
      </div>
      <div style={{fontSize:9,fontWeight:700,color:"#16a34a",textTransform:"uppercase",letterSpacing:1,marginBottom:5}}>⚡ Servicio simple — cobro directo</div>
      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
        {TABS_SIMPLE.map(t=><button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"6px 12px",borderRadius:8,border:`1px solid ${tab===t.k?"#16a34a":"#e2e8f0"}`,background:tab===t.k?"#f0fdf4":"#f8fafc",color:tab===t.k?"#15803d":"#64748b",fontWeight:700,fontSize:11,cursor:"pointer"}}>{t.l}</button>)}
      </div>
    </div>
    {tab==="aceite"&&<CambioAceite usuario={usuario} inv={inv}/>}
    {tab==="lavado"&&<Lavado usuario={usuario}/>}
    {tab==="alineado"&&<Alineado usuario={usuario}/>}
    {tab==="otros"&&<Otros usuario={usuario} inv={inv} esEnc={!!esEnc}/>}
    {tab==="grua"&&esEnc&&<Grua usuario={usuario}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
