<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Órdenes de Trabajo — Servi Car Platinium</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;min-height:100vh}
input,select,textarea{outline:none}
input:focus,select:focus,textarea:focus{border-color:#f59e0b !important}
.input{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#fff;font-size:13px}
.label{color:#64748b;font-size:11px;font-weight:700;margin-bottom:5px;display:block}
.badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:flex-end;justify-content:center;z-index:1000}
.modal-box{background:#1e293b;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.fi{animation:fi .25s ease both}
.su{animation:su .25s ease both}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-area"></div>
<script>
const SB=window.supabase.createClient("https://epirsbudngwbxgcsryvv.supabase.co","sb_publishable_zsqvMzJMc80Ypf3UQqs-SA_IrV-XIGc");

const ESTADO_COLOR={"Pendiente cotización":"#a78bfa","Cotización enviada":"#f59e0b","En proceso":"#f97316","Listo para entregar":"#22d3ee","Entregado":"#16a34a"};
function estadoColor(e){return ESTADO_COLOR[e]||"#64748b";}
const ROL_COLOR={admin:"#f59e0b",encargado:"#3b82f6",vendedor:"#16a34a",mecanico:"#a16207"};

let usuario=null, ots=[], tecnicos=[];
let filtroEstado="abiertas", filtroTaller="todos", busqueda="";
// Estado del modal de creación
let checklistFluidos={}, nivelGasolina="", fotosEntradaMdl=[];
let tecTallerMap={};

/* ── Session ──────────────────────────────────────────── */
function getSession(){
  try{
    return JSON.parse(localStorage.getItem("scp_user"))
        || JSON.parse(localStorage.getItem("sc_user"))
        || null;
  }catch{return null;}
}

/* ── Init ─────────────────────────────────────────────── */
async function init(){
  usuario=getSession();
  if(!usuario){location.href="/";return;}
  spinnerCargando();
  await Promise.all([cargarOTs(),cargarTecnicos()]);
  renderLista();
}

function spinnerCargando(){
  document.getElementById("app").innerHTML=`
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
    <div style="text-align:center;color:#334155">
      <div style="font-size:40px;margin-bottom:10px">📋</div>
      <div>Cargando órdenes...</div>
    </div>
  </div>`;
}

/* ── Queries ──────────────────────────────────────────── */
async function cargarOTs(){
  let q=SB.from("ots").select("*").order("id",{ascending:false});
  // mecanico y vendedor ven las OTs que crearon O que tienen asignadas
  if(usuario.rol==="mecanico"||usuario.rol==="vendedor"){
    q=q.or(`creado_por.eq.${usuario.user_name},tecnico.eq.${usuario.nombre}`);
  } else if(usuario.taller && usuario.taller!=="ambos"){
    q=q.eq("taller",usuario.taller);
  }
  const{data}=await q;
  ots=data||[];
}

async function cargarTecnicos(){
  const{data}=await SB.from("usuarios").select("nombre,user_name,taller,rol");
  tecnicos=(data||[]).filter(u=>
    (usuario.taller==="ambos" || u.taller===usuario.taller || u.taller==="ambos")
  );
}

/* ── Filtrado local ───────────────────────────────────── */
function getOTsFiltradas(){
  let lista=[...ots];
  if(usuario.taller==="ambos" && filtroTaller!=="todos")
    lista=lista.filter(o=>o.taller===filtroTaller);
  if(filtroEstado==="abiertas")   lista=lista.filter(o=>o.estado!=="Entregado");
  else if(filtroEstado==="entregadas") lista=lista.filter(o=>o.estado==="Entregado");
  if(busqueda.trim()){
    const b=busqueda.toLowerCase();
    lista=lista.filter(o=>
      (o.placa||"").toLowerCase().includes(b)||
      (o.cliente||"").toLowerCase().includes(b)||
      (o.num||"").toLowerCase().includes(b)||
      (o.tecnico||"").toLowerCase().includes(b)
    );
  }
  return lista;
}

/* ── Render lista ─────────────────────────────────────── */
function renderLista(){
  const filtradas=getOTsFiltradas();
  const puedeCrear=true;
  const esAdmin=usuario.rol==="admin";
  const esEnc=["admin","encargado"].includes(usuario.rol);
  const tieneAmbos=usuario.taller==="ambos";
  const cRol=ROL_COLOR[usuario.rol]||"#64748b";
  // Badges filtrados por taller visible (para encargados single-taller, filtroTaller no aplica)
  const otsVistas=tieneAmbos&&filtroTaller!=="todos"?ots.filter(o=>o.taller===filtroTaller):ots;
  const pendCot=esEnc?otsVistas.filter(o=>o.estado==="Pendiente cotización").length:0;
  const pendEnt=esEnc?otsVistas.filter(o=>o.estado==="Listo para entregar").length:0;
  const tallerLabel=tieneAmbos?(filtroTaller==="todos"?"ambos talleres":filtroTaller):(usuario.taller||"");

  document.getElementById("app").innerHTML=`
  <!-- Header sticky -->
  <div style="background:#1e293b;border-bottom:1px solid #334155;padding:12px 16px;position:sticky;top:0;z-index:100">
    <div style="max-width:520px;margin:0 auto;display:flex;justify-content:space-between;align-items:center">
      <div>
        <a href="/" style="color:#475569;text-decoration:none;font-size:10px;font-weight:700">← Inicio</a>
        <div style="color:#fbbf24;font-weight:900;font-size:15px;margin-top:1px">📋 Órdenes de Trabajo</div>
        ${pendCot>0?`<span style="display:inline-block;padding:2px 8px;background:#ef444425;color:#ef4444;border:1px solid #ef444440;border-radius:10px;font-size:9px;font-weight:700;margin-top:3px">🔴 ${pendCot} sin cotizar</span>`:""}
        ${pendEnt>0?`<span style="display:inline-block;padding:2px 8px;background:#f59e0b25;color:#f59e0b;border:1px solid #f59e0b40;border-radius:10px;font-size:9px;font-weight:700;margin-top:3px">🏁 ${pendEnt} para cobrar</span>`:""}
        <div style="color:#475569;font-size:10px;margin-top:1px">
          ${usuario.nombre}
          <span style="padding:1px 7px;background:${cRol}20;color:${cRol};border-radius:10px;font-size:9px;font-weight:700;margin-left:4px">${usuario.rol}</span>
          · ${ots.length} OTs
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button onclick="recargar()" style="padding:8px 10px;background:#334155;color:#94a3b8;border:none;border-radius:8px;cursor:pointer;font-size:14px" title="Actualizar">🔄</button>
        ${puedeCrear?`<button onclick="mostrarCrear()" style="padding:8px 13px;background:#f59e0b;color:#1e293b;border:none;border-radius:8px;font-weight:900;font-size:12px;cursor:pointer">+ Nueva OT</button>`:""}
      </div>
    </div>
  </div>

  <div class="fi" style="padding:12px 14px;max-width:520px;margin:0 auto">

    <!-- Búsqueda -->
    <div style="position:relative;margin-bottom:10px">
      <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#475569">🔍</span>
      <input type="text" value="${busqueda.replace(/"/g,'&quot;')}"
        oninput="busqueda=this.value;renderLista()"
        placeholder="Buscar placa, cliente, N° OT..."
        style="width:100%;padding:9px 12px 9px 33px;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#fff;font-size:13px"/>
    </div>

    <!-- Filtros estado -->
    <div style="display:flex;gap:5px;margin-bottom:${tieneAmbos?"8px":"14px"}">
      ${[["abiertas","Abiertas"],["entregadas","Entregadas"],["todas","Todas"]].map(([k,l])=>`
        <button onclick="filtroEstado='${k}';renderLista()"
          style="padding:6px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;
            border:1px solid ${filtroEstado===k?"#f59e0b":"#334155"};
            background:${filtroEstado===k?"#f59e0b":"#1e293b"};
            color:${filtroEstado===k?"#1e293b":"#64748b"}">${l}</button>`).join("")}
    </div>

    <!-- Filtro taller (solo admin ambos talleres) -->
    ${tieneAmbos?`
    <div style="display:flex;gap:5px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px">
      ${[["todos","Ambos talleres"],["Taller 1 · Montes","T1 · Montes"],["Taller 2 · Bella Vista","T2 · Bella Vista"]].map(([k,l])=>`
        <button onclick="filtroTaller='${k}';renderLista()"
          style="white-space:nowrap;padding:5px 10px;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;
            border:1px solid ${filtroTaller===k?"#3b82f6":"#334155"};
            background:${filtroTaller===k?"#3b82f620":"#1e293b"};
            color:${filtroTaller===k?"#3b82f6":"#475569"}">${l}</button>`).join("")}
    </div>`:""}

    <!-- Contador -->
    <div style="color:#334155;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">
      ${filtradas.length} orden${filtradas.length!==1?"es":""} · ${tallerLabel}
    </div>

    <!-- Lista -->
    ${filtradas.length===0?`
      <div style="text-align:center;padding:50px 20px">
        <div style="font-size:44px;margin-bottom:12px">📋</div>
        <div style="font-size:13px;font-weight:700;color:#475569;margin-bottom:6px">Sin órdenes</div>
        <div style="font-size:11px;color:#334155">
          ${busqueda?`No hay resultados para "${busqueda}"`:
            filtroEstado==="abiertas"?"No hay órdenes abiertas":
            filtroEstado==="entregadas"?"No hay órdenes entregadas":"No hay órdenes"}
        </div>
        ${puedeCrear?`<button onclick="mostrarCrear()" style="margin-top:16px;padding:10px 20px;background:#f59e0b;color:#1e293b;border:none;border-radius:10px;font-weight:900;font-size:13px;cursor:pointer">+ Crear primera OT</button>`:""}
      </div>`
    :filtradas.map(o=>tarjetaOT(o,esAdmin,tieneAmbos)).join("")}

    <div style="height:28px"></div>
  </div>`;
}

/* ── Tarjeta OT ───────────────────────────────────────── */
function tarjetaOT(o,esAdmin,tieneAmbos){
  const estado=o.estado||"Pendiente cotización";
  const color=estadoColor(estado);
  const label=estado;
  const paso=o.paso||1;
  const prog=Math.round((Math.min(paso,6)/6)*100);
  const cTall=o.taller==="Taller 1 · Montes"?"#3b82f6":"#10b981";
  const lTall=o.taller==="Taller 1 · Montes"?"T1 · Montes":o.taller==="Taller 2 · Bella Vista"?"T2 · Bella Vista":(o.taller||"");

  return `
  <div onclick="abrirDetalle(${o.id})" style="cursor:pointer;background:#1e293b;border:1px solid #334155;border-left:3px solid ${color};border-radius:14px;padding:14px;margin-bottom:8px;transition:all .15s"
    onmouseenter="this.style.background='${color}0a';this.style.borderColor='${color}'"
    onmouseleave="this.style.background='#1e293b';this.style.borderColor='#334155';this.style.borderLeftColor='${color}'">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <div style="flex:1;min-width:0">
        <div style="font-weight:900;font-size:14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span>${o.num||"OT-"+o.id}</span>
          ${(o.marca||o.modelo)?`<span style="color:#64748b;font-weight:400;font-size:12px">${o.marca||""} ${o.modelo||""}</span>`:""}
        </div>
        <div style="color:#94a3b8;font-size:11px;margin-top:3px">🚗 <strong>${o.placa||"—"}</strong> · 👤 ${o.cliente||"—"}</div>
        ${o.tecnico?`<div style="color:#475569;font-size:10px;margin-top:2px">🔧 ${o.tecnico}</div>`:""}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:8px;flex-shrink:0">
        <span class="badge" style="background:${color}20;color:${color};border:1px solid ${color}40">${label}</span>
        ${tieneAmbos?`<span class="badge" style="background:${cTall}20;color:${cTall};border:1px solid ${cTall}40">${lTall}</span>`:""}
      </div>
    </div>
    <!-- Progreso -->
    <div style="background:#0f172a;border-radius:4px;height:3px;margin-bottom:8px">
      <div style="background:${color};height:3px;border-radius:4px;width:${prog}%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:10px;color:#334155">${o.fecha||""}</div>
      <div style="display:flex;gap:6px;align-items:center">
        ${["admin","encargado"].includes(usuario?.rol)&&o.total>0?`<span style="color:#16a34a;font-weight:700;font-size:12px">Bs. ${Number(o.total).toLocaleString()}</span>`:""}
        ${esAdmin?`<button onclick="event.stopPropagation();confirmarBorrar(${o.id})" style="background:#ef444415;border:1px solid #ef444430;color:#ef4444;border-radius:6px;padding:3px 7px;font-size:10px;cursor:pointer">🗑</button>`:""}
        <span style="color:#475569;font-size:12px">→</span>
      </div>
    </div>
  </div>`;
}

/* ── Acciones ─────────────────────────────────────────── */
function abrirDetalle(id){location.href="/ot-detalle.html?id="+id;}

async function recargar(){
  spinnerCargando();
  await cargarOTs();
  renderLista();
}

async function confirmarBorrar(id){
  if(!confirm("¿Eliminar esta OT? No se puede deshacer."))return;
  await SB.from("ots").delete().eq("id",id);
  ots=ots.filter(o=>o.id!==id);
  renderLista();
}

/* ── Modal helpers: checklist + problemas + fotos ──────── */
function setFluido(key,val,btn){
  checklistFluidos[key]=val;
  btn.parentElement.querySelectorAll("button").forEach(b=>Object.assign(b.style,{background:"#0f172a",color:"#64748b",borderColor:"#334155",fontWeight:"400"}));
  Object.assign(btn.style,{background:"#f59e0b20",color:"#f59e0b",borderColor:"#f59e0b",fontWeight:"700"});
}
function setGasolina(val,color,pct,btn){
  nivelGasolina=val;
  btn.parentElement.querySelectorAll("button").forEach(b=>Object.assign(b.style,{background:"#0f172a",color:"#64748b",borderColor:"#334155",fontWeight:"400"}));
  Object.assign(btn.style,{background:color+"20",color,borderColor:color,fontWeight:"700"});
  const f=document.getElementById("fuel_fill");if(f){f.style.width=pct+"%";f.style.background=color;}
}
function agregarFotoEntradaMdl(){
  if(fotosEntradaMdl.length>=4){alert("Máximo 4 fotos");return;}
  const inp=document.createElement("input");inp.type="file";inp.accept="image/*";inp.capture="environment";
  inp.onchange=()=>{
    const f=inp.files[0];if(!f)return;
    const r=new FileReader();r.onload=e=>{
      const img=new Image();img.onload=()=>{
        const c=document.createElement("canvas");const MAX=800;let w=img.width,h=img.height;
        if(w>MAX){h=h*MAX/w;w=MAX;}c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
        fotosEntradaMdl.push(c.toDataURL("image/jpeg",.75));actualizarPreviaMdl();
      };img.src=e.target.result;
    };r.readAsDataURL(f);
  };inp.click();
}
function actualizarPreviaMdl(){
  const cont=document.getElementById("fotos_mdl_preview");if(!cont)return;
  cont.innerHTML=fotosEntradaMdl.map((b,i)=>`
    <div style="position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;background:#0f172a;border:1px solid #334155">
      <img src="${b}" style="width:100%;height:100%;object-fit:cover"/>
      <button onclick="quitarFotoMdl(${i})" style="position:absolute;top:2px;right:2px;background:rgba(239,68,68,.9);border:none;border-radius:50%;width:18px;height:18px;color:#fff;font-size:10px;cursor:pointer;line-height:18px;padding:0">✕</button>
    </div>`).join("");
  const btn=document.getElementById("btn_foto_mdl");if(btn)btn.style.display=fotosEntradaMdl.length>=4?"none":"block";
}
function quitarFotoMdl(idx){fotosEntradaMdl.splice(idx,1);actualizarPreviaMdl();}

/* ── Modal crear OT ───────────────────────────────────── */
function mostrarCrear(){
  checklistFluidos={};nivelGasolina="";fotosEntradaMdl=[];
  const esEnc2=["admin","encargado"].includes(usuario.rol);
  // Taller: todos pueden elegir, default al taller habitual del usuario
  const tallerDefault=(usuario.taller==="ambos"||!usuario.taller)?"Taller 1 · Montes":usuario.taller;
  const tallerOpts=["Taller 1 · Montes","Taller 2 · Bella Vista"]
    .map(t=>`<option value="${t}"${t===tallerDefault?" selected":""}>${t}</option>`).join("");

  // Todos los técnicos visibles para que cualquier usuario pueda asignar cross-taller
  tecTallerMap={};
  tecnicos.forEach(t=>{tecTallerMap[t.nombre]=t.taller;});
  const tecOpts=tecnicos.length
    ?tecnicos.map(t=>`<option value="${t.nombre}"${t.user_name===usuario.user_name?" selected":""}>${t.nombre}${t.user_name===usuario.user_name?" (yo)":""}</option>`).join("")
    :`<option value="${usuario.nombre}">${usuario.nombre} (yo)</option>`;

  document.getElementById("modal-area").innerHTML=`
  <div class="modal" onclick="if(event.target===this)cerrarModal()">
  <div class="modal-box su">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="color:#fbbf24;font-weight:900;font-size:15px">+ Nueva Orden de Trabajo</div>
      <button onclick="cerrarModal()" style="padding:5px 12px;background:#334155;color:#94a3b8;border:none;border-radius:8px;cursor:pointer;font-weight:700">✕</button>
    </div>

    <div class="label">Placa *</div>
    <input id="n_placa" class="input" placeholder="Ej: 1234ABC" style="margin-bottom:6px;text-transform:uppercase"
      oninput="this.value=this.value.toUpperCase();buscarCliente()"/>
    <div id="crm_sg" style="display:none;background:#0f172a;border:1px solid #16a34a;border-radius:8px;padding:10px;margin-bottom:10px;cursor:pointer;color:#4ade80;font-size:12px"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><div class="label">Marca</div><input id="n_marca" class="input" placeholder="Toyota"/></div>
      <div><div class="label">Modelo</div><input id="n_modelo" class="input" placeholder="Corolla"/></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
      <div><div class="label">Año</div><input id="n_anio" type="number" class="input" placeholder="2018"/></div>
      <div><div class="label">Km</div><input id="n_km" type="number" class="input" placeholder="85000"/></div>
    </div>
    <div class="label">Cliente *</div>
    <input id="n_cliente" class="input" placeholder="Nombre completo" style="margin-bottom:8px"/>
    <div class="label">Teléfono</div>
    <input id="n_tel" type="tel" class="input" placeholder="7XXXXXXX" style="margin-bottom:12px"/>

    <!-- Checklist de recepción -->
    <div style="background:#0f172a;border:1px solid #f59e0b30;border-radius:12px;padding:12px;margin-bottom:12px">
      <div style="color:#f59e0b;font-size:11px;font-weight:700;margin-bottom:10px;text-transform:uppercase">⚠️ Checklist de recepción</div>
      ${[["🛢️ Aceite motor","aceite_motor",["Bien","Regular","Sucio","Le falta","Vacío/No cuenta"]],
         ["🔵 Aceite frenos","aceite_frenos",["Bien","Regular","Bajo","Vacío/No cuenta"]],
         ["🟢 Refrigerante","refrigerante",["Bien","Regular","Bajo","Vacío/No cuenta"]],
         ["🔋 Agua batería","agua_bateria",["Bien","Regular","Baja","Vacío/No cuenta"]]
        ].map(([lbl,key,opts])=>`
      <div style="margin-bottom:9px">
        <div class="label" style="margin-bottom:4px">${lbl}</div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          ${opts.map(v=>`<button type="button" onclick="setFluido('${key}','${v}',this)"
            style="padding:5px 10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#64748b;font-size:11px;cursor:pointer;font-family:inherit">${v}</button>`).join("")}
        </div>
      </div>`).join("")}
      <div>
        <div class="label" style="margin-bottom:4px">⛽ Nivel de gasolina</div>
        <div style="display:flex;gap:3px">
          ${[["Lleno","#16a34a",100],["¾","#22c55e",75],["½","#f59e0b",50],["¼","#f97316",25],["Reserva","#ef4444",10]].map(([v,c,p])=>`
          <button type="button" onclick="setGasolina('${v}','${c}',${p},this)"
            style="flex:1;padding:6px 2px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#64748b;font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center">${v}</button>`).join("")}
        </div>
        <div style="margin-top:5px;height:10px;background:#0f172a;border-radius:6px;border:1px solid #334155;overflow:hidden">
          <div id="fuel_fill" style="height:100%;width:0%;background:#16a34a;border-radius:6px;transition:width .4s,background .4s"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:9px;color:#334155;margin-top:2px"><span>Vacío</span><span>½</span><span>Lleno</span></div>
      </div>
    </div>

    <!-- Problema reportado -->
    <div class="label">🔧 Problema reportado <span style="color:#ef4444">*</span></div>
    <textarea id="prob_texto" class="input" rows="3" placeholder="Describe el problema que reporta el cliente..." style="resize:none;line-height:1.5;margin-bottom:10px"></textarea>

    <!-- Técnico y taller -->
    <div class="label">Técnico asignado</div>
    <select id="n_tecnico" class="input" style="margin-bottom:8px" onchange="autoSugerirTaller(this)">${tecOpts}</select>
    <div class="label">Taller <span style="color:#475569;font-weight:400">(se sugiere según técnico, editable)</span></div>
    <select id="n_taller" class="input" style="margin-bottom:12px">${tallerOpts}</select>

    <!-- Fotos de entrada -->
    <div class="label">📷 Fotos del vehículo al ingreso <span style="color:#ef4444">*</span> <span style="color:#64748b;font-weight:400">(mín. 1, máx. 4)</span></div>
    <div id="fotos_mdl_preview" style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:6px"></div>
    <button type="button" id="btn_foto_mdl" onclick="agregarFotoEntradaMdl()"
      style="width:100%;padding:9px;background:#1d4ed820;color:#60a5fa;border:1px solid #1d4ed840;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:14px">
      📷 Tomar foto / subir de galería
    </button>

    <button id="btn_crear" onclick="crearOT()" style="width:100%;padding:13px;background:#f59e0b;color:#1e293b;border:none;border-radius:10px;font-weight:900;font-size:14px;cursor:pointer">
      ✅ Crear OT
    </button>
  </div></div>`;
}

async function buscarCliente(){
  const placa=(document.getElementById("n_placa")?.value||"").trim();
  const sg=document.getElementById("crm_sg");
  if(!sg||placa.length<3){if(sg)sg.style.display="none";return;}
  const{data}=await SB.from("crm").select("*").ilike("placa",`%${placa}%`).limit(1).single();
  if(data){
    const nombre=data.nombre||data.cliente||"";
    sg.style.display="block";
    sg.innerHTML=`✅ <strong>Cliente conocido:</strong> ${nombre} · ${data.placa||""} · ${data.marca||""} ${data.modelo||""}<br>
      <span style="color:#64748b;font-size:10px">Toca para autocompletar</span>`;
    sg.onclick=()=>{
      document.getElementById("n_cliente").value=nombre;
      document.getElementById("n_tel").value=data.tel||"";
      document.getElementById("n_marca").value=data.marca||"";
      document.getElementById("n_modelo").value=data.modelo||"";
      sg.style.display="none";
    };
  } else {
    sg.style.display="none";
  }
}

async function crearOT(){
  const placa=(document.getElementById("n_placa")?.value||"").trim().toUpperCase();
  const cliente=(document.getElementById("n_cliente")?.value||"").trim();
  if(!placa||!cliente){alert("Completa: placa y cliente");return;}

  // Validar problema reportado
  const probTexto=(document.getElementById("prob_texto")?.value||"").trim();
  if(!probTexto){alert("Describe el problema reportado por el cliente");return;}

  // Validar fotos
  if(fotosEntradaMdl.length===0){alert("Agrega al menos 1 foto del vehículo al ingreso");return;}

  const btn=document.getElementById("btn_crear");
  if(btn){btn.disabled=true;btn.textContent="⏳ Creando...";}

  const nueva={
    num:"OT-"+Date.now().toString().slice(-5),
    placa,cliente,
    problema:probTexto,
    problemas:[],
    checklist_fluidos:checklistFluidos,
    nivel_gasolina:nivelGasolina,
    marca:(document.getElementById("n_marca")?.value||"").trim(),
    modelo:(document.getElementById("n_modelo")?.value||"").trim(),
    anio:document.getElementById("n_anio")?.value||null,
    km:document.getElementById("n_km")?.value||null,
    tel:(document.getElementById("n_tel")?.value||"").trim(),
    tecnico:document.getElementById("n_tecnico")?.value||usuario.nombre,
    taller:document.getElementById("n_taller")?.value||usuario.taller||"Taller 1 · Montes",
    paso:1,estado:"Pendiente cotización",
    creado_por:usuario.user_name,
    fecha:new Date().toLocaleDateString("es-BO"),
    repuestos:[],servicios:[],fotos_recepcion:[],fotos_trabajo:[],
    fotos_entrada:[],fotos_salida:[],total:0
  };

  const{data,error}=await SB.from("ots").insert(nueva).select().single();
  if(error){
    alert("Error: "+error.message);
    if(btn){btn.disabled=false;btn.textContent="✅ Crear OT";}
    return;
  }

  // Subir fotos (intenta Storage, fallback base64)
  if(btn) btn.textContent="⏳ Subiendo fotos...";
  const fotosUrls=[];
  for(const b64 of fotosEntradaMdl){
    try{
      const path=`${data.id}/ent_${Date.now()}_${Math.random().toString(36).slice(2,5)}.jpg`;
      const blob=await (await fetch(b64)).blob();
      const{error:upErr}=await SB.storage.from("ot-fotos").upload(path,blob,{contentType:"image/jpeg",upsert:true});
      fotosUrls.push(upErr?b64:SB.storage.from("ot-fotos").getPublicUrl(path).data.publicUrl);
    }catch{fotosUrls.push(b64);}
  }
  await SB.from("ots").update({fotos_entrada:fotosUrls}).eq("id",data.id);

  cerrarModal();
  location.href="/ot-detalle.html?id="+data.id;
}

function cerrarModal(){document.getElementById("modal-area").innerHTML="";}

function autoSugerirTaller(sel){
  const taller=tecTallerMap[sel.value];
  const n_taller=document.getElementById("n_taller");
  if(n_taller&&taller&&taller!=="ambos") n_taller.value=taller;
}

/* ── Globals ──────────────────────────────────────────── */
window.recargar=recargar;
window.mostrarCrear=mostrarCrear;
window.crearOT=crearOT;
window.cerrarModal=cerrarModal;
window.buscarCliente=buscarCliente;
window.abrirDetalle=abrirDetalle;
window.confirmarBorrar=confirmarBorrar;
window.setFluido=setFluido;
window.setGasolina=setGasolina;
window.agregarFotoEntradaMdl=agregarFotoEntradaMdl;
window.quitarFotoMdl=quitarFotoMdl;
window.autoSugerirTaller=autoSugerirTaller;

init();
</script>
