<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>OT — Servi Car Platinium</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;background:#f0f4f8}#root{min-height:100vh}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const SUPA_URL="https://epirsbudngwbxgcsryvv.supabase.co";
const SUPA_KEY="sb_publishable_zsqvMzJMc80Ypf3UQqs-SA_IrV-XIGc";
const sb=window.supabase.createClient(SUPA_URL,SUPA_KEY);
const EMPRESA={nombre:"SERVI CAR PLATINIUM",ciudad:"Viacha - La Paz",tel1:"68167264",tel2:"60574920"};
const fmt=n=>`Bs. ${parseFloat(n||0).toFixed(2)}`;
const hoy=()=>new Date().toLocaleDateString("es-BO");
const hora=()=>new Date().toLocaleTimeString("es-BO",{hour:"2-digit",minute:"2-digit"});

const comprimirFoto=(file,cb)=>{
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      const MAX=400;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=h*(MAX/w);w=MAX;}}else{if(h>MAX){w=w*(MAX/h);h=MAX;}}
      c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      cb(c.toDataURL("image/jpeg",0.65));
    };img.src=ev.target.result;
  };r.readAsDataURL(file);
};

function FotoUpload({fotos=[],setFotos,label="📷 Tomar foto"}){
  const add=e=>{Array.from(e.target.files).forEach(f=>comprimirFoto(f,url=>setFotos(p=>[...p,{url,hora:hora()}])));e.target.value="";};
  return <div>
    <label style={{display:"inline-flex",alignItems:"center",gap:5,padding:"7px 12px",background:"#1e293b",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,color:"#fbbf24"}}>
      📷 {label}<input type="file" accept="image/*" capture="environment" multiple onChange={add} style={{display:"none"}}/>
    </label>
    {fotos.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:7}}>
      {fotos.map((f,i)=><div key={i} style={{position:"relative"}}>
        <img src={f.url} alt="" style={{width:65,height:65,objectFit:"cover",borderRadius:7,border:"2px solid #e2e8f0"}}/>
        <button onClick={()=>setFotos(p=>p.filter((_,j)=>j!==i))} style={{position:"absolute",top:-4,right:-4,background:"#ef4444",color:"#fff",border:"none",borderRadius:"50%",width:16,height:16,fontSize:9,cursor:"pointer",padding:0}}>✕</button>
      </div>)}
    </div>}
  </div>;
}

function Login({onLogin}){
  const [u,setU]=React.useState("");const [p,setP]=React.useState("");
  const [err,setErr]=React.useState("");const [cargando,setCargando]=React.useState(false);
  const ok=async()=>{
    setCargando(true);
    const{data}=await sb.from("usuarios").select("*").eq("user_name",u.toLowerCase().trim()).eq("pass",p).single();
    setCargando(false);
    if(data) onLogin(data);
    else setErr("Usuario o contraseña incorrectos");
  };
  return <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center"}}>
    <div style={{background:"#1e293b",borderRadius:16,padding:32,width:300,boxShadow:"0 20px 60px rgba(0,0,0,.5)"}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:40}}>📋</div>
        <div style={{color:"#fbbf24",fontWeight:900,fontSize:16}}>{EMPRESA.nombre}</div>
        <div style={{color:"#64748b",fontSize:11,marginTop:4}}>Órdenes de Trabajo</div>
      </div>
      {[["USUARIO",u,setU,"text"],["CONTRASEÑA",p,setP,"password"]].map(([l,v,s,t])=>
        <div key={l} style={{marginBottom:12}}>
          <div style={{color:"#94a3b8",fontSize:11,marginBottom:4,fontWeight:700}}>{l}</div>
          <input type={t} value={v} onChange={e=>s(e.target.value)} onKeyDown={e=>e.key==="Enter"&&ok()}
            style={{width:"100%",padding:"10px 12px",background:"#0f172a",border:"1px solid #334155",borderRadius:8,color:"#fff",fontSize:13,boxSizing:"border-box"}}/>
        </div>)}
      {err&&<div style={{color:"#ef4444",fontSize:11,marginBottom:10,textAlign:"center"}}>{err}</div>}
      <button onClick={ok} disabled={cargando} style={{width:"100%",padding:11,background:"#f59e0b",color:"#1e293b",border:"none",borderRadius:8,fontWeight:900,fontSize:14,cursor:"pointer"}}>{cargando?"Verificando...":"Ingresar →"}</button>
    </div>
  </div>;
}

function ListaOTs({usuario,onNueva}){
  const [ots,setOts]=React.useState([]);
  const [cargando,setCargando]=React.useState(false);
  const [filtro,setFiltro]=React.useState("todos");
  const esAdmin=["admin","encargado"].includes(usuario.rol)||["wilfredo","william"].includes(usuario.user_name);

  const cargar=async()=>{
    setCargando(true);
    let q=sb.from("ots").select("*").order("created_at",{ascending:false});
    if(!esAdmin) q=q.eq("tecnico",usuario.nombre);
    const{data}=await q;
    setOts(data||[]);
    setCargando(false);
  };

  React.useEffect(()=>{cargar();},[]);

  const borrar=async(ot,e)=>{
    e.stopPropagation();
    if(usuario.user_name!=="wilfredo"){alert("❌ Solo Wilfredo puede borrar OTs.");return;}
    if(!window.confirm(`¿Borrar OT ${ot.num}?\nEsta acción NO se puede deshacer.`))return;
    await sb.from("ots").delete().eq("id",ot.id);
    cargar();
  };

  const abrirDetalle=(ot)=>{
    // Guardar OT en sessionStorage y abrir detalle
    sessionStorage.setItem("ot_actual",JSON.stringify(ot));
    sessionStorage.setItem("usuario_ot",JSON.stringify(usuario));
    window.location.href="/ot-detalle.html";
  };

  const estadoColor={1:"#94a3b8",2:"#3b82f6",3:"#f59e0b",4:"#8b5cf6",5:"#ec4899",6:"#14b8a6",7:"#22c55e",8:"#16a34a"};
  const estadoLabel={1:"Recepción",2:"Diagnóstico",3:"Cotización",4:"Aprobado",5:"En trabajo",6:"Terminado",7:"Calidad",8:"Entregado"};

  const otsFiltradas=ots.filter(o=>{
    if(filtro==="activas") return o.paso<8;
    if(filtro==="entregadas") return o.paso>=8;
    return true;
  });

  return <div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{fontWeight:900,fontSize:14,color:"#1e293b"}}>📋 Órdenes de Trabajo</div>
      <button onClick={onNueva} style={{padding:"7px 14px",background:"#16a34a",color:"#fff",border:"none",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer"}}>+ Nueva OT</button>
    </div>

    {/* Filtros */}
    <div style={{display:"flex",gap:5,marginBottom:10}}>
      {[{k:"todos",l:"Todas"},{k:"activas",l:"🔄 Activas"},{k:"entregadas",l:"✅ Entregadas"}].map(f=>
        <button key={f.k} onClick={()=>setFiltro(f.k)} style={{padding:"5px 10px",borderRadius:7,border:`1px solid ${filtro===f.k?"#fbbf24":"#e2e8f0"}`,background:filtro===f.k?"#fffbeb":"#fff",color:filtro===f.k?"#92400e":"#64748b",fontWeight:700,fontSize:10,cursor:"pointer"}}>{f.l}</button>)}
    </div>

    {cargando?<div style={{textAlign:"center",padding:20,color:"#94a3b8"}}>Cargando...</div>:
    otsFiltradas.length===0?<div style={{textAlign:"center",padding:30,color:"#94a3b8",fontSize:12,background:"#fff",borderRadius:10}}>Sin órdenes de trabajo</div>:
    <div style={{display:"grid",gap:8}}>
      {otsFiltradas.map(ot=><div key={ot.id}
        style={{background:"#fff",borderRadius:10,padding:"10px 12px",border:`2px solid ${estadoColor[ot.paso]||"#e2e8f0"}20`,cursor:"pointer"}}
        onClick={()=>abrirDetalle(ot)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:4}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>
              <span style={{fontWeight:900,fontSize:13}}>{ot.num}</span>
              <span style={{padding:"2px 7px",background:`${estadoColor[ot.paso]||"#94a3b8"}20`,color:estadoColor[ot.paso]||"#94a3b8",borderRadius:20,fontSize:9,fontWeight:700}}>{estadoLabel[ot.paso]||"—"}</span>
            </div>
            <div style={{fontSize:12,color:"#374151"}}>🚗 {ot.placa} · {ot.marca} {ot.modelo}</div>
            <div style={{fontSize:11,color:"#64748b"}}>👤 {ot.cliente||"—"} · 👨‍🔧 {ot.tecnico}</div>
            <div style={{fontSize:10,color:"#94a3b8"}}>📅 {ot.fecha} · 🏢 {ot.taller}</div>
          </div>
          <div style={{display:"flex",gap:5,alignItems:"center",flexDirection:"column"}}>
            {ot.total>0&&<span style={{fontWeight:900,fontSize:13,color:"#16a34a"}}>{fmt(ot.total)}</span>}
            <div style={{display:"flex",gap:4}}>
              <span style={{padding:"3px 8px",background:"#eff6ff",color:"#1d4ed8",borderRadius:6,fontSize:9,fontWeight:700}}>Ver →</span>
              {usuario.user_name==="wilfredo"&&<button onClick={e=>borrar(ot,e)} style={{padding:"3px 7px",background:"#fee2e2",color:"#dc2626",border:"1px solid #fca5a5",borderRadius:6,fontSize:9,cursor:"pointer",fontWeight:700}}>🗑️</button>}
            </div>
          </div>
        </div>
      </div>)}
    </div>}
  </div>;
}

function FormOT({usuario,onGuardado,onCancelar}){
  const [form,setForm]=React.useState({
    placa:"",cliente:"",tel:"",marca:"",modelo:"",color:"",
    km:"",combustible:"3/4",
    taller:usuario.taller==="ambos"?"":usuario.taller,
    tecnico:usuario.nombre,problema:""
  });
  const [fotos,setFotos]=React.useState([]);
  const [guardando,setGuardando]=React.useState(false);
  const [usuarios,setUsuarios]=React.useState([]);
  const esEncargado=["admin","encargado"].includes(usuario.rol)||["wilfredo","william"].includes(usuario.user_name);

  React.useEffect(()=>{
    sb.from("usuarios").select("nombre,rol,user_name").then(({data})=>setUsuarios(data||[]));
  },[]);

  const guardar=async()=>{
    if(!form.placa||!form.tecnico||!form.taller){alert("Completa placa, técnico y taller.");return;}
    setGuardando(true);
    const num=`OT-${Date.now().toString().slice(-5)}`;
    const{data,error}=await sb.from("ots").insert({
      num,fecha:hoy(),placa:form.placa,cliente:form.cliente,
      tel:form.tel,marca:form.marca,modelo:form.modelo,
      color:form.color,km:form.km,combustible:form.combustible,
      taller:form.taller,tecnico:form.tecnico,
      problema:form.problema,paso:1,estado:"Recepción",
      fotos_recepcion:JSON.stringify(fotos),
      creado_por:usuario.nombre,total:0
    }).select().single();
    setGuardando(false);
    if(error){alert("Error: "+error.message);return;}
    alert(`✅ OT creada: ${num}\nToca la OT para continuar con el diagnóstico.`);
    onGuardado(data);
  };

  return <div style={{background:"#fff",borderRadius:10,padding:14,border:"1px solid #e2e8f0"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontWeight:900,fontSize:14}}>➕ Nueva OT</div>
      <button onClick={onCancelar} style={{padding:"4px 10px",background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:6,fontSize:11,cursor:"pointer"}}>✕ Cancelar</button>
    </div>

    {/* Taller */}
    {usuario.taller==="ambos"&&<div style={{marginBottom:10}}>
      <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,marginBottom:4}}>TALLER *</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        {["Taller 1 · Montes","Taller 2 · Bella Vista"].map(t=>
          <button key={t} onClick={()=>setForm(f=>({...f,taller:t}))}
            style={{padding:"8px",border:`2px solid ${form.taller===t?"#f59e0b":"#e2e8f0"}`,borderRadius:8,background:form.taller===t?"#fffbeb":"#fff",fontWeight:700,fontSize:10,cursor:"pointer",color:form.taller===t?"#92400e":"#64748b"}}>
            {t.includes("Montes")?"🔧 Montes":"🔧 Bella Vista"}
          </button>)}
      </div>
    </div>}

    {/* Técnico */}
    <div style={{marginBottom:10}}>
      <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,marginBottom:3}}>TÉCNICO ASIGNADO *</div>
      {esEncargado
        ?<select value={form.tecnico} onChange={e=>setForm(f=>({...f,tecnico:e.target.value}))}
          style={{width:"100%",padding:"7px 10px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:13}}>
          {usuarios.map(u=><option key={u.user_name} value={u.nombre}>{u.nombre}</option>)}
        </select>
        :<div style={{padding:"8px 10px",background:"#f0fdf4",borderRadius:8,fontWeight:700,fontSize:13,color:"#15803d"}}>👨‍🔧 {usuario.nombre}</div>}
    </div>

    {/* Datos */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
      {[["PLACA *","placa","1234ABC"],["CLIENTE","cliente","Nombre completo"],
        ["TELÉFONO","tel","70000000"],["MARCA","marca","Toyota"],
        ["MODELO","modelo","Corolla"],["COLOR","color","Blanco"]].map(([l,k,ph])=>
        <div key={k}>
          <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,marginBottom:3}}>{l}</div>
          <input value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} placeholder={ph}
            style={{width:"100%",padding:"7px 10px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:13,boxSizing:"border-box"}}/>
        </div>)}
    </div>

    {/* Km y combustible */}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
      <div>
        <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,marginBottom:3}}>KM INGRESO</div>
        <input type="number" value={form.km} onChange={e=>setForm(f=>({...f,km:e.target.value}))} placeholder="85000"
          style={{width:"100%",padding:"7px 10px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:13,boxSizing:"border-box"}}/>
      </div>
      <div>
        <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,marginBottom:3}}>COMBUSTIBLE</div>
        <select value={form.combustible} onChange={e=>setForm(f=>({...f,combustible:e.target.value}))}
          style={{width:"100%",padding:"7px 10px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:13}}>
          {["Vacío","1/4","1/2","3/4","Lleno"].map(v=><option key={v}>{v}</option>)}
        </select>
      </div>
    </div>

    {/* Problema */}
    <div style={{marginBottom:10}}>
      <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,marginBottom:3}}>PROBLEMA REPORTADO</div>
      <textarea value={form.problema} onChange={e=>setForm(f=>({...f,problema:e.target.value}))}
        placeholder="Describe el problema reportado por el cliente..."
        style={{width:"100%",padding:"7px 10px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,minHeight:70,resize:"none",boxSizing:"border-box"}}/>
    </div>

    {/* Fotos */}
    <div style={{marginBottom:12}}>
      <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,marginBottom:5}}>📷 FOTOS AL INGRESO</div>
      <FotoUpload fotos={fotos} setFotos={setFotos} label="Fotografiar el vehículo"/>
    </div>

    <button onClick={guardar} disabled={guardando}
      style={{width:"100%",padding:12,background:"#16a34a",color:"#fff",border:"none",borderRadius:8,fontWeight:900,fontSize:14,cursor:"pointer"}}>
      {guardando?"Creando OT...":"✅ Crear OT"}
    </button>
  </div>;
}

function App(){
  const [usuario,setUsuario]=React.useState(null);
  const [vista,setVista]=React.useState("lista");

  if(!usuario) return <Login onLogin={u=>{
    sessionStorage.setItem("usuario_ot",JSON.stringify(u));
    setUsuario(u);
  }}/>;

  return <div style={{padding:10,background:"#f0f4f8",minHeight:"100vh"}}>
    {/* Header */}
    <div style={{background:"#1e293b",color:"#fbbf24",padding:"10px 14px",borderRadius:10,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
      <div>
        <div style={{fontSize:14,fontWeight:900}}>📋 {EMPRESA.nombre}</div>
        <div style={{fontSize:9,color:"#94a3b8"}}>Órdenes de Trabajo · {usuario.nombre}</div>
      </div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
        <button onClick={()=>window.location.href="/"} style={{padding:"3px 8px",background:"#1d4ed8",color:"#fff",border:"none",borderRadius:6,fontSize:10,cursor:"pointer",fontWeight:700}}>🏠 Inicio</button>
        <button onClick={()=>window.location.href="/servicios.html"} style={{padding:"3px 8px",background:"#16a34a",color:"#fff",border:"none",borderRadius:6,fontSize:10,cursor:"pointer",fontWeight:700}}>🔧 Servicios</button>
        {["admin","encargado"].includes(usuario.rol)&&<button onClick={()=>window.location.href="/admin.html"} style={{padding:"3px 8px",background:"#7c3aed",color:"#fff",border:"none",borderRadius:6,fontSize:10,cursor:"pointer",fontWeight:700}}>⚙️ Admin</button>}
        <button onClick={()=>setUsuario(null)} style={{padding:"3px 8px",background:"#ef4444",color:"#fff",border:"none",borderRadius:6,fontSize:10,cursor:"pointer",fontWeight:700}}>Salir</button>
      </div>
    </div>

    {vista==="lista"&&<ListaOTs usuario={usuario} onNueva={()=>setVista("nueva")}/>}
    {vista==="nueva"&&<FormOT usuario={usuario} onGuardado={()=>setVista("lista")} onCancelar={()=>setVista("lista")}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
