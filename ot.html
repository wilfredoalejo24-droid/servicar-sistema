const comprimirFoto=(file,cb)=>{
  const r=new FileReader();
  r.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement("canvas");
      const MAX=300;let w=img.width,h=img.height;
      if(w>h){if(w>MAX){h=h*(MAX/w);w=MAX;}}else{if(h>MAX){w=w*(MAX/h);h=MAX;}}
      c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);
      cb(c.toDataURL("image/jpeg",0.6));
    };img.src=ev.target.result;
  };r.readAsDataURL(file);
};

function FotoUpload({fotos,setFotos,label="📷 Agregar fotos"}){
  const add=e=>{Array.from(e.target.files).forEach(f=>comprimirFoto(f,url=>setFotos(p=>[...p,{url,hora:hora()}])));e.target.value="";};
  return <div>
    <label style={{display:"inline-block",padding:"7px 14px",background:"#f1f5f9",border:"1px dashed #94a3b8",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700,color:"#64748b"}}>

}

      <Campo label="Problema reportado">
        <textarea value={f.problema} onChange={e=>upd("problema")(e.target.value)} placeholder="Describe el problema..."
          style={{width:"100%",padding:"8px 10px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,boxSizing:"border-box",minHeight:60,resize:"vertical"}}/>
      </Campo>
    </Card>
    <Card><Tit text="📷 Fotos de recepción"/><FotoUpload fotos={fotosR} setFotos={setFotosR} label="📷 Fotografiar el vehículo"/></Card>
    <Btn onClick={crear} color="#1d4ed8" text={`💾 Crear OT y ${f.tecnico===usuario.nombre?"continuar":"notificar a "+f.tecnico}`} style={{width:"100%",padding:13,fontSize:13}}/>
  </div>;
}

// DETALLE OT
function DetalleOT({ot:otInit,usuario,onVolver,onUpdate}){
  const [ot,setOt]=React.useState(otInit);
  const [sec,setSec]=React.useState("info");
  const [diag,setDiag]=React.useState(ot.diagnostico||"");
  const [tiempoEst,setTiempoEst]=React.useState(ot.tiempo_est||"");
  const [servicios,setServicios]=React.useState(ot.servicios||[]);
  const [repuestos,setRepuestos]=React.useState(ot.repuestos||[]);
  const [pendientes,setPendientes]=React.useState([]);
  const [fotosDiag,setFotosDiag]=React.useState(ot.fotos_diagnostico||[]);
  const [fotosTrab,setFotosTrab]=React.useState(ot.fotos_trabajo||[]);
  const [obsCalidad,setObsCalidad]=React.useState(ot.obs_calidad||"");
  const [busqSvc,setBusqSvc]=React.useState("");
  const [nuevoSvc,setNuevoSvc]=React.useState("");
  const [nuevoPend,setNuevoPend]=React.useState({nombre:"",referencia:"",cantidad:1,precio_costo:0,precio_cliente:0});
  const [inv,setInv]=React.useState([]);
  const [saving,setSaving]=React.useState(false);

  const esEnc=["admin","encargado"].includes(usuario.rol);
  const esMec=usuario.rol==="mecanico";
  const esRapido=esEnc&&ot.tecnico===usuario.nombre;
  const paso=ot.paso||1;
  const colP={1:"#64748b",2:"#3b82f6",3:"#f59e0b",4:"#8b5cf6",5:"#f97316",6:"#06b6d4",7:"#16a34a",8:"#16a34a"};

  React.useEffect(()=>{
    sb.from("inventario").select("*").gt("stock",0).then(({data})=>setInv(data||[]));
    sb.from("repuestos_pendientes").select("*").eq("ot_id",ot.id).order("created_at").then(({data})=>setPendientes(data||[]));
  },[]);

  const totalStockReps=(ot.repuestos||[]).reduce((s,x)=>s+(parseFloat(x.precio||0)*(x.qty||1)),0);
  const totalPends=pendientes.reduce((s,x)=>s+(parseFloat(x.precio_cliente||0)*(x.cantidad||1)),0);
  const totalServ=(ot.servicios||[]).reduce((s,x)=>s+parseFloat(x.precio||0),0);
  const totalOT=totalServ+totalStockReps+totalPends;

  const actualizar=async(changes)=>{
    setSaving(true);
    const{data,error}=await sb.from("ots").update(changes).eq("id",ot.id).select().single();
    setSaving(false);
    if(error){alert("Error: "+error.message);return;}
    setOt(data);onUpdate(data);
    if(changes.paso===8){
      await sb.from("crm").insert({fecha:hoy(),num:data.num,placa:data.placa,cliente:data.cliente,tel:data.tel,vehiculo:`${data.marca||""} ${data.modelo||""}`,taller:data.taller,tecnico:data.tecnico,total:fmt(data.total_final||data.total||0),tipo:"OT"});
      await sb.from("caja").insert({fecha:hoy(),taller:data.taller,concepto:`OT ${data.num} — ${data.placa}`,tipo:"ingreso",monto:data.total_final||data.total||0,user_name:usuario.nombre});
      // Descontar repuestos del inventario
      for(const r of (data.repuestos||[])){if(r.id) await sb.from("inventario").update({stock:Math.max(0,(r.stock||0)-(r.qty||1))}).eq("id",r.id);}
    }
  };

  const agregarSvc=nom=>{if(!nom)return;const nuevos=[...servicios,{id:Date.now(),nombre:nom,precio:0}];setServicios(nuevos);setBusqSvc("");setNuevoSvc("");};
  const agregarRep=r=>setRepuestos(p=>{const ex=p.find(x=>x.id===r.id);return ex?p.map(x=>x.id===r.id?{...x,qty:(x.qty||1)+1}:x):[...p,{...r,qty:1}];});

  const agregarPendiente=async()=>{
    if(!nuevoPend.nombre){alert("Escribe el nombre del repuesto.");return;}
    const reg={...nuevoPend,ot_id:ot.id,ot_num:ot.num,estado:"Pendiente"};
    const{data}=await sb.from("repuestos_pendientes").insert(reg).select().single();
    if(data){setPendientes(p=>[...p,data]);setNuevoPend({nombre:"",referencia:"",cantidad:1,precio_costo:0,precio_cliente:0});}
  };

  const marcarLlegado=async(id,nombre,cantidad,precio_costo)=>{
    await sb.from("repuestos_pendientes").update({estado:"Llegó",fecha_llegada:hoy()}).eq("id",id);
    // Agregar al inventario
    const cod=`RM-${String(inv.length+1).padStart(3,"0")}`;
    await sb.from("inventario").insert({cod,nom:nombre,marca:"Comprado",cat:"Repuestos mecánicos",stock:cantidad||1,min:0,costo:precio_costo||0,precio:0,prov:"Externo",para:ot.placa,medida:""});
    setPendientes(p=>p.map(x=>x.id===id?{...x,estado:"Llegó",fecha_llegada:hoy()}:x));
    alert(`✅ "${nombre}" ingresado al inventario`);
  };

  const eliminarPendiente=async(id)=>{
    await sb.from("repuestos_pendientes").delete().eq("id",id);
    setPendientes(p=>p.filter(x=>x.id!==id));
  };

  const svcsFilt=SVCS_BASE.filter(s=>!busqSvc||s.toLowerCase().includes(busqSvc.toLowerCase()));
  const invFilt=inv.filter(i=>!busqSvc||i.nom?.toLowerCase().includes(busqSvc.toLowerCase())||i.cod?.toLowerCase().includes(busqSvc.toLowerCase()));
  const SECS=[{k:"info",l:"📋 Info"},{k:"diag",l:"🔍 Diagnóstico"},{k:"cotiz",l:"💰 Cotización"},{k:"trabajo",l:"🔧 Trabajo"},{k:"calidad",l:"🔎 Calidad"}];

  return <div>
    <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"center",flexWrap:"wrap"}}>
      <button onClick={onVolver} style={{padding:"6px 12px",background:"#f1f5f9",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:700}}>← Volver</button>
      <div style={{fontWeight:800,fontSize:13}}>{ot.num} — 🚗 {ot.placa}</div>
      <Badge text={PASOS.find(p=>p.id===paso)?.l||""} color={colP[paso]||"#64748b"}/>
      {saving&&<span style={{fontSize:11,color:"#64748b"}}>Guardando...</span>}
    </div>
    {/* Barra pasos */}
    <div style={{display:"flex",alignItems:"center",overflowX:"auto",padding:"4px 0",marginBottom:10}}>
      {PASOS.map((p,i)=>{const idx=PASOS.findIndex(x=>x.id===paso);
        return <div key={p.id} style={{display:"flex",alignItems:"center",flexShrink:0}}>
          <div style={{display:"flex",flexDirection:"column",alignItems:"center",minWidth:44}}>
            <div style={{width:24,height:24,borderRadius:"50%",background:i<=idx?p.c:"#e2e8f0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:i<=idx?"#fff":"#94a3b8",fontWeight:700,border:i===idx?`3px solid ${p.c}`:"3px solid transparent",boxSizing:"border-box"}}>{i<idx?"✓":i+1}</div>
            <div style={{fontSize:8,marginTop:2,color:i<=idx?p.c:"#94a3b8",textAlign:"center",maxWidth:44,lineHeight:1.2}}>{p.l.replace(/[^\w\s]/gi,"").trim().split(" ")[0]}</div>
          </div>
          {i<PASOS.length-1&&<div style={{width:14,height:2,background:i<idx?p.c:"#e2e8f0",flexShrink:0}}/>}
        </div>;})}
    </div>
    {/* Sub tabs */}
    <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap"}}>
      {SECS.map(s=><button key={s.k} onClick={()=>setSec(s.k)} style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${sec===s.k?"#fbbf24":"#e2e8f0"}`,background:sec===s.k?"#fffbeb":"#fff",color:sec===s.k?"#92400e":"#64748b",fontWeight:700,fontSize:11,cursor:"pointer"}}>{s.l}</button>)}
    </div>

    {/* INFO */}
    {sec==="info"&&<div>
      <Card><Tit text="📋 Datos"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5,fontSize:12,marginBottom:8}}>
          {[["Cliente",ot.cliente],["Teléfono",ot.tel],["Placa",ot.placa],["Vehículo",`${ot.marca||""} ${ot.modelo||""}`],["Color",ot.color],["Km",ot.km],["Combustible",ot.combustible],["Técnico",ot.tecnico],["Taller",ot.taller],["Fecha",ot.fecha]].map(([l,v])=>
            <div key={l}><span style={{color:"#94a3b8",fontSize:10}}>{l}: </span><strong>{v||"—"}</strong></div>)}
        </div>
        {ot.problema&&<div style={{padding:"7px 10px",background:"#fef9c3",borderRadius:8,fontSize:12,color:"#92400e"}}>📝 <strong>Problema:</strong> {ot.problema}</div>}
      </Card>
      {(ot.fotos_recepcion||[]).length>0&&<Card><Tit text="📷 Fotos recepción"/>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {ot.fotos_recepcion.map((f,i)=><img key={i} src={f.url} alt="" style={{width:75,height:75,objectFit:"cover",borderRadius:8}}/>)}
        </div>
      </Card>}
      {esEnc&&ot.tel&&<Btn onClick={()=>window.open(`https://wa.me/591${ot.tel.replace(/\D/g,"")}?text=${encodeURIComponent(`Estimado ${ot.cliente||"cliente"}, su vehículo ${ot.placa} fue recibido en ${EMPRESA.nombre}. 📞 ${EMPRESA.tel1}`)}`,"_blank")} color="#25d366" text="📱 WhatsApp bienvenida"/>}
    </div>}

    {/* DIAGNÓSTICO */}
    {sec==="diag"&&<Card><Tit text="🔍 Diagnóstico"/>
      {(esMec||esEnc)&&paso===2?<>
        <Campo label="¿Qué encontraste?">
          <textarea value={diag} onChange={e=>setDiag(e.target.value)} placeholder="Describe el diagnóstico detallado..."
            style={{width:"100%",padding:"8px 10px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,boxSizing:"border-box",minHeight:70,resize:"vertical"}}/>
        </Campo>
        <div style={{marginTop:8}}><Campo label="⏱️ Tiempo estimado"><Sel value={tiempoEst} onChange={setTiempoEst} options={["30 minutos","1 hora","2 horas","3 horas","4 horas","Medio día","1 día","2 días","3+ días"]}/></Campo></div>
        {/* Servicios */}
        <div style={{marginTop:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:6}}>🔧 Servicios a realizar</div>
          <input value={busqSvc} onChange={e=>setBusqSvc(e.target.value)} placeholder="🔍 Buscar servicio o repuesto..."
            style={{width:"100%",padding:"7px 10px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,boxSizing:"border-box",marginBottom:5}}/>
          <div style={{maxHeight:120,overflowY:"auto",border:"1px solid #f3f4f6",borderRadius:8,marginBottom:6}}>
            {svcsFilt.map(s=><div key={s} onClick={()=>agregarSvc(s)} style={{padding:"6px 10px",cursor:"pointer",borderBottom:"1px solid #f8fafc",fontSize:12}} onMouseEnter={e=>e.currentTarget.style.background="#fffbeb"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>{s}</div>)}
          </div>
          <div style={{display:"flex",gap:6,marginBottom:8}}>
            <input value={nuevoSvc} onChange={e=>setNuevoSvc(e.target.value)} placeholder="Servicio personalizado..."
              style={{flex:1,padding:"7px 10px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12}}/>
            <Btn onClick={()=>agregarSvc(nuevoSvc)} color="#16a34a" text="+ Agregar"/>
          </div>
          {servicios.map((s,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"#f0fdf4",borderRadius:6,marginBottom:4,fontSize:12}}>
            <span>🔧 {s.nombre}</span>
            <button onClick={()=>setServicios(p=>p.filter((_,j)=>j!==i))} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontSize:11}}>✕</button>
          </div>)}
        </div>
        {/* Repuestos en stock */}
        <div style={{marginTop:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#16a34a",marginBottom:6}}>✅ Repuestos en stock (tienda)</div>
          <div style={{maxHeight:130,overflowY:"auto",border:"1px solid #f3f4f6",borderRadius:8,marginBottom:6}}>
            {invFilt.map(i=><div key={i.id} onClick={()=>agregarRep(i)} style={{padding:"6px 10px",cursor:"pointer",borderBottom:"1px solid #f8fafc",display:"flex",justifyContent:"space-between",fontSize:12}} onMouseEnter={e=>e.currentTarget.style.background="#fffbeb"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
              <span>📦 {i.nom} <span style={{color:"#94a3b8",fontSize:10}}>Stock:{i.stock}</span></span>
              <span style={{fontWeight:700,color:"#16a34a"}}>{fmt(i.precio)}</span>
            </div>)}
          </div>
          {repuestos.map((r,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"#f0fdf4",borderRadius:6,marginBottom:4,fontSize:12}}>
            <span>📦 {r.nom} x{r.qty||1} ✅</span>
            <button onClick={()=>setRepuestos(p=>p.filter((_,j)=>j!==i))} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontSize:11}}>✕</button>
          </div>)}
        </div>
        {/* Repuestos a conseguir */}
        <div style={{marginTop:10,border:"1px solid #fbbf24",borderRadius:10,padding:"10px 12px",background:"#fffbeb"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#92400e",marginBottom:8}}>🔍 Repuesto a conseguir (no tenemos en tienda)</div>
          <div style={{display:"grid",gap:6}}>
            <Inp value={nuevoPend.nombre} onChange={v=>setNuevoPend(p=>({...p,nombre:v}))} placeholder="Nombre del repuesto"/>
            <Inp value={nuevoPend.referencia} onChange={v=>setNuevoPend(p=>({...p,referencia:v}))} placeholder="Referencia o código (opcional)"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:11,color:"#64748b",minWidth:60}}>Cantidad:</span>
                <input type="number" value={nuevoPend.cantidad} min={1} onChange={e=>setNuevoPend(p=>({...p,cantidad:+e.target.value}))} style={{width:60,padding:"5px 8px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:12,textAlign:"center"}}/>
              </div>
            </div>
            <Btn onClick={agregarPendiente} color="#f59e0b" text="+ Agregar repuesto a conseguir" style={{width:"100%"}}/>
          </div>
          {pendientes.map((p,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 8px",background:"#fef3c7",borderRadius:6,marginTop:6,fontSize:12}}>
            <span>🔍 {p.nombre} x{p.cantidad||1} <Badge text={p.estado} color="#f59e0b"/></span>
            <button onClick={()=>eliminarPendiente(p.id)} style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontSize:11}}>✕</button>
          </div>)}
        </div>
        <div style={{marginTop:10}}><Tit text="📷 Fotos del diagnóstico"/><FotoUpload fotos={fotosDiag} setFotos={setFotosDiag} label="📷 Fotografiar el problema"/></div>
        <Btn onClick={()=>{
          if(!diag){alert("Escribe el diagnóstico.");return;}
          actualizar({paso:3,diagnostico:diag,tiempo_est:tiempoEst,servicios,repuestos,fotos_diagnostico:fotosDiag,total:totalOT});
          setSec("cotiz");
        }} color={esRapido?"#f59e0b":"#3b82f6"} text={esRapido?"💰 Continuar a cotización":"📤 Enviar a encargado para cotizar"} style={{width:"100%",marginTop:12,padding:12}}/>
      </>:<div>
        {ot.diagnostico?<><p style={{fontSize:12,margin:"0 0 6px"}}>{ot.diagnostico}</p>
          {ot.tiempo_est&&<p style={{fontSize:11,color:"#64748b"}}>⏱️ {ot.tiempo_est}</p>}
          {(ot.fotos_diagnostico||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:8}}>
            {ot.fotos_diagnostico.map((f,i)=><img key={i} src={f.url} alt="" style={{width:70,height:70,objectFit:"cover",borderRadius:8}}/>)}
          </div>}</>
        :<div style={{color:"#94a3b8",fontSize:12,textAlign:"center",padding:20}}>Esperando diagnóstico...</div>}
      </div>}
    </Card>}

    {/* COTIZACIÓN */}
    {sec==="cotiz"&&<Card><Tit text="💰 Cotización"/>
      {esEnc?<>
        {/* Editar servicios */}
        {(ot.servicios||[]).length>0&&<>
          <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:5}}>🔧 Mano de obra — edita nombre y precio</div>
          {(ot.servicios||[]).map((s,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:6,alignItems:"center",padding:"6px 8px",background:"#f8fafc",borderRadius:8,marginBottom:4}}>
            <input value={s.nombre} onChange={e=>{const n=(ot.servicios||[]).map((x,j)=>j===i?{...x,nombre:e.target.value}:x);setServicios(n);actualizar({servicios:n});}}
              style={{padding:"4px 8px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:12}}/>
            <input type="number" value={s.precio} onChange={e=>{const n=(ot.servicios||[]).map((x,j)=>j===i?{...x,precio:+e.target.value}:x);setServicios(n);actualizar({servicios:n,total:n.reduce((s,x)=>s+parseFloat(x.precio||0),0)+totalStockReps+totalPends});}}
              style={{width:75,padding:"4px 8px",border:"1px solid #fbbf24",borderRadius:6,fontSize:12,fontWeight:800,color:"#92400e",textAlign:"center"}}/>
            <span style={{fontSize:10,color:"#64748b"}}>Bs.</span>
          </div>)}
        </>}
        {/* Repuestos en stock */}
        {(ot.repuestos||[]).length>0&&<>
          <div style={{fontSize:11,fontWeight:700,color:"#16a34a",marginBottom:5,marginTop:8}}>✅ Repuestos en stock — edita nombre y precio</div>
          {(ot.repuestos||[]).map((r,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:6,alignItems:"center",padding:"6px 8px",background:"#f0fdf4",borderRadius:8,marginBottom:4}}>
            <input value={r.nom||r.nombre||""} onChange={e=>{const n=(ot.repuestos||[]).map((x,j)=>j===i?{...x,nom:e.target.value}:x);setRepuestos(n);actualizar({repuestos:n});}}
              style={{padding:"4px 8px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:12}}/>
            <input type="number" value={r.precio||0} onChange={e=>{const n=(ot.repuestos||[]).map((x,j)=>j===i?{...x,precio:+e.target.value}:x);setRepuestos(n);actualizar({repuestos:n,total:totalServ+n.reduce((s,x)=>s+(parseFloat(x.precio||0)*(x.qty||1)),0)+totalPends});}}
              style={{width:75,padding:"4px 8px",border:"1px solid #fbbf24",borderRadius:6,fontSize:12,fontWeight:800,color:"#92400e",textAlign:"center"}}/>
            <span style={{fontSize:10,color:"#64748b"}}>Bs.</span>
          </div>)}
        </>}
        {/* Repuestos pendientes */}
        {pendientes.length>0&&<>
          <div style={{fontSize:11,fontWeight:700,color:"#f97316",marginBottom:5,marginTop:8}}>🔍 Repuestos a conseguir — pon precio al cliente</div>
          {pendientes.map((p,i)=><div key={i} style={{background:"#fff7ed",border:"1px solid #fed7aa",borderRadius:8,padding:"8px 10px",marginBottom:6}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:6,alignItems:"center",marginBottom:4}}>
              <input value={p.nombre} onChange={async e=>{await sb.from("repuestos_pendientes").update({nombre:e.target.value}).eq("id",p.id);setPendientes(prev=>prev.map((x,j)=>j===i?{...x,nombre:e.target.value}:x));}}
                style={{padding:"4px 8px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:12}}/>
              <Badge text={p.estado} color={p.estado==="Llegó"?"#16a34a":"#f97316"}/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontSize:10,color:"#64748b",minWidth:55}}>Costo Bs.:</span>
                <input type="number" value={p.precio_costo||0} onChange={async e=>{await sb.from("repuestos_pendientes").update({precio_costo:+e.target.value}).eq("id",p.id);setPendientes(prev=>prev.map((x,j)=>j===i?{...x,precio_costo:+e.target.value}:x));}}
                  style={{flex:1,padding:"4px 6px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:12,textAlign:"center"}}/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontSize:10,color:"#92400e",minWidth:55}}>Cliente Bs.:</span>
                <input type="number" value={p.precio_cliente||0} onChange={async e=>{await sb.from("repuestos_pendientes").update({precio_cliente:+e.target.value}).eq("id",p.id);setPendientes(prev=>prev.map((x,j)=>j===i?{...x,precio_cliente:+e.target.value}:x));}}
                  style={{flex:1,padding:"4px 6px",border:"1px solid #fbbf24",borderRadius:6,fontSize:12,fontWeight:800,color:"#92400e",textAlign:"center"}}/>
              </div>
            </div>
            {p.estado==="Pendiente"&&<Btn onClick={()=>marcarLlegado(p.id,p.nombre,p.cantidad,p.precio_costo)} color="#16a34a" text="✅ Repuesto llegó — ingresar al inventario" style={{width:"100%",marginTop:8,fontSize:11}}/>}
            {p.estado==="Llegó"&&<div style={{marginTop:6,fontSize:11,color:"#16a34a",fontWeight:700}}>✅ Ingresado al inventario el {p.fecha_llegada}</div>}
          </div>)}
        </>}
        {/* Agregar más */}
        <div style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px",background:"#f8fafc",marginTop:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#1d4ed8",marginBottom:6}}>➕ Agregar servicio o repuesto olvidado</div>
          <div style={{display:"flex",gap:6,marginBottom:6}}>
            <input value={nuevoSvc} onChange={e=>setNuevoSvc(e.target.value)} placeholder="Nombre del servicio..."
              style={{flex:1,padding:"6px 8px",border:"1px solid #e2e8f0",borderRadius:7,fontSize:12}}/>
            <Btn onClick={()=>{if(!nuevoSvc)return;const n=[...(ot.servicios||[]),{id:Date.now(),nombre:nuevoSvc,precio:0}];actualizar({servicios:n});setNuevoSvc("");}} color="#1d4ed8" text="+ Servicio"/>
          </div>
        </div>
        <div style={{background:"#1e293b",borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",margin:"10px 0",fontWeight:900,color:"#fbbf24",fontSize:15}}>
          <span>TOTAL</span><span>{fmt(totalOT)}</span>
        </div>
        {paso<=4&&<>
          <div style={{display:"grid",gap:7,marginBottom:10}}>
            <Btn onClick={()=>{actualizar({paso:4,servicios:ot.servicios,repuestos:ot.repuestos,total:totalOT});enviarWA({...ot,total:totalOT},pendientes);}} color="#25d366" text="📱 Enviar cotización por WhatsApp" style={{width:"100%",padding:11}}/>
            <Btn onClick={()=>generarPDF({...ot,total:totalOT},pendientes)} color="#dc2626" text="📄 PDF / Imprimir cotización" style={{width:"100%",padding:11}}/>
          </div>
          <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:10,padding:"12px"}}>
            <div style={{fontWeight:700,fontSize:12,marginBottom:8,color:"#1d4ed8"}}>📱 ¿Respondió el cliente?</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              <Btn onClick={()=>actualizar({paso:5,aprobacion:"aprobado",total:totalOT})} color="#16a34a" text="✅ Cliente APROBÓ"/>
              <Btn onClick={()=>actualizar({aprobacion:"rechazado",paso:1})} color="#dc2626" text="❌ Cliente RECHAZÓ"/>
            </div>
          </div>
        </>}
        {ot.aprobacion==="aprobado"&&paso>4&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#16a34a",fontWeight:700}}>✅ Cliente aprobó la cotización</div>}
        {ot.aprobacion==="rechazado"&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#dc2626",fontWeight:700}}>❌ Cliente rechazó la cotización</div>}
      </>:<div style={{color:"#94a3b8",fontSize:12,textAlign:"center",padding:20}}>Solo encargados pueden ver los precios.</div>}
    </Card>}

    {/* TRABAJO */}
    {sec==="trabajo"&&<Card><Tit text="🔧 Ejecución"/>
      {(esMec||esEnc)&&paso===5?<>
        {/* Verificar repuestos pendientes */}
        {pendientes.filter(p=>p.estado==="Pendiente").length>0&&<div style={{background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:8,padding:"10px 12px",marginBottom:10,fontSize:12}}>
          <div style={{fontWeight:700,color:"#dc2626",marginBottom:6}}>⚠️ Repuestos aún pendientes de llegada:</div>
          {pendientes.filter(p=>p.estado==="Pendiente").map((p,i)=><div key={i} style={{color:"#dc2626"}}>🔍 {p.nombre} x{p.cantidad||1}</div>)}
          <div style={{fontSize:11,color:"#64748b",marginTop:6}}>El encargado debe marcarlos como llegados en Cotización antes de continuar.</div>
        </div>}
        {ot.servicios?.length>0&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:12}}>
          <strong>Trabajos aprobados:</strong>
          {ot.servicios.map((s,i)=><div key={i}>🔧 {s.nombre}</div>)}
          {ot.repuestos?.map((r,i)=><div key={i}>📦 {r.nom||r.nombre} x{r.qty||1}</div>)}
          {pendientes.filter(p=>p.estado==="Llegó").map((p,i)=><div key={i}>📦 {p.nombre} x{p.cantidad||1} ✅</div>)}
        </div>}
        <div style={{marginBottom:10}}><Tit text="📷 Evidencia del trabajo"/><FotoUpload fotos={fotosTrab} setFotos={setFotosTrab} label="📷 Fotografiar trabajo y repuestos"/></div>
        <Btn onClick={()=>actualizar({paso:6,fotos_trabajo:fotosTrab})} color="#f59e0b" text="✅ Marcar trabajo TERMINADO" style={{width:"100%",padding:12,fontSize:13}}/>
      </>:<div>
        {paso<5?<div style={{color:"#94a3b8",fontSize:12,textAlign:"center",padding:20}}>Esperando aprobación del cliente...</div>:
        <div>{(ot.fotos_trabajo||[]).length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:5}}>{ot.fotos_trabajo.map((f,i)=><img key={i} src={f.url} alt="" style={{width:70,height:70,objectFit:"cover",borderRadius:8}}/>)}</div>}</div>}
      </div>}
    </Card>}

    {/* CALIDAD Y ENTREGA */}
    {sec==="calidad"&&<Card><Tit text="🔎 Control de calidad y entrega"/>
      {esEnc&&paso===6?<>
        {/* Agregar olvidados en calidad */}
        <div style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px",background:"#f8fafc",marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#1d4ed8",marginBottom:6}}>➕ ¿Olvidaste anotar algo? Agrégalo aquí</div>
          <div style={{display:"flex",gap:6}}>
            <input value={nuevoSvc} onChange={e=>setNuevoSvc(e.target.value)} placeholder="Servicio o repuesto..."
              style={{flex:1,padding:"6px 8px",border:"1px solid #e2e8f0",borderRadius:7,fontSize:12}}/>
            <Btn onClick={()=>{if(!nuevoSvc)return;const n=[...(ot.servicios||[]),{id:Date.now(),nombre:nuevoSvc,precio:0}];actualizar({servicios:n});setNuevoSvc("");alert(`✅ "${nuevoSvc}" agregado`);}} color="#1d4ed8" text="+ Agregar"/>
          </div>
        </div>
        <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>Realiza la prueba antes de entregar.</div>
        {["✅ Motor arranca correctamente","✅ Sin fugas de aceite","✅ Frenos funcionan bien","✅ Eléctrico correcto","✅ Limpieza del vehículo","✅ Prueba de manejo"].map(item=>
          <label key={item} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:"#f8fafc",borderRadius:8,cursor:"pointer",fontSize:12,marginBottom:4}}>
            <input type="checkbox" style={{width:16,height:16}}/>{item}
          </label>)}
        <div style={{marginTop:8}}><Campo label="Observaciones">
          <textarea value={obsCalidad} onChange={e=>setObsCalidad(e.target.value)} placeholder="Fallas u observaciones..."
            style={{width:"100%",padding:"7px 10px",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,boxSizing:"border-box",minHeight:55,resize:"vertical"}}/>
        </Campo></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
          <Btn onClick={()=>{if(!obsCalidad){alert("Escribe las observaciones.");return;}actualizar({obs_calidad:obsCalidad,falla_calidad:true});alert(`✅ Enviado a ${ot.tecnico}`);}} color="#f97316" text="⚠️ Enviar fallas"/>
          <Btn onClick={()=>actualizar({paso:7,obs_calidad:obsCalidad,aprobado_calidad:true,total:totalOT})} color="#16a34a" text="✅ Aprobado — Pasar a entrega"/>
        </div>
      </>:paso===7&&esEnc?<>
        {ot.obs_calidad&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"10px",fontSize:12,marginBottom:10}}><strong>Observaciones:</strong> {ot.obs_calidad}</div>}
        {/* Agregar olvidados en entrega */}
        <div style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px",background:"#f8fafc",marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#1d4ed8",marginBottom:6}}>➕ ¿Algo más que agregar antes de entregar?</div>
          <div style={{display:"flex",gap:6}}>
            <input value={nuevoSvc} onChange={e=>setNuevoSvc(e.target.value)} placeholder="Servicio o repuesto..."
              style={{flex:1,padding:"6px 8px",border:"1px solid #e2e8f0",borderRadius:7,fontSize:12}}/>
            <Btn onClick={()=>{if(!nuevoSvc)return;const n=[...(ot.servicios||[]),{id:Date.now(),nombre:nuevoSvc,precio:0}];actualizar({servicios:n});setNuevoSvc("");alert(`✅ "${nuevoSvc}" agregado`);}} color="#1d4ed8" text="+ Agregar"/>
          </div>
        </div>
        <div style={{background:"#f0fdf4",border:"2px solid #16a34a",borderRadius:10,padding:"14px"}}>
          <div style={{fontWeight:800,color:"#16a34a",fontSize:14,marginBottom:6}}>🚗 Entrega al cliente</div>
          <div style={{background:"#1e293b",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",fontWeight:900,color:"#fbbf24",fontSize:14,marginBottom:10}}>
            <span>TOTAL FINAL</span><span>{fmt(totalOT)}</span>
          </div>
          <div style={{display:"grid",gap:7}}>
            <Btn onClick={()=>enviarWA({...ot,total_final:totalOT},pendientes)} color="#25d366" text="📱 Enviar informe por WhatsApp" style={{width:"100%",padding:11}}/>
            <Btn onClick={()=>generarPDF({...ot,total_final:totalOT},pendientes)} color="#dc2626" text="📄 Generar PDF / Imprimir" style={{width:"100%",padding:11}}/>
            <Btn onClick={()=>actualizar({paso:8,entregado:true,fecha_entrega:hoy(),entregado_por:usuario.nombre,total_final:totalOT})} color="#16a34a" text="🚗 CONFIRMAR ENTREGA AL CLIENTE" style={{width:"100%",padding:13,fontSize:14,fontWeight:900}}/>
          </div>
        </div>
      </>:paso===8?<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"14px",textAlign:"center"}}>
        <div style={{fontSize:24,marginBottom:6}}>✅</div>
        <div style={{fontWeight:900,color:"#16a34a",fontSize:15}}>Vehículo entregado</div>
        <div style={{fontSize:12,color:"#64748b",marginBottom:10}}>Por {ot.entregado_por} · {ot.fecha_entrega}</div>
        <div style={{display:"grid",gap:7}}>
          <Btn onClick={()=>generarPDF({...ot,total_final:ot.total_final||ot.total},pendientes)} color="#1d4ed8" text="📄 Informe final PDF" style={{width:"100%",padding:11}}/>
          <Btn onClick={()=>enviarWA({...ot,total_final:ot.total_final||ot.total},pendientes)} color="#25d366" text="📱 Enviar por WhatsApp" style={{width:"100%",padding:11}}/>
        </div>
      </div>:<div style={{color:"#94a3b8",fontSize:12,textAlign:"center",padding:20}}>El trabajo aún no ha terminado.</div>}
    </Card>}
  </div>;
}

// APP
function App(){
  const [usuario,setUsuario]=React.useState(null);
  const [vista,setVista]=React.useState("lista");
  const [otActual,setOtActual]=React.useState(null);
  const [totalOTs,setTotalOTs]=React.useState(0);
  React.useEffect(()=>{if(usuario) sb.from("ots").select("id",{count:"exact"}).then(({count})=>setTotalOTs(count||0));},[ usuario]);
  if(!usuario) return <Login onLogin={u=>{setUsuario(u);setVista("lista");}}/>;
  const esEnc=["admin","encargado"].includes(usuario.rol);
  return <div style={{padding:10,background:"#f0f4f8",minHeight:"100vh",fontFamily:"Arial,sans-serif",color:"#1a1a1a"}}>
    <div style={{background:"#1e293b",color:"#fbbf24",padding:"10px 14px",borderRadius:10,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
      <div><div style={{fontSize:14,fontWeight:900}}>📋 {EMPRESA.nombre}</div><div style={{fontSize:9,color:"#94a3b8"}}>Órdenes de Trabajo · {EMPRESA.ciudad}</div></div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:11,color:"#fbbf24",fontWeight:700}}>{usuario.nombre}</div>
        <div style={{display:"flex",gap:5,marginTop:4,justifyContent:"flex-end"}}>
          <button onClick={()=>window.location.href="/"} style={{padding:"3px 8px",background:"#1d4ed8",color:"#fff",border:"none",borderRadius:6,fontSize:10,cursor:"pointer",fontWeight:700}}>🏠 Inicio</button>
          <button onClick={()=>window.location.href="/admin.html"} style={{padding:"3px 8px",background:"#7c3aed",color:"#fff",border:"none",borderRadius:6,fontSize:10,cursor:"pointer",fontWeight:700}}>⚙️ Admin</button>
          <button onClick={()=>setUsuario(null)} style={{padding:"3px 8px",background:"#ef4444",color:"#fff",border:"none",borderRadius:6,fontSize:10,cursor:"pointer",fontWeight:700}}>Salir</button>
        </div>
      </div>
    </div>
    {vista==="lista"&&<ListaOTs usuario={usuario} onNueva={()=>setVista("nueva")} onDetalle={o=>{setOtActual(o);setVista("detalle");}}/>}
    {vista==="nueva"&&esEnc&&<NuevaOT usuario={usuario} totalOTs={totalOTs} onVolver={()=>setVista("lista")} onCreate={o=>{setTotalOTs(n=>n+1);setOtActual(o);setVista("detalle");}}/>}
    {vista==="detalle"&&otActual&&<DetalleOT ot={otActual} usuario={usuario} onVolver={()=>setVista("lista")} onUpdate={o=>setOtActual(o)}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
