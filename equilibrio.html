const fmt = n => `Bs. ${parseFloat(n || 0).toLocaleString("es-BO", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
const pct = (v, max) => Math.min(100, Math.max(0, (v / max) * 100)).toFixed(1);

let usuario = null;
let ingresosMes = {}; // { bv: 0, mo: 0 } — solo ganancia_neta
let capitalMes  = {}; // { bv: 0, mo: 0 } — capital tienda (solo informativo)
let tab = "bv";
let verGastos = { bv: false, mo: false };

function getSession() {
  try { return JSON.parse(localStorage.getItem("scp_user")) || JSON.parse(localStorage.getItem("sc_user")) || null; }
  catch { return null; }
}

/* ── Mes actual ──────────────────────────────────────── */
function fechasDelMes() {
  const hoy = new Date();
  const año = hoy.getFullYear();
  const mes = String(hoy.getMonth() + 1).padStart(2, "0");
  // Las fechas en Supabase están en formato DD/MM/YYYY (local boliviano)
  return { mes, año, label: hoy.toLocaleDateString("es-BO", { month: "long", year: "numeric" }) };
}

/* ── Cargar ingresos del mes desde caja_sesiones ──── */
async function cargarIngresosMes() {
  const { mes, año } = fechasDelMes();

  // Consulta todas las sesiones cerradas — filtramos por mes en JS
  // porque el formato de fecha es DD/MM/YYYY
  const { data } = await SB
    .from("caja_sesiones")
    .select("taller, ganancia_neta, capital_tienda, fecha, estado")
    .eq("estado", "Cerrada");

  const sesiones = data || [];

  // Filtrar sesiones del mes actual
  const delMes = sesiones.filter(s => {
    if (!s.fecha) return false;
    // formato DD/MM/YYYY
    const partes = s.fecha.split("/");
    if (partes.length === 3) {
      return partes[1] === mes && partes[2] === String(año);
    }
    // formato YYYY-MM-DD
    const d = new Date(s.fecha);
    return d.getMonth() + 1 === parseInt(mes) && d.getFullYear() === año;
  });

  ingresosMes = { bv: 0, mo: 0 };
  capitalMes  = { bv: 0, mo: 0 };
  TALLERES.forEach(t => {
    const sesT = delMes.filter(s => s.taller === t.tallerDB);
    ingresosMes[t.key] = sesT.reduce((acc, s) => acc + parseFloat(s.ganancia_neta  || 0), 0);
    capitalMes[t.key]  = sesT.reduce((acc, s) => acc + parseFloat(s.capital_tienda || 0), 0);
  });
}

/* ── Semáforo ────────────────────────────────────────── */
function calcSemaforo(avancePct) {
  if (avancePct >= 120) return { color:"#a78bfa", bg:"#a78bfa15", borde:"#a78bfa40", icono:"⭐", zona:"ZONA BONO", label:"Zona bono · Superamos el equilibrio",   msg:"Superamos el equilibrio. Posible bono si caja cuadra y no hay reclamos.", bonos:true  };
  if (avancePct >= 100) return { color:"#16a34a", bg:"#16a34a15", borde:"#16a34a40", icono:"🟢", zona:"VERDE",    label:"Verde · Ya cubrimos los gastos fijos",   msg:"Ya cubrimos los gastos fijos.",                                           bonos:false };
  if (avancePct >= 70)  return { color:"#f59e0b", bg:"#f59e0b15", borde:"#f59e0b40", icono:"🟠", zona:"NARANJA",  label:"Naranja · Estamos cerca",               msg:"Estamos cerca. Hay que empujar más trabajos.",                            bonos:false };
  return                       { color:"#ef4444", bg:"#ef444415", borde:"#ef444440", icono:"🔴", zona:"ROJO",     label:"Rojo · Estamos bajos",                  msg:"Estamos bajos. Falta cubrir gastos fijos.",                               bonos:false };
}

/* ── Render ──────────────────────────────────────────── */
function setApp(html) { document.getElementById("app").innerHTML = html; }
function $$(id) { return document.getElementById(id); }

function render() {

  setApp(`

    </div>
  </div>

  <div class="fi" style="padding:12px 14px;max-width:560px;margin:0 auto">

  <!-- TABS -->

function renderTaller(t) {
  const ganancia   = ingresosMes[t.key] || 0;
  const capital    = capitalMes[t.key]  || 0;
  const avancePct  = t.totalGastos > 0 ? (ganancia / t.totalGastos) * 100 : 0;
  const sem        = calcSemaforo(avancePct);
  const faltaEq    = Math.max(0, t.totalGastos - ganancia);
  const excedente  = Math.max(0, ganancia - t.totalGastos);
  const faltaMeta  = Math.max(0, t.metaConBonos - ganancia);
  const totalBonos = t.bonos.reduce((s, b) => s + b.monto, 0);

  return `

  <div class="card" style="border-color:${sem.borde};background:${sem.bg}">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">

      </div>
      <div style="font-size:22px;font-weight:900;color:${sem.color}">${avancePct.toFixed(1)}%</div>
    </div>

    <!-- Mensaje del semáforo -->
    <div style="background:#0f172a;border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:#94a3b8;line-height:1.5">
      ${sem.msg}
    </div>

    <!-- Ganancia neta del mes -->
    <div style="background:#0f172a;border-radius:10px;padding:12px;margin-bottom:8px;text-align:center">
      <div class="label" style="margin-bottom:4px">Ganancia neta del mes (caja cerrada)</div>
      <div style="font-size:30px;font-weight:900;color:${sem.color}">${fmt(ganancia)}</div>
      <div style="color:#475569;font-size:10px;margin-top:3px">Mano de obra + margen repuestos · Cubre los gastos fijos</div>
    </div>

    <!-- Capital tienda (solo informativo) -->
    <div style="background:#0f172a;border:1px solid #60a5fa20;border-radius:8px;padding:9px 12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:10px;color:#60a5fa;font-weight:700">📦 CAPITAL TIENDA DEL MES</div>
        <div style="font-size:10px;color:#475569;margin-top:2px">No cuenta para equilibrio · Vuelve al inventario</div>
      </div>
      <div style="font-weight:900;color:#60a5fa;font-size:14px">${fmt(capital)}</div>
    </div>

    <!-- Barra de progreso hacia equilibrio -->
    <div class="label" style="margin-bottom:2px">Avance hacia punto de equilibrio (ganancia neta / gastos fijos)</div>
    <div class="prog-track">
      <div class="prog-fill" style="width:${Math.min(100, avancePct)}%;background:${sem.color}"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#475569;margin-bottom:14px">
      <span>0%</span>
      <span style="color:${sem.color};font-weight:700">${avancePct.toFixed(1)}%</span>
      <span>100% = ${fmt(t.totalGastos)}</span>
    </div>

    <!-- Gastos fijos / Falta o excedente -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px;text-align:center">
        <div class="label" style="margin-bottom:4px">Gastos fijos del mes</div>
        <div style="font-size:13px;font-weight:900;color:#64748b">${fmt(t.totalGastos)}</div>
        <div style="font-size:10px;color:#475569;margin-top:2px">Punto de equilibrio (100%)</div>
      </div>
      <div style="background:#0f172a;border:1px solid ${excedente > 0 ? "#16a34a30" : "#ef444430"};border-radius:10px;padding:10px;text-align:center">
        <div class="label" style="margin-bottom:4px">${excedente > 0 ? "Excedente sobre equilibrio" : "Falta para equilibrio"}</div>
        <div style="font-size:13px;font-weight:900;color:${excedente > 0 ? "#16a34a" : "#ef4444"}">${fmt(excedente > 0 ? excedente : faltaEq)}</div>
        ${excedente > 0
          ? `<div style="font-size:10px;color:#16a34a;margin-top:2px">✅ Gastos cubiertos</div>`
          : `<div style="font-size:10px;color:#ef4444;margin-top:2px">❌ Aún no cubre</div>`}
      </div>
    </div>

    <!-- Meta con bonos (referencia secundaria) -->
    <div style="margin-top:8px;padding:8px 12px;background:#0f172a;border-radius:8px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:10px;color:#475569">Meta con bonos (referencia)</div>
      <div>
        <span style="font-size:12px;font-weight:700;color:${faltaMeta <= 0 ? "#16a34a" : "#64748b"}">${fmt(t.metaConBonos)}</span>
        ${faltaMeta > 0
          ? `<span style="font-size:10px;color:#475569"> · faltan ${fmt(faltaMeta)}</span>`
          : `<span style="font-size:10px;color:#16a34a"> · ✅ alcanzada</span>`}
      </div>
    </div>
  </div>

  <!-- ZONA BONO AVISO (Cambio 5) -->
  ${avancePct >= 120 ? `

  <!-- BONOS -->

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="color:${sem.bonos ? "#a78bfa" : "#64748b"};font-size:11px;font-weight:700;text-transform:uppercase">
        🎁 Bonos del mes

      <span style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;
        background:${sem.bonos ? "#a78bfa20" : "#ef444420"};
        color:${sem.bonos ? "#a78bfa" : "#ef4444"};
        border:1px solid ${sem.bonos ? "#a78bfa40" : "#ef444440"}">
        ${sem.bonos ? "✅ Aplican (zona bono)" : "❌ No aplican aún"}

    </div>
    ${!sem.bonos ? `<div style="color:#475569;font-size:12px;text-align:center;padding:8px">Se activan solo cuando el taller alcanza zona bono (≥ 120% de gastos fijos = ${fmt(t.totalGastos * 1.2)})</div>` : ""}

      </div>
    </div>
  </div>

  <!-- GASTOS FIJOS -->
  <div class="card">
    <button onclick="toggleGastos('${t.key}')"
      style="width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;color:#fff;cursor:pointer;padding:0;margin-bottom:${verGastos[t.key] ? "12" : "0"}px">
      <span style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase">📋 Gastos fijos mensuales</span>
      <span style="display:flex;align-items:center;gap:6px">
        <span style="font-weight:900;color:${t.color}">${fmt(t.totalGastos)}</span>
        <span style="color:#475569;font-size:12px">${verGastos[t.key] ? "▲" : "▼"}</span>
      </span>
    </button>

    ${verGastos[t.key] ? `
    <div>
      ${t.gastos.map(g => `
      <div class="gasto-row">
        <span style="color:#94a3b8">${g.concepto}</span>
        <span style="color:#64748b;font-weight:700">${fmt(g.monto)}</span>
      </div>`).join("")}
      <div style="display:flex;justify-content:space-between;padding:10px 0 0;border-top:2px solid #334155;margin-top:6px">
        <span style="color:#fff;font-size:12px;font-weight:700">TOTAL</span>
        <span style="font-weight:900;color:${t.color};font-size:14px">${fmt(t.totalGastos)}</span>
      </div>
    </div>` : ""}
  </div>

  <!-- SEMÁFORO REFERENCIA (4 zonas por %) -->
  <div class="card">
    <div class="label" style="margin-bottom:10px">📍 Escala del semáforo (% ganancia neta / gastos fijos)</div>
    ${[
      { desde:   0, hasta:  69.99, color:"#ef4444", bg:"#ef444415", icono:"🔴", zona:"Rojo",      desc:`0% a 69% — Menos de ${fmt(t.totalGastos*0.7)} — Sin renta ni bonos` },
      { desde:  70, hasta:  99.99, color:"#f59e0b", bg:"#f59e0b15", icono:"🟠", zona:"Naranja",   desc:`70% a 99% — ${fmt(t.totalGastos*0.7)} a ${fmt(t.totalGastos)} — Solo salarios` },
      { desde: 100, hasta: 119.99, color:"#16a34a", bg:"#16a34a15", icono:"🟢", zona:"Verde",     desc:`100% a 119% — ${fmt(t.totalGastos)} a ${fmt(t.totalGastos*1.2)} — Gastos cubiertos` },
      { desde: 120, hasta:   null, color:"#a78bfa", bg:"#a78bfa15", icono:"⭐", zona:"Zona bono", desc:`≥ 120% — Más de ${fmt(t.totalGastos*1.2)} — Posible bono si caja cuadra` },

      return `
      <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;margin-bottom:6px;

        <span style="font-size:18px">${z.icono}</span>
        <div style="flex:1">
          <div style="font-size:11px;font-weight:700;color:${activo ? z.color : "#64748b"}">${z.zona}${activo ? " ← Estás aquí" : ""}</div>
          <div style="font-size:10px;color:#475569;margin-top:2px">${z.desc}</div>
        </div>
      </div>`;
    }).join("")}
  </div>

  <!-- FONDO EMERGENCIA -->
  ${avancePct >= 100 ? `
  <div class="card" style="border-color:#a78bfa40">

    <div style="background:#60a5fa10;border:1px solid #60a5fa30;border-radius:10px;padding:10px;margin-bottom:12px">
      <div style="color:#60a5fa;font-size:10px;font-weight:700;margin-bottom:4px">📦 CAPITAL TIENDA — NO cuenta para equilibrio</div>
      <div style="color:#94a3b8;font-size:11px;line-height:1.5">El capital tienda (costo de repuestos vendidos) vuelve al inventario. El avance se calcula solo con <strong style="color:#60a5fa">ganancia neta</strong> (mano de obra + margen).</div>
    </div>

    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="background:#ef444415;border:1px solid #ef444440;border-radius:10px;padding:12px">
        <div style="color:#ef4444;font-size:11px;font-weight:700;margin-bottom:6px">🔴 ZONA ROJA — 0% a 69%</div>
        <div style="color:#94a3b8;font-size:12px;line-height:1.6">
          La ganancia neta del taller está bajo el 70% de los gastos fijos. <strong style="color:#ef4444">No hay renta para el propietario ni bonos.</strong> Solo se pagan los salarios fijos comprometidos.
        </div>
      </div>

      <div style="background:#f59e0b15;border:1px solid #f59e0b40;border-radius:10px;padding:12px">
        <div style="color:#f59e0b;font-size:11px;font-weight:700;margin-bottom:6px">🟠 ZONA NARANJA — 70% a 99%</div>
        <div style="color:#94a3b8;font-size:12px;line-height:1.6">
          Estamos cerca pero no alcanza para cubrir todos los gastos fijos. <strong style="color:#f59e0b">Hay que empujar más trabajos.</strong> Sin bonos ni renta adicional.
        </div>
      </div>

      <div style="background:#16a34a15;border:1px solid #16a34a40;border-radius:10px;padding:12px">
        <div style="color:#16a34a;font-size:11px;font-weight:700;margin-bottom:6px">🟢 ZONA VERDE — 100% a 119%</div>
        <div style="color:#94a3b8;font-size:12px;line-height:1.6">
          Los gastos fijos están cubiertos. Se pagan todos los salarios normalmente. <strong style="color:#16a34a">Aún no hay bonos, pero el taller está sano.</strong><br/>
          Separar mínimo Bs. 5.000 para el fondo de emergencia.
        </div>
      </div>

      <div style="background:#a78bfa15;border:1px solid #a78bfa40;border-radius:10px;padding:12px">
        <div style="color:#a78bfa;font-size:11px;font-weight:700;margin-bottom:6px">⭐ ZONA BONO — 120% o más</div>
        <div style="color:#94a3b8;font-size:12px;line-height:1.6">
          Superamos el equilibrio con margen. <strong style="color:#a78bfa">El bono se confirma solo si caja cuadra, capital tienda fue separado y no hay reclamos graves.</strong><br/>
          Separar mínimo Bs. 5.000 para fondo de emergencia antes de distribuir bonos.
        </div>
      </div>

      <div style="background:#334155;border-radius:10px;padding:12px">
        <div style="color:#94a3b8;font-size:11px;font-weight:700;margin-bottom:6px">📊 RESUMEN DE REFERENCIAS</div>
        <div style="color:#475569;font-size:10px;margin-bottom:10px">Avance = ganancia neta / gastos fijos. Capital tienda no cuenta.</div>
        ${TALLERES.map(t => `
        <div style="margin-bottom:10px">
          <div style="color:${t.color};font-size:11px;font-weight:700;margin-bottom:5px">${t.icono} ${t.nombre}</div>
          <div style="display:flex;flex-direction:column;gap:3px">
            <div style="display:flex;justify-content:space-between;font-size:11px">
              <span style="color:#64748b">Gastos fijos (100%)</span>
              <span style="color:#94a3b8;font-weight:700">${fmt(t.totalGastos)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:11px">
              <span style="color:#f59e0b">Naranja desde (70%)</span>
              <span style="color:#f59e0b;font-weight:700">${fmt(t.totalGastos * 0.7)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:11px">
              <span style="color:#16a34a">Verde desde (100%)</span>
              <span style="color:#16a34a;font-weight:700">${fmt(t.totalGastos)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:11px">
              <span style="color:#a78bfa">Zona bono desde (120%)</span>
              <span style="color:#a78bfa;font-weight:700">${fmt(t.totalGastos * 1.2)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:11px">
              <span style="color:#64748b">Meta con bonos (ref.)</span>
              <span style="color:#64748b;font-weight:700">${fmt(t.metaConBonos)}</span>
            </div>
          </div>
        </div>`).join(`<div style="border-bottom:1px solid #475569;margin:8px 0"></div>`)}
      </div>
    </div>
  </div>`;
}

/* ── Acciones ────────────────────────────────────────── */
function cambiarTab(k) { tab = k; render(); }

function toggleGastos(key) {
  verGastos[key] = !verGastos[key];
  render();
}

function salir() {
  localStorage.removeItem("scp_user");
  localStorage.removeItem("sc_user");
  location.href = "/";
}

/* ── Init ────────────────────────────────────────────── */
async function init() {
  usuario = getSession();
  if (!usuario) { location.href = "/"; return; }
  if (usuario.rol !== "admin") {
    document.getElementById("app").innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
      <div style="text-align:center">
        <div style="font-size:48px;margin-bottom:12px">🔒</div>
        <div style="color:#ef4444;font-weight:700;margin-bottom:8px">Acceso restringido</div>
        <div style="color:#64748b;font-size:12px;margin-bottom:20px">Esta página solo puede verla Wilfredo.</div>
        <a href="/" style="padding:10px 20px;background:#334155;color:#94a3b8;border-radius:10px;text-decoration:none;font-weight:700;font-size:12px">← Volver al inicio</a>
      </div>
    </div>`;
    return;
  }
  await cargarIngresosMes();
  render();
}

/* ── Exponer globales ────────────────────────────────── */
["cambiarTab", "toggleGastos", "salir"].forEach(fn => window[fn] = eval(fn));

init();
</script>
</body>
</html>
