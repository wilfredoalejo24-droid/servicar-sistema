<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Metas y Equilibrio — Servi Car Platinium</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;min-height:100vh}
.card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:16px;margin-bottom:12px}
.label{color:#64748b;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .25s ease both}
.prog-track{background:#0f172a;border-radius:99px;height:10px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;border-radius:99px;transition:width .6s ease}
.gasto-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #0f172a;font-size:12px}
.gasto-row:last-child{border-bottom:none}
.semaforo{width:14px;height:14px;border-radius:50%;flex-shrink:0;display:inline-block}
</style>
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#475569">
    <div style="text-align:center"><div style="font-size:38px;margin-bottom:8px">📊</div>Cargando...</div>
  </div>
</div>
<script>
const SB = window.supabase.createClient(
  "https://epirsbudngwbxgcsryvv.supabase.co",
  "sb_publishable_zsqvMzJMc80Ypf3UQqs-SA_IrV-XIGc"
);

/* ── Metadata de cada taller (gastos fijos vienen de Supabase) ── */
const TALLERES = [
  {
    key: "bv",
    nombre: "Bella Vista",
    icono: "🌟",
    color: "#10b981",
    equipo: ["Wilfredo", "Adolfo", "Joel"],
    metaConBonos: 25526,
    bonos: [
      { nombre: "Wilfredo", monto: 500 },
      { nombre: "Adolfo",   monto: 500 },
      { nombre: "Joel",     monto: 250 },
      { nombre: "Renta Vanesa + Selena", monto: 1000 },
    ],
    tallerDB: "Taller 2 · Bella Vista",
  },
  {
    key: "mo",
    nombre: "Montes",
    icono: "⛰️",
    color: "#3b82f6",
    equipo: ["William", "Evo", "Diego"],
    metaConBonos: 19635,
    bonos: [
      { nombre: "William", monto: 500 },
      { nombre: "Evo",     monto: 250 },
      { nombre: "Diego",   monto: 0 },
      { nombre: "Renta Vanesa + Selena", monto: 1000 },
    ],
    tallerDB: "Taller 1 · Montes",
  },
];

const fmt = n => `Bs. ${parseFloat(n || 0).toLocaleString("es-BO", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
const pct = (v, max) => Math.min(100, Math.max(0, (v / max) * 100)).toFixed(1);

let usuario = null;
let ingresosMes  = {}; // { bv: 0, mo: 0 } — solo ganancia_neta
let capitalMes   = {}; // { bv: 0, mo: 0 } — capital tienda (solo informativo)
let gastosFijos  = { bv: [], mo: [] }; // desde Supabase gastos_fijos_taller (activos)
let gastosTodos  = [];                 // todos los gastos incl. inactivos (para Config)
let errorGastos  = false;
let cfgFiltroTaller = "";              // filtro de taller en pestaña Config
let cfgGuardando    = false;           // lock para evitar doble submit
let tab = "bv";
let verGastos = { bv: false, mo: false };

function getSession() {
  try { return JSON.parse(localStorage.getItem("scp_user")) || JSON.parse(localStorage.getItem("sc_user")) || null; }
  catch { return null; }
}

/* ── Mes actual ──────────────────────────────────────── */
function fechasDelMes() {
  const hoy = new Date();
  const año = hoy.getFullYear();
  const mes = String(hoy.getMonth() + 1).padStart(2, "0");
  // Las fechas en Supabase están en formato DD/MM/YYYY (local boliviano)
  return { mes, año, label: hoy.toLocaleDateString("es-BO", { month: "long", year: "numeric" }) };
}

/* ── Cargar gastos fijos desde Supabase ─────────────── */
async function cargarGastosFijos() {
  try {
    const { data, error } = await SB
      .from("gastos_fijos_taller")
      .select("taller, concepto, monto, categoria, orden")
      .eq("activo", true)
      .order("orden");
    if (error) throw error;
    gastosFijos = { bv: [], mo: [] };
    TALLERES.forEach(t => {
      gastosFijos[t.key] = (data || []).filter(g => g.taller === t.tallerDB);
    });
    errorGastos = false;
  } catch {
    errorGastos = true;
  }
}

/* ── Cargar TODOS los gastos (activos + inactivos) para Config ── */
async function cargarTodosGastosFijos() {
  try {
    const { data, error } = await SB
      .from("gastos_fijos_taller")
      .select("id, taller, concepto, monto, categoria, activo, orden, creado_por, actualizado_por")
      .order("taller")
      .order("orden")
      .order("concepto");
    if (error) throw error;
    gastosTodos = data || [];
  } catch {
    gastosTodos = [];
  }
}

/* ── Cargar ingresos del mes desde caja_sesiones ──── */
async function cargarIngresosMes() {
  const { mes, año } = fechasDelMes();

  // Consulta todas las sesiones cerradas — filtramos por mes en JS
  // porque el formato de fecha es DD/MM/YYYY
  const { data } = await SB
    .from("caja_sesiones")
    .select("taller, ganancia_neta, capital_tienda, fecha, estado")
    .eq("estado", "Cerrada");

  const sesiones = data || [];

  // Filtrar sesiones del mes actual
  const delMes = sesiones.filter(s => {
    if (!s.fecha) return false;
    // formato DD/MM/YYYY
    const partes = s.fecha.split("/");
    if (partes.length === 3) {
      return partes[1] === mes && partes[2] === String(año);
    }
    // formato YYYY-MM-DD
    const d = new Date(s.fecha);
    return d.getMonth() + 1 === parseInt(mes) && d.getFullYear() === año;
  });

  ingresosMes = { bv: 0, mo: 0 };
  capitalMes  = { bv: 0, mo: 0 };
  TALLERES.forEach(t => {
    const sesT = delMes.filter(s => s.taller === t.tallerDB);
    ingresosMes[t.key] = sesT.reduce((acc, s) => acc + parseFloat(s.ganancia_neta  || 0), 0);
    capitalMes[t.key]  = sesT.reduce((acc, s) => acc + parseFloat(s.capital_tienda || 0), 0);
  });
}

/* ── Semáforo ────────────────────────────────────────── */
function calcSemaforo(avancePct) {
  if (avancePct >= 120) return { color:"#a78bfa", bg:"#a78bfa15", borde:"#a78bfa40", icono:"⭐", zona:"ZONA BONO", label:"Zona bono · Superamos el equilibrio",   msg:"Superamos el equilibrio. Posible bono si caja cuadra y no hay reclamos.", bonos:true  };
  if (avancePct >= 100) return { color:"#16a34a", bg:"#16a34a15", borde:"#16a34a40", icono:"🟢", zona:"VERDE",    label:"Verde · Ya cubrimos los gastos fijos",   msg:"Ya cubrimos los gastos fijos.",                                           bonos:false };
  if (avancePct >= 70)  return { color:"#f59e0b", bg:"#f59e0b15", borde:"#f59e0b40", icono:"🟠", zona:"NARANJA",  label:"Naranja · Estamos cerca",               msg:"Estamos cerca. Hay que empujar más trabajos.",                            bonos:false };
  return                       { color:"#ef4444", bg:"#ef444415", borde:"#ef444440", icono:"🔴", zona:"ROJO",     label:"Rojo · Estamos bajos",                  msg:"Estamos bajos. Falta cubrir gastos fijos.",                               bonos:false };
}

/* ── Render ──────────────────────────────────────────── */
function setApp(html) { document.getElementById("app").innerHTML = html; }
function $$(id) { return document.getElementById(id); }

function render() {
  const { label: mesLabel } = fechasDelMes();

  setApp(`
  <!-- HEADER -->
  <div style="background:#1e293b;border-bottom:1px solid #334155;padding:12px 16px;position:sticky;top:0;z-index:100">
    <div style="display:flex;justify-content:space-between;align-items:center;max-width:560px;margin:0 auto">
      <div>
        <a href="/" style="color:#475569;text-decoration:none;font-size:10px;font-weight:700">← Inicio</a>
        <div style="color:#fbbf24;font-weight:900;font-size:15px;margin-top:1px">🎯 Metas y Equilibrio</div>
        <div style="color:#475569;font-size:10px">${usuario.nombre} · ${mesLabel}</div>
      </div>
      <button onclick="salir()"
        style="padding:7px 12px;background:#ef444415;color:#ef4444;border:1px solid #ef444430;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">
        Salir
      </button>
    </div>
  </div>

  <div class="fi" style="padding:12px 14px;max-width:560px;margin:0 auto">

  <!-- TABS -->
  <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">
    ${TALLERES.map(t => `
    <button onclick="cambiarTab('${t.key}')"
      style="flex:1;padding:9px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid ${tab === t.key ? t.color : "#334155"};background:${tab === t.key ? t.color + "25" : "#1e293b"};color:${tab === t.key ? t.color : "#64748b"}">
      ${t.icono} ${t.nombre}
    </button>`).join("")}
    <button onclick="cambiarTab('reglas')"
      style="padding:9px 12px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid ${tab === "reglas" ? "#a78bfa" : "#334155"};background:${tab === "reglas" ? "#a78bfa25" : "#1e293b"};color:${tab === "reglas" ? "#a78bfa" : "#64748b"}">
      📜
    </button>
    <button onclick="cambiarTab('config')"
      style="padding:9px 12px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid ${tab === "config" ? "#f59e0b" : "#334155"};background:${tab === "config" ? "#f59e0b20" : "#1e293b"};color:${tab === "config" ? "#f59e0b" : "#64748b"}">
      ⚙️
    </button>
  </div>

  ${tab === "config" ? renderConfig() : tab === "reglas" ? renderReglas() : renderTaller(TALLERES.find(t => t.key === tab))}

  <div style="height:28px"></div>
  </div>`);
}

function renderTaller(t) {
  const gastos      = gastosFijos[t.key] || [];
  const totalGastos = gastos.reduce((s, g) => s + parseFloat(g.monto || 0), 0);
  const ganancia    = ingresosMes[t.key] || 0;
  const capital     = capitalMes[t.key]  || 0;
  const avancePct   = totalGastos > 0 ? (ganancia / totalGastos) * 100 : 0;
  const sem         = calcSemaforo(avancePct);
  const faltaEq     = Math.max(0, totalGastos - ganancia);
  const excedente   = Math.max(0, ganancia - totalGastos);
  const faltaMeta   = Math.max(0, t.metaConBonos - ganancia);
  const totalBonos  = t.bonos.reduce((s, b) => s + b.monto, 0);
  const errorBanner = errorGastos ? `
  <div class="card" style="border-color:#ef444440;background:#ef444415">
    <div style="color:#ef4444;font-size:12px;font-weight:700;margin-bottom:4px">⚠️ No se pudieron cargar los gastos fijos desde Supabase.</div>
    <div style="color:#94a3b8;font-size:11px">El punto de equilibrio no puede calcularse. Verificá la conexión e intentá recargar.</div>
  </div>` : "";

  return `${errorBanner}
  <!-- SEMÁFORO -->
  <div class="card" style="border-color:${sem.borde};background:${sem.bg}">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <div style="font-size:36px">${sem.icono}</div>
      <div style="flex:1">
        <div style="color:${sem.color};font-weight:900;font-size:14px">${sem.label}</div>
        <div style="color:#64748b;font-size:11px;margin-top:2px">${t.icono} Taller ${t.nombre} · Equipo: ${t.equipo.join(", ")}</div>
      </div>
      <div style="font-size:22px;font-weight:900;color:${sem.color}">${avancePct.toFixed(1)}%</div>
    </div>

    <!-- Mensaje del semáforo -->
    <div style="background:#0f172a;border-radius:8px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:#94a3b8;line-height:1.5">
      ${sem.msg}
    </div>

    <!-- Ganancia neta del mes -->
    <div style="background:#0f172a;border-radius:10px;padding:12px;margin-bottom:8px;text-align:center">
      <div class="label" style="margin-bottom:4px">Ganancia neta del mes (caja cerrada)</div>
      <div style="font-size:30px;font-weight:900;color:${sem.color}">${fmt(ganancia)}</div>
      <div style="color:#475569;font-size:10px;margin-top:3px">Mano de obra + margen repuestos · Cubre los gastos fijos</div>
    </div>

    <!-- Capital tienda (solo informativo) -->
    <div style="background:#0f172a;border:1px solid #60a5fa20;border-radius:8px;padding:9px 12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:10px;color:#60a5fa;font-weight:700">📦 CAPITAL TIENDA DEL MES</div>
        <div style="font-size:10px;color:#475569;margin-top:2px">No cuenta para equilibrio · Vuelve al inventario</div>
      </div>
      <div style="font-weight:900;color:#60a5fa;font-size:14px">${fmt(capital)}</div>
    </div>

    <!-- Barra de progreso hacia equilibrio -->
    <div class="label" style="margin-bottom:2px">Avance hacia punto de equilibrio (ganancia neta / gastos fijos)</div>
    <div class="prog-track">
      <div class="prog-fill" style="width:${Math.min(100, avancePct)}%;background:${sem.color}"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#475569;margin-bottom:14px">
      <span>0%</span>
      <span style="color:${sem.color};font-weight:700">${avancePct.toFixed(1)}%</span>
      <span>100% = ${fmt(totalGastos)}</span>
    </div>

    <!-- Gastos fijos / Falta o excedente -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px;text-align:center">
        <div class="label" style="margin-bottom:4px">Gastos fijos del mes</div>
        <div style="font-size:13px;font-weight:900;color:#64748b">${fmt(totalGastos)}</div>
        <div style="font-size:10px;color:#475569;margin-top:2px">Punto de equilibrio (100%)</div>
      </div>
      <div style="background:#0f172a;border:1px solid ${excedente > 0 ? "#16a34a30" : "#ef444430"};border-radius:10px;padding:10px;text-align:center">
        <div class="label" style="margin-bottom:4px">${excedente > 0 ? "Excedente sobre equilibrio" : "Falta para equilibrio"}</div>
        <div style="font-size:13px;font-weight:900;color:${excedente > 0 ? "#16a34a" : "#ef4444"}">${fmt(excedente > 0 ? excedente : faltaEq)}</div>
        ${excedente > 0
          ? `<div style="font-size:10px;color:#16a34a;margin-top:2px">✅ Gastos cubiertos</div>`
          : `<div style="font-size:10px;color:#ef4444;margin-top:2px">❌ Aún no cubre</div>`}
      </div>
    </div>

    <!-- Meta con bonos (referencia secundaria) -->
    <div style="margin-top:8px;padding:8px 12px;background:#0f172a;border-radius:8px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:10px;color:#475569">Meta con bonos (referencia)</div>
      <div>
        <span style="font-size:12px;font-weight:700;color:${faltaMeta <= 0 ? "#16a34a" : "#64748b"}">${fmt(t.metaConBonos)}</span>
        ${faltaMeta > 0
          ? `<span style="font-size:10px;color:#475569"> · faltan ${fmt(faltaMeta)}</span>`
          : `<span style="font-size:10px;color:#16a34a"> · ✅ alcanzada</span>`}
      </div>
    </div>
  </div>

  <!-- ZONA BONO AVISO (Cambio 5) -->
  ${avancePct >= 120 ? `
  <div class="card" style="border-color:#a78bfa40;background:#a78bfa08">
    <div style="color:#a78bfa;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px">⭐ Zona bono referencial</div>
    <div style="color:#94a3b8;font-size:12px;line-height:1.6">
      El bono se confirma solo si caja cuadra, capital tienda fue separado y no hay reclamos graves.
    </div>
  </div>` : ""}

  <!-- BONOS -->
  <div class="card" style="border-color:${sem.bonos ? "#a78bfa40" : "#33415580"}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="color:${sem.bonos ? "#a78bfa" : "#64748b"};font-size:11px;font-weight:700;text-transform:uppercase">
        🎁 Bonos del mes
      </div>
      <span style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;
        background:${sem.bonos ? "#a78bfa20" : "#ef444420"};
        color:${sem.bonos ? "#a78bfa" : "#ef4444"};
        border:1px solid ${sem.bonos ? "#a78bfa40" : "#ef444440"}">
        ${sem.bonos ? "✅ Aplican (zona bono)" : "❌ No aplican aún"}
      </span>
    </div>
    ${!sem.bonos ? `<div style="color:#475569;font-size:12px;text-align:center;padding:8px">Se activan solo cuando el taller alcanza zona bono (≥ 120% de gastos fijos = ${fmt(totalGastos * 1.2)})</div>` : ""}
    <div style="${!sem.bonos ? "opacity:0.4" : ""}">
      ${t.bonos.map(b => `
      <div class="gasto-row">
        <span style="color:#94a3b8">${b.nombre}</span>
        <span style="font-weight:700;color:${sem.bonos && b.monto > 0 ? "#a78bfa" : "#64748b"}">${b.monto > 0 ? fmt(b.monto) : "Sin bono"}</span>
      </div>`).join("")}
      <div style="display:flex;justify-content:space-between;padding:8px 0 0;border-top:1px solid #334155;margin-top:4px">
        <span style="color:#64748b;font-size:11px;font-weight:700">TOTAL BONOS</span>
        <span style="font-weight:900;color:${sem.bonos ? "#a78bfa" : "#64748b"}">${fmt(totalBonos)}</span>
      </div>
    </div>
  </div>

  <!-- GASTOS FIJOS -->
  <div class="card">
    <button onclick="toggleGastos('${t.key}')"
      style="width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;color:#fff;cursor:pointer;padding:0;margin-bottom:${verGastos[t.key] ? "12" : "0"}px">
      <span style="font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase">📋 Gastos fijos mensuales</span>
      <span style="display:flex;align-items:center;gap:6px">
        <span style="font-weight:900;color:${t.color}">${fmt(totalGastos)}</span>
        <span style="color:#475569;font-size:12px">${verGastos[t.key] ? "▲" : "▼"}</span>
      </span>
    </button>

    ${verGastos[t.key] ? `
    <div>
      ${gastos.length === 0
        ? `<div style="color:#475569;font-size:12px;text-align:center;padding:12px">Sin gastos registrados para este taller.</div>`
        : gastos.map(g => `
      <div class="gasto-row">
        <span style="color:#94a3b8">${g.concepto}</span>
        <span style="color:#64748b;font-weight:700">${fmt(g.monto)}</span>
      </div>`).join("")}
      <div style="display:flex;justify-content:space-between;padding:10px 0 0;border-top:2px solid #334155;margin-top:6px">
        <span style="color:#fff;font-size:12px;font-weight:700">TOTAL</span>
        <span style="font-weight:900;color:${t.color};font-size:14px">${fmt(totalGastos)}</span>
      </div>
    </div>` : ""}
  </div>

  <!-- SEMÁFORO REFERENCIA (4 zonas por %) -->
  <div class="card">
    <div class="label" style="margin-bottom:10px">📍 Escala del semáforo (% ganancia neta / gastos fijos)</div>
    ${[
      { desde:   0, hasta:  69.99, color:"#ef4444", bg:"#ef444415", icono:"🔴", zona:"Rojo",      desc:`0% a 69% — Menos de ${fmt(totalGastos*0.7)} — Sin renta ni bonos` },
      { desde:  70, hasta:  99.99, color:"#f59e0b", bg:"#f59e0b15", icono:"🟠", zona:"Naranja",   desc:`70% a 99% — ${fmt(totalGastos*0.7)} a ${fmt(totalGastos)} — Solo salarios` },
      { desde: 100, hasta: 119.99, color:"#16a34a", bg:"#16a34a15", icono:"🟢", zona:"Verde",     desc:`100% a 119% — ${fmt(totalGastos)} a ${fmt(totalGastos*1.2)} — Gastos cubiertos` },
      { desde: 120, hasta:   null, color:"#a78bfa", bg:"#a78bfa15", icono:"⭐", zona:"Zona bono", desc:`≥ 120% — Más de ${fmt(totalGastos*1.2)} — Posible bono si caja cuadra` },
    ].map(z => {
      const activo = avancePct >= z.desde && (z.hasta === null || avancePct <= z.hasta);
      return `
      <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;margin-bottom:6px;
        background:${activo ? z.bg : "transparent"};
        border:1px solid ${activo ? z.color + "40" : "#334155"}">
        <span style="font-size:18px">${z.icono}</span>
        <div style="flex:1">
          <div style="font-size:11px;font-weight:700;color:${activo ? z.color : "#64748b"}">${z.zona}${activo ? " ← Estás aquí" : ""}</div>
          <div style="font-size:10px;color:#475569;margin-top:2px">${z.desc}</div>
        </div>
      </div>`;
    }).join("")}
  </div>

  <!-- FONDO EMERGENCIA -->
  ${avancePct >= 100 ? `
  <div class="card" style="border-color:#a78bfa40">
    <div style="color:#a78bfa;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px">🏦 Fondo de emergencia</div>
    <div style="color:#94a3b8;font-size:12px;line-height:1.6">

/* ── Acciones ────────────────────────────────────────── */
async function cambiarTab(k) {
  tab = k;
  if (k === "config") await cargarTodosGastosFijos();
  render();
}

function toggleGastos(key) {
  verGastos[key] = !verGastos[key];
  render();
}

function setCfgFiltro(v) {
  cfgFiltroTaller = v;
  render();
}

async function toggleActivoGasto(id, activoActual) {
  const { error } = await SB
    .from("gastos_fijos_taller")
    .update({ activo: !activoActual, actualizado_por: usuario.nombre })
    .eq("id", id);
  if (error) { alert("Error al cambiar estado: " + error.message); return; }
  await cargarGastosFijos();
  await cargarTodosGastosFijos();
  render();
}

async function editarGasto(id) {
  const g = gastosTodos.find(x => x.id === id);
  if (!g) return;

  const nuevoConcepto = prompt("Concepto:", g.concepto);
  if (nuevoConcepto === null) return;
  if (!nuevoConcepto.trim()) { alert("El concepto no puede estar vacío."); return; }

  const nuevoMontoStr = prompt("Monto (Bs.):", g.monto);
  if (nuevoMontoStr === null) return;
  const nuevoMonto = parseFloat(String(nuevoMontoStr).replace(",", "."));
  if (isNaN(nuevoMonto) || nuevoMonto < 0) { alert("Monto inválido. Ingresá un número ≥ 0."); return; }

  const nuevaCat = prompt("Categoría (Servicios / Salarios / Alquiler / Cocina / Banco / Otro):", g.categoria || "");
  if (nuevaCat === null) return;

  const tallerActualShort = g.taller === "Taller 1 · Montes" ? "1" : "2";
  const nuevoTallerInput  = prompt("Taller (ingresá 1 = Montes  /  2 = Bella Vista):", tallerActualShort);
  if (nuevoTallerInput === null) return;
  const TALLER_MAP = { "1": "Taller 1 · Montes", "2": "Taller 2 · Bella Vista" };
  const nuevoTaller = TALLER_MAP[nuevoTallerInput.trim()];
  if (!nuevoTaller) { alert("Taller inválido. Ingresá 1 o 2."); return; }

  const { error } = await SB
    .from("gastos_fijos_taller")
    .update({
      concepto:        nuevoConcepto.trim(),
      monto:           nuevoMonto,
      categoria:       nuevaCat.trim() || null,
      taller:          nuevoTaller,
      actualizado_por: usuario.nombre,
    })
    .eq("id", id);

  if (error) { alert("Error al guardar: " + error.message); return; }
  await cargarGastosFijos();
  await cargarTodosGastosFijos();
  render();
}

async function agregarGasto() {
  if (cfgGuardando) return;
  const tallerVal   = (document.getElementById("cfg_taller")   || {}).value || "";
  const conceptoVal = ((document.getElementById("cfg_concepto") || {}).value || "").trim();
  const montoRaw    = (document.getElementById("cfg_monto")     || {}).value || "";
  const catVal      = ((document.getElementById("cfg_cat")      || {}).value || "").trim();

  if (!tallerVal)    { alert("Seleccioná un taller.");                              return; }
  if (!conceptoVal)  { alert("El concepto no puede estar vacío.");                  return; }
  const montoVal = parseFloat(String(montoRaw).replace(",", "."));
  if (isNaN(montoVal) || montoVal < 0) { alert("Ingresá un monto válido (≥ 0)."); return; }

  cfgGuardando = true;
  const btn = document.getElementById("cfg_btn_agregar");
  if (btn) { btn.disabled = true; btn.textContent = "Guardando..."; }

  const { error } = await SB.from("gastos_fijos_taller").insert({
    taller:          tallerVal,
    concepto:        conceptoVal,
    monto:           montoVal,
    categoria:       catVal || null,
    activo:          true,
    orden:           0,
    creado_por:      usuario.nombre,
    actualizado_por: usuario.nombre,
  });

  cfgGuardando = false;
  if (error) {
    alert("Error al agregar: " + error.message);
    if (btn) { btn.disabled = false; btn.textContent = "➕ Agregar gasto"; }
    return;
  }
  await cargarGastosFijos();
  await cargarTodosGastosFijos();
  render();
}

function salir() {
  localStorage.removeItem("scp_user");
  localStorage.removeItem("sc_user");
  location.href = "/";
}

/* ── Init ────────────────────────────────────────────── */
async function init() {
  usuario = getSession();
  if (!usuario) { location.href = "/"; return; }
  if (usuario.rol !== "admin") {
    document.getElementById("app").innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
      <div style="text-align:center">
        <div style="font-size:48px;margin-bottom:12px">🔒</div>
        <div style="color:#ef4444;font-weight:700;margin-bottom:8px">Acceso restringido</div>
        <div style="color:#64748b;font-size:12px;margin-bottom:20px">Esta página solo puede verla Wilfredo.</div>
        <a href="/" style="padding:10px 20px;background:#334155;color:#94a3b8;border-radius:10px;text-decoration:none;font-weight:700;font-size:12px">← Volver al inicio</a>
      </div>
    </div>`;
    return;
  }
  await cargarGastosFijos();
  await cargarIngresosMes();
  render();
}

/* ── Exponer globales ────────────────────────────────── */
["cambiarTab", "toggleGastos", "salir", "setCfgFiltro", "toggleActivoGasto", "editarGasto", "agregarGasto"]
  .forEach(fn => window[fn] = eval(fn));

init();
</script>
