const fmt = n => `Bs. ${parseFloat(n || 0).toLocaleString("es-BO", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
const pct = (v, max) => Math.min(100, Math.max(0, (v / max) * 100)).toFixed(1);

let usuario = null;
let ingresosMes = {}; // { bv: 0, mo: 0 }
let tab = "bv";
let verGastos = { bv: false, mo: false };

function getSession() {
  try { return JSON.parse(localStorage.getItem("scp_user")) || JSON.parse(localStorage.getItem("sc_user")) || null; }
  catch { return null; }
}

/* ── Mes actual ──────────────────────────────────────── */
function fechasDelMes() {
  const hoy = new Date();
  const año = hoy.getFullYear();
  const mes = String(hoy.getMonth() + 1).padStart(2, "0");
  // Las fechas en Supabase están en formato DD/MM/YYYY (local boliviano)
  return { mes, año, label: hoy.toLocaleDateString("es-BO", { month: "long", year: "numeric" }) };
}

/* ── Cargar ingresos del mes desde caja_sesiones ──── */
async function cargarIngresosMes() {
  const { mes, año } = fechasDelMes();

  // Consulta todas las sesiones cerradas — filtramos por mes en JS
  // porque el formato de fecha es DD/MM/YYYY
  const { data } = await SB
    .from("caja_sesiones")
    .select("taller, ganancia_neta, capital_tienda, fecha, estado")
    .eq("estado", "Cerrada");

  const sesiones = data || [];

  // Filtrar sesiones del mes actual
  const delMes = sesiones.filter(s => {
    if (!s.fecha) return false;
    // formato DD/MM/YYYY
    const partes = s.fecha.split("/");
    if (partes.length === 3) {
      return partes[1] === mes && partes[2] === String(año);
    }
    // formato YYYY-MM-DD
    const d = new Date(s.fecha);
    return d.getMonth() + 1 === parseInt(mes) && d.getFullYear() === año;
  });

  ingresosMes = { bv: 0, mo: 0 };
  TALLERES.forEach(t => {
    const suma = delMes
      .filter(s => s.taller === t.tallerDB)
      .reduce((acc, s) => acc + parseFloat(s.ganancia_neta || 0) + parseFloat(s.capital_tienda || 0), 0);
    ingresosMes[t.key] = suma;
  });
}

/* ── Semáforo ────────────────────────────────────────── */
function calcSemaforo(taller, ingreso) {
  const { amarilloDesde, verdeDesde } = taller.semaforo;
  if (ingreso >= verdeDesde)  return { color: "#16a34a", bg: "#16a34a15", borde: "#16a34a40", icono: "🟢", label: "Verde · Meta alcanzada", bonos: true };
  if (ingreso >= amarilloDesde) return { color: "#f59e0b", bg: "#f59e0b15", borde: "#f59e0b40", icono: "🟡", label: "Amarillo · Sobre el equilibrio", bonos: false };
  return { color: "#ef4444", bg: "#ef444415", borde: "#ef444440", icono: "🔴", label: "Rojo · Bajo el punto de equilibrio", bonos: false };
}

/* ── Render ──────────────────────────────────────────── */
function setApp(html) { document.getElementById("app").innerHTML = html; }
function $$(id) { return document.getElementById(id); }

function render() {
  const { label: mesLabel } = fechasDelMes();

  setApp(`

        Salir
      </button>
    </div>
  </div>

  <div class="fi" style="padding:12px 14px;max-width:560px;margin:0 auto">

  <!-- TABS -->
  <div style="display:flex;gap:6px;margin-bottom:16px">
    ${TALLERES.map(t => `

function renderTaller(t) {

  const sem = calcSemaforo(t, ingreso);
  const pctEq = pct(ingreso, t.metaConBonos);
  const faltaEq = Math.max(0, t.puntoEquilibrio - ingreso);
  const faltaMeta = Math.max(0, t.metaConBonos - ingreso);
  const sobraEq = Math.max(0, ingreso - t.puntoEquilibrio);

  return `
  <!-- SEMÁFORO -->
  <div class="card" style="border-color:${sem.borde};background:${sem.bg}">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">

      <div style="flex:1">

        <div style="color:#64748b;font-size:11px;margin-top:2px">${t.icono} Taller ${t.nombre} · Equipo: ${t.equipo.join(", ")}</div>

    </div>

    <!-- Ingreso del mes -->
    <div style="background:#0f172a;border-radius:10px;padding:12px;margin-bottom:12px;text-align:center">

      <div style="font-size:30px;font-weight:900;color:${sem.color}">${fmt(ingreso)}</div>
      <div style="color:#475569;font-size:10px;margin-top:3px">Ganancia neta + Capital</div>
    </div>

    <!-- Barra de progreso -->
    <div class="label" style="margin-bottom:2px">Progreso hacia la meta</div>
    <div class="prog-track">
      <div class="prog-fill" style="width:${Math.min(100, pct(ingreso, t.metaConBonos))}%;background:${sem.color}"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:#475569;margin-bottom:14px">
      <span>Bs. 0</span>
      <span style="color:${sem.color};font-weight:700">${pctEq}%</span>
      <span>${fmt(t.metaConBonos)}</span>
    </div>

    <!-- Líneas de referencia -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px;text-align:center">
        <div class="label" style="margin-bottom:4px">Punto equilibrio</div>
        <div style="font-size:13px;font-weight:900;color:#64748b">${fmt(t.puntoEquilibrio)}</div>
        ${faltaEq > 0
          ? `<div style="font-size:10px;color:#ef4444;margin-top:3px">Faltan ${fmt(faltaEq)}</div>`
          : `<div style="font-size:10px;color:#16a34a;margin-top:3px">✅ Superado +${fmt(sobraEq)}</div>`}
      </div>
      <div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px;text-align:center">
        <div class="label" style="margin-bottom:4px">Meta con bonos</div>
        <div style="font-size:13px;font-weight:900;color:${t.color}">${fmt(t.metaConBonos)}</div>
        ${faltaMeta > 0
          ? `<div style="font-size:10px;color:#f59e0b;margin-top:3px">Faltan ${fmt(faltaMeta)}</div>`
          : `<div style="font-size:10px;color:#16a34a;margin-top:3px">✅ Meta alcanzada!</div>`}
      </div>
    </div>
  </div>

  <!-- BONOS -->
  <div class="card" style="border-color:${sem.bonos ? "#16a34a40" : "#33415580"}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="color:${sem.bonos ? "#16a34a" : "#64748b"};font-size:11px;font-weight:700;text-transform:uppercase">
        🎁 Bonos del mes
      </div>
      <span style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;
        background:${sem.bonos ? "#16a34a20" : "#ef444420"};
        color:${sem.bonos ? "#16a34a" : "#ef4444"};
        border:1px solid ${sem.bonos ? "#16a34a40" : "#ef444440"}">
        ${sem.bonos ? "✅ Aplican" : "❌ No aplican"}

    </div>
    ${!sem.bonos ? `<div style="color:#475569;font-size:12px;text-align:center;padding:8px">Se activan solo cuando el taller llega a zona verde (≥ ${fmt(t.semaforo.verdeDesde)})</div>` : ""}

      ${t.bonos.map(b => `

      <div style="display:flex;justify-content:space-between;padding:8px 0 0;border-top:1px solid #334155;margin-top:4px">

    <button onclick="toggleGastos('${t.key}')"

      <span style="display:flex;align-items:center;gap:6px">

    ${verGastos[t.key] ? `
    <div>
      ${t.gastos.map(g => `
      <div class="gasto-row">
        <span style="color:#94a3b8">${g.concepto}</span>

      </div>`).join("")}
      <div style="display:flex;justify-content:space-between;padding:10px 0 0;border-top:2px solid #334155;margin-top:6px">
        <span style="color:#fff;font-size:12px;font-weight:700">TOTAL</span>

      { desde: t.semaforo.verdeDesde, hasta: null, color: "#16a34a", bg: "#16a34a15", icono: "🟢", label: "Verde", desc: `Más de ${fmt(t.semaforo.verdeDesde)} — Bonos + renta + fondo emergencia` },
    ].map(z => {
      const activo = ingreso >= z.desde && (z.hasta === null || ingreso < z.hasta);
      return `
      <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;margin-bottom:6px;

        border:1px solid ${activo ? z.color + "40" : "#334155"}">
        <span style="font-size:18px">${z.icono}</span>
        <div style="flex:1">
          <div style="font-size:11px;font-weight:700;color:${activo ? z.color : "#64748b"}">${z.label}${activo ? " ← Estás aquí" : ""}</div>
          <div style="font-size:10px;color:#475569;margin-top:2px">${z.desc}</div>
        </div>
      </div>`;
    }).join("")}
  </div>

  <!-- FONDO EMERGENCIA -->
  ${sem.bonos ? `
  <div class="card" style="border-color:#a78bfa40">
    <div style="color:#a78bfa;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px">🏦 Fondo de emergencia</div>
    <div style="color:#94a3b8;font-size:12px;line-height:1.6">
      ✅ Mes verde. Recordá separar mínimo <strong style="color:#a78bfa">Bs. 5.000</strong> para el fondo de emergencia antes de distribuir los bonos.
    </div>
  </div>` : ""}
  `;
}

    </div>
  </div>`;
}

/* ── Acciones ────────────────────────────────────────── */
function cambiarTab(k) { tab = k; render(); }

function toggleGastos(key) {
  verGastos[key] = !verGastos[key];
  render();
}

function salir() {
  localStorage.removeItem("scp_user");
  localStorage.removeItem("sc_user");
  location.href = "/";
}

/* ── Init ────────────────────────────────────────────── */
async function init() {
  usuario = getSession();
  if (!usuario) { location.href = "/"; return; }
  if (usuario.rol !== "admin") {
    document.getElementById("app").innerHTML = `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center">
      <div style="text-align:center">
        <div style="font-size:48px;margin-bottom:12px">🔒</div>
        <div style="color:#ef4444;font-weight:700;margin-bottom:8px">Acceso restringido</div>
        <div style="color:#64748b;font-size:12px;margin-bottom:20px">Esta página solo puede verla Wilfredo.</div>
        <a href="/" style="padding:10px 20px;background:#334155;color:#94a3b8;border-radius:10px;text-decoration:none;font-weight:700;font-size:12px">← Volver al inicio</a>
      </div>
    </div>`;
    return;
  }
  await cargarIngresosMes();
  render();
}

/* ── Exponer globales ────────────────────────────────── */
["cambiarTab", "toggleGastos", "salir"].forEach(fn => window[fn] = eval(fn));

init();
</script>
</body>
</html>
