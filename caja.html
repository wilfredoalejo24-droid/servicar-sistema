<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Caja — Servi Car Platinium</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;min-height:100vh}
input,select{outline:none}
input:focus,select:focus{border-color:#f59e0b!important}
.input{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#fff;font-size:13px}
.label{color:#64748b;font-size:11px;font-weight:700;margin-bottom:5px;display:block}
.card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:16px;margin-bottom:12px}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .25s ease both}
@media print{
  .noprint{display:none!important}
  body{background:#fff;color:#000;font-size:11px}
  .card{border:1px solid #ccc;border-radius:0;break-inside:avoid}
}
</style>
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#475569">
    <div style="text-align:center"><div style="font-size:38px;margin-bottom:8px">💵</div>Cargando caja...</div>
  </div>
</div>
<script>
const SB=window.supabase.createClient(
  "https://epirsbudngwbxgcsryvv.supabase.co",
  "sb_publishable_zsqvMzJMc80Ypf3UQqs-SA_IrV-XIGc"
);
const EMPRESA={nombre:"SERVI CAR PLATINIUM",ciudad:"Viacha - La Paz",tel1:"68167264",tel2:"60574920"};
const TALLERES=["Taller 1 · Montes","Taller 2 · Bella Vista"];

/* Estado global */
let usuario=null, sesion=null, movimientos=[];
let tab="caja", filtroTaller="";
let informeSemana=0, informeTaller="ambos", informeCache=null;

const hoy =()=>new Date().toLocaleDateString("es-BO");
const hora =()=>new Date().toLocaleTimeString("es-BO",{hour:"2-digit",minute:"2-digit"});
const fmt  =n =>`Bs. ${parseFloat(n||0).toFixed(2)}`;

/* ── Sesión ─────────────────────────────────────────── */
function getSession(){
  try{
    return JSON.parse(localStorage.getItem("scp_user"))
        ||JSON.parse(localStorage.getItem("sc_user"))
        ||null;
  }catch{return null;}
}

/* ── Roles ──────────────────────────────────────────── */
const esAdmin    =()=>usuario?.rol==="admin";
const esEncargado=()=>["admin","encargado"].includes(usuario?.rol);

/* ── Init ───────────────────────────────────────────── */
async function init(){
  usuario=getSession();
  if(!usuario){location.href="/";return;}
  if(!esEncargado()){alert("❌ Sin acceso a caja");location.href="/";return;}
  filtroTaller=usuario.taller==="ambos"?"":usuario.taller;
  await sincronizar();
}

async function sincronizar(){
  setApp(`<div style="min-height:60vh;display:flex;align-items:center;justify-content:center;color:#475569">
    <div style="text-align:center"><div style="font-size:32px;margin-bottom:8px">💵</div>Cargando...</div>
  </div>`);
  if(filtroTaller){
    const{data}=await SB.from("caja_sesiones")
      .select("*").eq("fecha",hoy()).eq("taller",filtroTaller).eq("estado","Abierta").single();
    sesion=data||null;
    if(sesion) await cargarMovimientos();
    else movimientos=[];
  } else {
    sesion=null; movimientos=[];
  }
  render();
}

async function cargarMovimientos(){
  if(!sesion)return;
  const{data}=await SB.from("caja").select("*")
    .eq("fecha",hoy()).eq("taller",sesion.taller)
    .order("created_at",{ascending:false});
  movimientos=data||[];
}

/* ── Totales del día ────────────────────────────────── */
function calcDia(movs){
  movs=movs||movimientos;
  const ganancia=movs.filter(m=>m.tipo==="ingreso"&&m.subtipo==="ganancia_neta")
    .reduce((s,m)=>s+parseFloat(m.monto||0),0);
  const capital=movs.filter(m=>m.tipo==="ingreso"&&m.subtipo==="capital_tienda")
    .reduce((s,m)=>s+parseFloat(m.monto||0),0);
  const gastos=movs.filter(m=>m.tipo==="egreso")
    .reduce((s,m)=>s+parseFloat(m.monto||0),0);
  const efectivo=movs.filter(m=>m.tipo==="ingreso"&&(m.metodo_pago==="Efectivo"||!m.metodo_pago))
    .reduce((s,m)=>s+parseFloat(m.monto||0),0);
  const qr=movs.filter(m=>m.tipo==="ingreso"&&m.metodo_pago==="QR")
    .reduce((s,m)=>s+parseFloat(m.monto||0),0);
  const cobrado=ganancia+capital;
  const neto=cobrado-gastos;
  return{ganancia,capital,gastos,efectivo,qr,cobrado,neto};
}

/* ── Helpers DOM ────────────────────────────────────── */
function setApp(html){document.getElementById("app").innerHTML=html;}
function $$(id){return document.getElementById(id);}
function v(id){return ($$(`${id}`)?.value||"").trim();}
function vn(id){return parseFloat($$(id)?.value)||0;}

/* ══════════════════════════════════════════════════════
   RENDER PRINCIPAL
══════════════════════════════════════════════════════ */
function render(){
  document.getElementById("app").innerHTML=`
  <!-- HEADER -->
  <div style="background:#1e293b;border-bottom:1px solid #334155;padding:12px 16px;position:sticky;top:0;z-index:100" class="noprint">
    <div style="display:flex;justify-content:space-between;align-items:center;max-width:520px;margin:0 auto">
      <div>
        <a href="/" style="color:#475569;text-decoration:none;font-size:10px;font-weight:700">← Inicio</a>
        <div style="color:#fbbf24;font-weight:900;font-size:15px;margin-top:1px">💵 Caja</div>
        <div style="color:#475569;font-size:10px">${usuario.nombre} · ${hoy()}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button onclick="recargar()" style="padding:7px 10px;background:#334155;color:#94a3b8;border:none;border-radius:8px;cursor:pointer" title="Actualizar">🔄</button>
        <button onclick="salir()" style="padding:7px 12px;background:#ef444415;color:#ef4444;border:1px solid #ef444430;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer">Salir</button>
      </div>
    </div>
  </div>

  <div class="fi" style="padding:12px 14px;max-width:520px;margin:0 auto">

  <!-- TABS -->
  <div style="display:flex;gap:5px;margin-bottom:14px" class="noprint">
    ${[["caja","💵 Caja del día"],["informe","📊 Informe semanal"]].map(([k,l])=>`
      <button onclick="cambiarTab('${k}')"
        style="padding:7px 14px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;
          border:1px solid ${tab===k?"#f59e0b":"#334155"};
          background:${tab===k?"#f59e0b":"#1e293b"};
          color:${tab===k?"#1e293b":"#64748b"}">${l}</button>`).join("")}
  </div>

  ${tab==="caja" ? bloquesCaja() : bloquesInforme()}

  <div style="height:28px"></div>
  </div>`;

  if(tab==="informe") cargarInforme();
}

/* ══════════════════════════════════════════════════════
   TAB: CAJA DEL DÍA
══════════════════════════════════════════════════════ */
function bloquesCaja(){
  if(usuario.taller==="ambos"&&!filtroTaller) return selectorTaller();
  if(!sesion) return panelApertura();
  return panelCajaAbierta();
}

/* ── Selector de taller (admin) ─────────────────────── */
function selectorTaller(){
  return `
  <div class="card">
    <div style="color:#64748b;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:14px">🏢 Seleccionar taller</div>
    ${TALLERES.map(t=>`
    <button onclick="elegirTaller('${t}')"
      style="width:100%;padding:14px;background:#0f172a;border:1px solid #334155;border-radius:12px;
        color:#fff;text-align:left;cursor:pointer;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;font-weight:700">🏢 ${t}</span>
      <span style="color:#475569">→</span>
    </button>`).join("")}
  </div>`;
}

async function elegirTaller(t){
  filtroTaller=t;
  await sincronizar();
}

/* ── Panel apertura de caja ─────────────────────────── */
function panelApertura(){
  return `
  <div class="card">
    <div style="color:#16a34a;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:16px">🌅 Apertura de caja</div>
    <div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:12px;margin-bottom:16px;text-align:center">
      <div style="color:#3b82f6;font-weight:900;font-size:15px">🏢 ${filtroTaller||usuario.taller}</div>
      <div style="color:#475569;font-size:11px;margin-top:4px">📅 ${hoy()} · 🕐 ${hora()}</div>
    </div>
    <div class="label">💰 Efectivo inicial en caja (Bs.)</div>
    <input id="ap_monto" type="number" min="0" value="0" class="input"
      style="text-align:center;font-size:24px;font-weight:900;color:#fbbf24;margin-bottom:6px"/>
    <div style="color:#475569;font-size:10px;text-align:center;margin-bottom:16px">Dinero físico con el que abre la caja hoy</div>
    <div style="color:#64748b;font-size:11px;text-align:center;margin-bottom:12px">Responsable: <strong style="color:#94a3b8">${usuario.nombre}</strong></div>
    <button onclick="abrirCaja()"
      style="width:100%;padding:13px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-weight:900;font-size:14px;cursor:pointer">
      🌅 Abrir caja ahora
    </button>
    ${usuario.taller==="ambos"?`
    <button onclick="filtroTaller='';render()"
      style="width:100%;padding:9px;background:#334155;color:#64748b;border:none;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;margin-top:8px">
      ← Cambiar taller
    </button>`:""}
  </div>`;
}

async function abrirCaja(){
  const monto=vn("ap_monto");
  const taller=filtroTaller||usuario.taller;
  const{data,error}=await SB.from("caja_sesiones").insert({
    fecha:hoy(),taller,apertura_hora:hora(),
    apertura_monto:monto,estado:"Abierta",usuario:usuario.nombre
  }).select().single();
  if(error){alert("Error al abrir caja: "+error.message);return;}
  sesion=data; movimientos=[];
  render();
}

/* ── Panel caja abierta ─────────────────────────────── */
function panelCajaAbierta(){
  const tot=calcDia();
  const cerrada=sesion.estado==="Cerrada";

  return `
  <!-- Encabezado sesión -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px" class="noprint">
    <div>
      <div style="color:#3b82f6;font-size:12px;font-weight:700">🏢 ${sesion.taller}</div>
      <div style="color:#475569;font-size:10px">Abierta ${sesion.apertura_hora} · ${sesion.usuario}</div>
    </div>
    <div style="display:flex;gap:5px;align-items:center">
      ${usuario.taller==="ambos"?`
      <button onclick="filtroTaller='';sesion=null;movimientos=[];render()"
        style="padding:5px 10px;background:#334155;color:#64748b;border:none;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer">
        ⇄ Taller
      </button>`:""}
      <span style="padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;
        background:${cerrada?"#ef444420":"#16a34a20"};
        color:${cerrada?"#ef4444":"#16a34a"};
        border:1px solid ${cerrada?"#ef444440":"#16a34a40"}">
        ${cerrada?"🔒 Cerrada":"🟢 Abierta"}
      </span>
    </div>
  </div>

  ${tarjetaResumen(tot)}
  ${cerrada?"":formGasto()}
  ${listaMovimientos()}
  ${cerrada ? resumenCierre(tot) : panelCierre(tot)}
  `;
}

/* ── Tarjeta resumen del día ────────────────────────── */
function tarjetaResumen(tot){
  const items=[
    {l:"GANANCIA NETA",sub:"Mano de obra",   v:tot.ganancia, c:"#16a34a"},
    {l:"CAPITAL",      sub:"Repuestos",       v:tot.capital,  c:"#60a5fa"},
    {l:"GASTOS",       sub:"Egresos del día", v:tot.gastos,   c:"#ef4444"},
    {l:"NETO",         sub:"Cobrado − Gastos",v:tot.neto,     c:"#f59e0b"},
  ];
  return `
  <div class="card" style="border-color:#f59e0b30">
    <div style="color:#fbbf24;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:12px">📊 Resumen del día</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      ${items.map(x=>`
      <div style="background:${x.c}12;border:1px solid ${x.c}25;border-radius:10px;padding:12px;text-align:center">
        <div style="color:#475569;font-size:9px;font-weight:700;margin-bottom:4px">${x.l}</div>
        <div style="color:${x.c};font-weight:900;font-size:17px">${fmt(x.v)}</div>
        <div style="color:#334155;font-size:9px;margin-top:2px">${x.sub}</div>
      </div>`).join("")}
    </div>
    <!-- Métodos de pago -->
    <div style="background:#0f172a;border-radius:10px;padding:10px">
      <div style="color:#334155;font-size:9px;font-weight:700;margin-bottom:6px;text-transform:uppercase">Por método</div>
      <div style="display:flex;gap:0">
        ${[["💵 Efectivo",tot.efectivo,"#4ade80"],["📱 QR/Digital",tot.qr,"#60a5fa"],["📦 Total cobrado",tot.cobrado,"#fbbf24"]].map((x,i,a)=>`
        <div style="flex:1;text-align:center${i<a.length-1?";border-right:1px solid #334155":""}">
          <div style="color:#334155;font-size:9px;margin-bottom:3px">${x[0]}</div>
          <div style="color:${x[2]};font-weight:700;font-size:13px">${fmt(x[1])}</div>
        </div>`).join("")}
      </div>
    </div>
  </div>`;
}

/* ── Formulario de gasto ────────────────────────────── */
function formGasto(){
  return `
  <div class="card" style="border-color:#ef444430" class="noprint">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="color:#ef4444;font-size:11px;font-weight:700;text-transform:uppercase">📉 Registrar gasto</div>
      <button onclick="toggleForm()"
        style="padding:5px 12px;background:#ef444420;color:#ef4444;border:1px solid #ef444440;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer">
        + Gasto
      </button>
    </div>
    <div id="form_gasto" style="display:none">
      <div class="label">Concepto *</div>
      <input id="g_concepto" class="input" placeholder="Ej: Gasolina, limpieza, insumos..." style="margin-bottom:8px"/>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <div>
          <div class="label">Monto Bs. *</div>
          <input id="g_monto" type="number" min="0" class="input" placeholder="0"/>
        </div>
        <div>
          <div class="label">Método</div>
          <select id="g_metodo" class="input">
            <option>Efectivo</option><option>QR</option><option>Transferencia</option>
          </select>
        </div>
      </div>
      <button onclick="guardarGasto()"
        style="width:100%;padding:10px;background:#ef4444;color:#fff;border:none;border-radius:10px;font-weight:900;font-size:13px;cursor:pointer">
        💾 Registrar gasto
      </button>
    </div>
  </div>`;
}

function toggleForm(){
  const f=$$("form_gasto");
  if(f) f.style.display=f.style.display==="none"?"block":"none";
}

async function guardarGasto(){
  const concepto=v("g_concepto");
  const monto=vn("g_monto");
  const metodo=$$("g_metodo")?.value||"Efectivo";
  if(!concepto||!monto){alert("Completa concepto y monto");return;}
  await SB.from("caja").insert({
    concepto,monto,tipo:"egreso",metodo_pago:metodo,
    taller:sesion.taller,fecha:hoy(),
    registrado_por:usuario.user_name
  });
  await cargarMovimientos();
  render();
}

/* ── Lista de movimientos ───────────────────────────── */
function listaMovimientos(){
  const STAG={ganancia_neta:{l:"Mano de obra",c:"#16a34a"},capital_tienda:{l:"Repuesto",c:"#60a5fa"}};
  return `
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="color:#64748b;font-size:11px;font-weight:700;text-transform:uppercase">📋 Movimientos (${movimientos.length})</div>
      <button onclick="exportarCSV()"
        style="padding:5px 10px;background:#334155;color:#64748b;border:none;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer" class="noprint">
        ⬇ CSV
      </button>
    </div>
    ${movimientos.length===0
      ?`<div style="text-align:center;padding:20px;color:#334155;font-size:12px">Sin movimientos aún</div>`
      :`<div style="max-height:300px;overflow-y:auto">
        ${movimientos.map(m=>{
          const ing=m.tipo==="ingreso";
          const st=STAG[m.subtipo]||{l:ing?"Ingreso":"Gasto",c:ing?"#94a3b8":"#ef4444"};
          const c=ing?st.c:"#ef4444";
          return `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #0f172a">
            <div style="flex:1;min-width:0;padding-right:8px">
              <div style="font-size:11px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.concepto||"—"}</div>
              <div style="display:flex;gap:4px;margin-top:3px;flex-wrap:wrap">
                <span style="font-size:9px;padding:1px 6px;background:${c}20;color:${c};border-radius:4px;font-weight:700">${st.l}</span>
                ${m.metodo_pago?`<span style="font-size:9px;color:#475569">${m.metodo_pago}</span>`:""}
              </div>
            </div>
            <div style="font-weight:700;font-size:13px;color:${c};flex-shrink:0">
              ${ing?"+":"-"}${fmt(m.monto)}
            </div>
          </div>`;
        }).join("")}
      </div>`}
  </div>`;
}

/* ── Panel cierre ───────────────────────────────────── */
function panelCierre(tot){
  const esperado=parseFloat(sesion.apertura_monto||0)+tot.neto;
  return `
  <div class="card" style="border-color:#f59e0b40">
    <div style="color:#f59e0b;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:14px">🌆 Cierre de caja</div>

    <!-- Resumen del sistema -->
    <div style="background:#0f172a;border-radius:10px;padding:12px;margin-bottom:14px">
      <div style="color:#64748b;font-size:9px;font-weight:700;margin-bottom:8px;text-transform:uppercase">📊 Según el sistema</div>
      ${[
        ["Apertura (inicial)",fmt(sesion.apertura_monto||0),"#64748b"],
        ["Ganancia neta (MO)",fmt(tot.ganancia),"#16a34a"],
        ["Capital (repuestos)",fmt(tot.capital),"#60a5fa"],
        ["Gastos","-"+fmt(tot.gastos),"#ef4444"],
      ].map(([k,v,c])=>`
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
        <span style="color:#64748b">${k}</span><span style="color:${c};font-weight:700">${v}</span>
      </div>`).join("")}
      <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;border-top:1px solid #334155;padding-top:8px;margin-top:4px">
        <span>Efectivo esperado</span><span style="color:#fbbf24">${fmt(esperado)}</span>
      </div>
    </div>

    <!-- Conteo real -->
    <div style="color:#94a3b8;font-size:10px;font-weight:700;margin-bottom:8px;text-transform:uppercase">💵 Conteo real</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div>
        <div class="label">Efectivo contado Bs.</div>
        <input id="ci_ef" type="number" min="0" value="0" oninput="recalcDif()"
          style="width:100%;padding:10px;background:#16a34a12;border:2px solid #16a34a;border-radius:10px;
            color:#4ade80;font-size:20px;font-weight:900;text-align:center"/>
      </div>
      <div>
        <div class="label">QR / Digital Bs.</div>
        <input id="ci_qr" type="number" min="0" value="0" oninput="recalcDif()"
          style="width:100%;padding:10px;background:#1d4ed812;border:2px solid #3b82f6;border-radius:10px;
            color:#60a5fa;font-size:20px;font-weight:900;text-align:center"/>
      </div>
    </div>

    <!-- Indicador diferencia -->
    <div id="dif_box" style="border-radius:10px;padding:12px;text-align:center;margin-bottom:12px;background:#334155;border:1px solid #475569">
      <div style="color:#64748b;font-size:10px;margin-bottom:4px">DIFERENCIA (real vs sistema)</div>
      <div id="dif_val" style="font-size:18px;font-weight:900;color:#94a3b8">—</div>
    </div>

    <div id="obs_wrap" style="display:none;margin-bottom:10px">
      <div class="label">Observación (motivo de la diferencia)</div>
      <input id="ci_obs" class="input" placeholder="Explica la diferencia..."/>
    </div>

    <button onclick="cerrarCaja()"
      style="width:100%;padding:13px;background:#f59e0b;color:#1e293b;border:none;border-radius:10px;font-weight:900;font-size:14px;cursor:pointer">
      🌆 Cerrar caja ahora
    </button>
  </div>`;
}

function recalcDif(){
  const tot=calcDia();
  const esperado=parseFloat(sesion?.apertura_monto||0)+tot.neto;
  const ef=vn("ci_ef"), qr=vn("ci_qr");
  const real=ef+qr, dif=real-esperado;
  const ok=Math.abs(dif)<1, sobre=dif>0;
  const box=$$("dif_box"), val=$$("dif_val"), obs=$$("obs_wrap");
  if(!box)return;
  box.style.background=ok?"#16a34a20":sobre?"#f59e0b20":"#ef444420";
  box.style.borderColor=ok?"#16a34a40":sobre?"#f59e0b40":"#ef444440";
  val.style.color=ok?"#4ade80":sobre?"#fbbf24":"#f87171";
  val.textContent=ok
    ?"✅ Cuadra perfectamente"
    :(sobre?"⚠️ Sobra ":"❌ Falta ")+fmt(Math.abs(dif));
  if(obs) obs.style.display=ok?"none":"block";
}

async function cerrarCaja(){
  const tot=calcDia();
  const esperado=parseFloat(sesion?.apertura_monto||0)+tot.neto;
  const ef=vn("ci_ef"), qr=vn("ci_qr");
  const real=ef+qr, dif=real-esperado;
  const obs=v("ci_obs");
  const difLabel=Math.abs(dif)<1?"✅ Cuadra":dif>0?`⚠️ Sobra ${fmt(dif)}`:`❌ Falta ${fmt(Math.abs(dif))}`;

  if(!confirm(`¿Cerrar caja de ${sesion.taller}?\n\n📊 Sistema: ${fmt(tot.cobrado)} cobrado · Gastos: ${fmt(tot.gastos)}\n💵 Efectivo real: ${fmt(ef)} · QR: ${fmt(qr)}\n\n${difLabel}`))return;

  await SB.from("caja_sesiones").update({
    cierre_hora:hora(),
    cierre_efectivo:ef,cierre_qr:qr,cierre_total:real,
    ganancia_neta:tot.ganancia,capital_tienda:tot.capital,
    gastos:tot.gastos,diferencia:dif,
    obs_cierre:obs,estado:"Cerrada"
  }).eq("id",sesion.id);

  sesion={...sesion,estado:"Cerrada",cierre_hora:hora(),
    cierre_efectivo:ef,cierre_qr:qr,cierre_total:real,diferencia:dif};
  notionGuardarCaja(tot,ef,qr).then(ok=>notionToast(ok));
  render();
}

  return `

function getFechasSemana(offset){
  const hoyD=new Date();
  const dia=hoyD.getDay()||7;
  const lunes=new Date(hoyD);
  lunes.setDate(hoyD.getDate()-dia+1+offset*7);
  const fechas=[];
  for(let i=0;i<7;i++){
    const d=new Date(lunes);d.setDate(lunes.getDate()+i);
    fechas.push(d.toLocaleDateString("es-BO"));
  }
  const dom=new Date(lunes);dom.setDate(lunes.getDate()+6);
  return{fechas,inicio:lunes.toLocaleDateString("es-BO"),fin:dom.toLocaleDateString("es-BO")};
}

async function cargarInforme(){
  const el=$$("inf_body");
  if(!el)return;
  el.innerHTML=`<div style="text-align:center;padding:20px;color:#475569">Cargando...</div>`;

  const{fechas,inicio,fin}=getFechasSemana(informeSemana);
  let q=SB.from("caja").select("*").in("fecha",fechas);
  if(informeTaller!=="ambos") q=q.eq("taller",informeTaller);
  const{data}=await q;
  const movs=data||[];

  /* Calcular por taller */
  const pt={};
  TALLERES.forEach(t=>{
    const m=movs.filter(x=>x.taller===t);
    pt[t]=calcDia(m);
  });
  const totG =Object.values(pt).reduce((s,x)=>s+x.ganancia,0);
  const totC =Object.values(pt).reduce((s,x)=>s+x.capital,0);
  const totGas=Object.values(pt).reduce((s,x)=>s+x.gastos,0);
  const totNet=totG+totC-totGas;

  informeCache={pt,totG,totC,totGas,totNet,inicio,fin};

  const talleresVer=TALLERES.filter(t=>informeTaller==="ambos"||informeTaller===t);

  el.innerHTML=`
  <div style="text-align:center;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #334155">
    <div style="color:#64748b;font-size:11px">${inicio} — ${fin}</div>
  </div>

  ${talleresVer.map(t=>{
    const d=pt[t];
    const items=[
      {l:"GANANCIA",sub:"Mano de obra",v:d.ganancia,c:"#16a34a"},
      {l:"CAPITAL", sub:"Repuestos",   v:d.capital,  c:"#60a5fa"},
      {l:"GASTOS",  sub:"Egresos",     v:d.gastos,   c:"#ef4444"},
      {l:"NETO",    sub:"Resultado",   v:d.neto,     c:"#f59e0b"},
    ];
    return `
    <div style="background:#0f172a;border-radius:10px;padding:12px;margin-bottom:10px">
      <div style="font-weight:700;font-size:12px;color:#94a3b8;margin-bottom:8px">🏢 ${t}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
        ${items.map(x=>`
        <div style="background:${x.c}12;border:1px solid ${x.c}20;border-radius:8px;padding:8px;text-align:center">
          <div style="color:#475569;font-size:9px;font-weight:700">${x.l}</div>
          <div style="color:${x.c};font-weight:900;font-size:14px">${fmt(x.v)}</div>
          <div style="color:#334155;font-size:9px">${x.sub}</div>
        </div>`).join("")}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#475569">
        <span>💵 Efectivo: ${fmt(d.efectivo)}</span>
        <span>📱 QR: ${fmt(d.qr)}</span>
        <span>📦 Cobrado: ${fmt(d.cobrado)}</span>
      </div>
    </div>`;
  }).join("")}

  ${informeTaller==="ambos"?`
  <div style="background:#1e293b;border:1px solid #334155;border-radius:10px;padding:12px;margin-bottom:12px">
    <div style="color:#64748b;font-size:10px;font-weight:700;margin-bottom:8px;text-transform:uppercase">Total ambos talleres</div>
    ${[["Ganancia neta",totG,"#16a34a"],["Capital repuestos",totC,"#60a5fa"],["Gastos",-totGas,"#ef4444"]].map(([k,vv,c])=>`
    <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
      <span style="color:#64748b">${k}</span>
      <span style="color:${c};font-weight:700">${vv<0?"-":""}${fmt(Math.abs(vv))}</span>
    </div>`).join("")}
    <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:900;border-top:1px solid #334155;padding-top:8px;margin-top:4px">
      <span>NETO TOTAL</span><span style="color:#fbbf24">${fmt(totNet)}</span>
    </div>
  </div>`:""}

  <div style="display:flex;gap:6px" class="noprint">
    <button onclick="window.print()"
      style="flex:1;padding:10px;background:#334155;color:#94a3b8;border:none;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer">
      🖨️ Imprimir
    </button>
    <button onclick="enviarInformeWA()"
      style="flex:1;padding:10px;background:#25d36620;color:#25d366;border:1px solid #25d36640;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer">
      📱 WhatsApp
    </button>
  </div>`;
}

function enviarInformeWA(){
  if(!informeCache)return;
  const{pt,totG,totC,totGas,totNet,inicio,fin}=informeCache;
  let msg=`📊 *INFORME SEMANAL — ${EMPRESA.nombre}*\n${inicio} al ${fin}\n━━━━━━━━━━━━━━\n\n`;
  TALLERES.forEach(t=>{
    if(informeTaller!=="ambos"&&informeTaller!==t)return;
    const d=pt[t];
    msg+=`🏢 *${t}*\n🟢 Ganancia (MO): ${fmt(d.ganancia)}\n🔵 Capital (Rep.): ${fmt(d.capital)}\n🔴 Gastos: ${fmt(d.gastos)}\n💰 Neto: ${fmt(d.neto)}\n\n`;
  });
  if(informeTaller==="ambos")
    msg+=`━━━━━━━━━━━━━━\n💰 *NETO TOTAL: ${fmt(totNet)}*\n`;
  msg+=`\n_Generado: ${hoy()}_`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,"_blank");
}

/* ── Exportar CSV ───────────────────────────────────── */
function exportarCSV(){
  if(!movimientos.length){alert("Sin movimientos para exportar");return;}
  const cab="Concepto,Tipo,Subtipo,Monto,Método,Fecha,Taller\n";
  const filas=movimientos.map(m=>
    `"${(m.concepto||"").replace(/"/g,'""')}",${m.tipo},${m.subtipo||""},${m.monto},"${m.metodo_pago||""}","${m.fecha}","${m.taller||""}"`
  ).join("\n");
  const blob=new Blob(["﻿"+cab+filas],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`caja_${(sesion?.taller||"").replace(/[^a-zA-Z0-9]/g,"_")}_${hoy().replace(/\//g,"-")}.csv`;
  a.click();
}

/* ── Notion sync ─────────────────────────────────────── */
let _notionKey=null;
async function getNotionKey(){
  if(_notionKey)return _notionKey;
  try{const{data}=await SB.from("config").select("valor").eq("clave","notion_api_key").single();_notionKey=data?.valor||null;}catch{_notionKey=null;}
  return _notionKey;
}
async function notionGuardar(pageId,titulo,filas){
  const key=await getNotionKey();if(!key)return false;
  try{
    const resp=await fetch("https://api.notion.com/v1/pages",{
      method:"POST",
      headers:{"Authorization":"Bearer "+key,"Notion-Version":"2022-06-28","Content-Type":"application/json"},
      body:JSON.stringify({
        parent:{page_id:pageId},
        properties:{title:{title:[{text:{content:titulo}}]}},
        children:filas.map(([label,val])=>({object:"block",type:"paragraph",paragraph:{rich_text:[{type:"text",text:{content:label+": "+val}}]}}))
      })
    });
    return resp.ok;
  }catch{return false;}
}
function notionToast(ok){
  const d=document.createElement("div");
  d.style.cssText="position:fixed;top:16px;right:16px;z-index:9999;padding:10px 16px;border-radius:10px;font-size:12px;font-weight:700;"+(ok?"background:#16a34a20;border:1px solid #16a34a40;color:#4ade80":"background:#f59e0b20;border:1px solid #f59e0b40;color:#fbbf24");
  d.textContent=ok?"✅ Guardado en Notion":"⚠️ Sin conexión Notion";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),3500);
}
async function notionGuardarCaja(tot,ef,qr){
  const taller=sesion?.taller||"—";
  return notionGuardar("37d0581972d18144a612c4c591ae4f75",
    "Caja "+taller+" · "+hoy(),
    [
      ["Taller",taller],
      ["Fecha",hoy()],
      ["Quién cerró",sesion?.usuario||usuario?.nombre||"—"],
      ["Total cobrado",fmt(tot.cobrado)],
      ["Ganancia neta (MO)",fmt(tot.ganancia)],
      ["Capital (repuestos)",fmt(tot.capital)],
      ["Gastos del día",fmt(tot.gastos)],
      ["Neto del día",fmt(tot.neto)],
      ["Efectivo real",fmt(ef)],
      ["QR / Digital",fmt(qr)]
    ]
  );
}
